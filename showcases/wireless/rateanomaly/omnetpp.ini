[General]
network = RateAnomalyShowcase
sim-time-limit = 5s
warmup-period = 1s   # discard the association transient; measure steady state over [1s, 5s]

# In a saturated BSS, contending stations' DCF backoff counters routinely reach zero on
# the same slot boundary -- that is a real CSMA/CA collision, not a misconfiguration, so
# the "same transmission start time" guard must be relaxed here.
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# Resolve ARP globally so no ARP frames consume airtime (keeps the channel clean).
*.*.ipv4.arp.typename = "GlobalArp"

# Fixed station positions: a small cluster ~8-9 m from the access point, so every link
# is equally good. (Positions come from mobility, not the display string.)
*.sta[*].mobility.typename = "StationaryMobility"
*.sta[*].mobility.initFromDisplayString = false
*.sta[*].mobility.initialX = 9m
*.sta[*].mobility.initialY = 8m + parentIndex() * 2m
*.sta[*].mobility.initialZ = 0m
*.accessPoint.mobility.initialX = 17m
*.accessPoint.mobility.initialY = 12m
*.accessPoint.mobility.initialZ = 0m

# ---- 802.11g, FIXED per-station data rate (no rate control) ----
# Every station uses the same opMode; the only thing that differs is the configured
# data bitrate. The slow station is slow by configuration, not because of a weak link.
*.sta[*].wlan[*].opMode = "g(erp)"
*.accessPoint.wlan[*].opMode = "g(erp)"
*.sta[*].wlan[*].bitrate = 54Mbps
*.accessPoint.wlan[*].bitrate = 54Mbps

# Generous, equal transmit power so every link is error-free even at 54 Mbps at these
# short distances -- isolates the anomaly to airtime sharing, not to packet loss.
*.sta[*].wlan[*].radio.transmitter.power = 100mW
*.accessPoint.wlan[*].radio.transmitter.power = 100mW

# Small MAC queue + over-provisioned offered load => every station is always backlogged
# (the saturated-throughput regime in which the rate anomaly is defined).
*.sta[*].wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 10

# ---- Saturating uplink UDP: one backlogged flow per station ----
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpBasicApp"
*.sta[*].app[0].destAddresses = "server"
*.sta[*].app[0].destPort = 5000 + parentIndex()   # distinct port per station -> per-station throughput
*.sta[*].app[0].messageLength = 1000B
*.sta[*].app[0].sendInterval = 0.25ms     # ~32 Mbps offered >> capacity -> saturated

# ---- One sink per station at the server (port 5000+i) ----
*.server.numApps = 5
*.server.app[*].typename = "UdpSink"
*.server.app[*].localPort = 5000 + index

[Config Homogeneous]
description = "All five stations transmit at 54 Mbps - the fair, high-throughput baseline"

[Config RateAnomaly]
description = "One station is slowed (bitrate swept 36..6 Mbps); the fast stations collapse with it"
*.sta[0].wlan[*].bitrate = ${slowBitrate=36,24,18,12,9,6}Mbps

[Config Txop]
extends = RateAnomaly
description = "Same rate gap, but 802.11e airtime-based TXOP cures the anomaly"

# Switch the interface to the QoS MAC (802.11e / HCF) instead of plain DCF.
*.sta[*].wlan[*].mac.qosStation = true
*.accessPoint.wlan[*].mac.qosStation = true

# Grant best-effort traffic (access category AC_BE = edcaf[1]) a *time-bounded*
# transmission opportunity: on each channel win a station may burst frames for up to this
# duration. DCF still hands out wins equally often, so equal time-per-win means equal
# AIRTIME -- a fast station simply packs more frames into its slice than a slow one.
*.sta[*].wlan[*].mac.hcf.edca.edcaf[1].txopProcedure.txopLimit = 3.008ms

# A deeper MAC queue so a fast station has enough frames buffered to fill its TXOP
# (a 54 Mbps station can send ~16 1000-byte frames in 3 ms).
*.sta[*].wlan[*].mac.hcf.edca.edcaf[1].pendingQueue.packetCapacity = 50

# =====================================================================================
# Downlink form of the anomaly, and the AirtimeFairnessQueue that fixes it.
#
# Same BSS, but the ACCESS POINT is now the saturated transmitter: the server sources one
# backlogged UDP flow per station and the AP relays them over the air. As in the uplink case
# one station is slow, but downlink the slowness comes from the AP transmitting to sta[0] at a
# low PHY rate -- per-receiver rate selection, the way a real AP rate-adapts to a far/weak
# client (the standard requires per-destination rates; INET's dataFrameBitratePerReceiver
# provides the static form). When the AP's transmit queue serves each client an equal number of
# frames (round-robin, fairnessEnabled=false), sta[0]'s 9x-longer frames hog the airtime and drag
# the fast clients down (the anomaly, downlink form). The AirtimeFairnessQueue charges each client the
# actual on-air time it consumes and holds sta[0] to its fair TIME share, so the fast clients
# recover -- the transmit-side (AP downlink) counterpart of the TXOP fix for uplink.
# =====================================================================================

[Config DownlinkBase]
description = "Downlink saturation: the AP feeds all five stations; sta[0] runs at 6 Mbps"

# Flip the traffic direction: the server sources one flow per station, stations sink.
*.sta[*].app[0].typename = "UdpSink"
*.sta[*].app[0].localPort = 5000 + parentIndex()

*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destAddresses = "sta[" + string(index) + "]"
*.server.app[*].destPort = 5000 + index
*.server.app[*].messageLength = 1000B
*.server.app[*].sendInterval = 1ms        # ~8 Mbps per flow; aggregate 40 Mbps saturates the AP
                                          # (~16 Mbps here) yet stays well under the 100 Mbps
                                          # server link, so the AP transmit queue is the only
                                          # bottleneck (a higher rate would instead starve the
                                          # later flows at the server's own Ethernet FIFO).

# The AP transmits to sta[0] at 6 Mbps and to every other station at the interface-wide
# 54 Mbps (a real AP rate-adapts per client; here it is configured statically).
*.accessPoint.wlan[*].mac.dcf.rateSelection.dataFrameBitratePerReceiver = {"sta[0].wlan[0]": 6Mbps}

# Airtime-fair transmit queue at the AP (one FIFO sub-queue per client). The two configs below
# flip only its fairnessEnabled switch, so the sole variable is frame-fair vs airtime-fair
# scheduling. A generous per-client capacity lets each client build enough backlog to compete.
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.typename = "AirtimeFairnessQueue"
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 50

[Config DownlinkAnomaly]
extends = DownlinkBase
description = "Frame-fair (round-robin) AP queue: sta[0]'s long frames drag the fast clients down"
# fairnessEnabled=false serves each client an equal number of FRAMES -- the downlink analog of
# DCF handing out equal channel access. sta[0]'s 9x-longer frames then dominate the airtime and
# every client collapses to sta[0]'s throughput (the anomaly, downlink form).
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.fairnessEnabled = false

[Config DownlinkAirtimeFair]
extends = DownlinkBase
description = "AirtimeFairnessQueue at the AP: the fast clients recover, sta[0] held to its airtime share"
# fairnessEnabled=true (default) gives each client an equal share of on-air TIME: the fast
# clients pack more frames into their slice and recover, sta[0] is capped at its time share.
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.quantum = 1500us
