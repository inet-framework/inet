[General]
network = ExposedNodeShowcase
sim-time-limit = 5s
abstract = true

*.host*.ipv4.arp.typename = "GlobalArp"

# nic settings
*.host*.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
*.host*.wlan[*].agent.typename = ""
*.host*.wlan[*].radio.signalAnalogRepresentation = "unitDisk"
*.host*.wlan[*].radio.transmitter.analogModel.communicationRange = 300m
*.host*.wlan[*].bitrate = 6Mbps
**.wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 14
**.wlan[*].mac.*.rateSelection.responseAckFrameBitrate = 6Mbps
**.wlan[*].mac.*.rateSelection.dataFrameBitrate = 6Mbps
**.wlan[*].mac.*.rateSelection.controlFrameBitrate = 6Mbps

# radio medium settings
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"
*.radioMedium.obstacleLoss.typename = "IdealObstacleLoss"

# visualizer settings
# medium visualizer: expanding disks show where each signal reaches
*.visualizer.mediumVisualizer.displaySignals = true

# physical-link visualizer: an arrow for every frame a radio decodes, including
# frames overheard by a non-addressed node and the link-layer ACKs. Arrows
# persist for one frame exchange (~1.5 ms) so each stays legible before fading.
*.visualizer.physicalLinkVisualizer.displayLinks = true
*.visualizer.physicalLinkVisualizer.lineColor = "blue"
*.visualizer.physicalLinkVisualizer.labelColor = "blue"
*.visualizer.physicalLinkVisualizer.fadeOutMode = "simulationTime"
*.visualizer.physicalLinkVisualizer.fadeOutTime = 1.5ms

# data-link visualizer: highlights only the MAC-accepted data frames (the real
# delivery path), so overheard receptions stand apart from actual deliveries
*.visualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.dataLinkVisualizer.packetFilter = "UDPData*"
*.visualizer.dataLinkVisualizer.lineColor = "green"
*.visualizer.dataLinkVisualizer.lineWidth = 6
*.visualizer.dataLinkVisualizer.labelFormat = ""
*.visualizer.dataLinkVisualizer.fadeOutMode = "simulationTime"
*.visualizer.dataLinkVisualizer.fadeOutTime = 1.5ms

# medium signal disks fade over animation time (they track the in-flight signal)
*.visualizer.mediumVisualizer.fadeOutMode = "animationTime"

# traffic generation: hostA sends to hostB in all configurations
*.hostA.numApps = 1
*.hostA.app[0].typename = "UdpBasicApp"
*.hostA.app[0].destAddresses = "hostB"
*.hostA.app[0].destPort = 5000
*.hostA.app[0].packetName = "UDPData-A"
*.hostA.app[0].messageLength = 1000byte
*.hostA.app[0].sendInterval = 1ms

*.hostB.numApps = 1
*.hostB.app[0].typename = "UdpSink"
*.hostB.app[0].localPort = 5000

*.hostD.numApps = 1
*.hostD.app[0].typename = "UdpSink"
*.hostD.app[0].localPort = 5000

[Config OneFlow]
description = "Only hostA transmits, to hostB -- single-link capacity baseline"

[Config TwoFlowsExposed]
description = "hostA->hostB and hostC->hostD; hostA and hostC sense each other and take turns"

*.hostC.numApps = 1
*.hostC.app[0].typename = "UdpBasicApp"
*.hostC.app[0].destAddresses = "hostD"
*.hostC.app[0].destPort = 5000
*.hostC.app[0].packetName = "UDPData-C"
*.hostC.app[0].messageLength = 1000byte
*.hostC.app[0].sendInterval = 1ms

[Config TwoFlowsDecoupled]
extends = TwoFlowsExposed
description = "Same two flows, with a radio-opaque wall between hostA and hostC -- the flows run in parallel"

*.physicalEnvironment.config = xmldoc("wall.xml")
