[General]
network = RateVisualizerShowcase
sim-time-limit = 5s
description = "Per-station data rate bar chart above the access point"

# playground
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 600m
**.constraintAreaMaxY = 700m
**.constraintAreaMaxZ = 0m

# static positions (mobility comes from @display in the ned; keep it stationary)
**.mobility.typename = "StationaryMobility"

# simplified 802.11 management (no association exchange needed for this demo)
*.accessPoint.wlan[*].mgmt.typename = "Ieee80211MgmtApSimplified"
*.sta*.wlan[*].mgmt.typename = "Ieee80211MgmtStaSimplified"
*.sta*.wlan[*].agent.typename = ""
*.accessPoint.wlan[*].address = "10:00:00:00:00:00"
*.sta*.wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"

# radio
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.transmitter.centerFrequency = 2.4GHz
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
# advertise the full 802.11g rate set so 6/24/54 Mbps are all available
**.wlan[*].opMode = "g(erp)"

# UDP downlink from the server, through the access point, to each station
*.server.numApps = 3
*.server.app[*].typename = "UdpBasicApp"
*.server.app[0].destAddresses = "sta1"
*.server.app[1].destAddresses = "sta2"
*.server.app[2].destAddresses = "sta3"
*.server.app[*].destPort = 5000
*.server.app[*].messageLength = 1000B
*.server.app[*].sendInterval = 10ms
*.server.app[*].startTime = uniform(0s, 10ms)

*.sta*.numApps = 1
*.sta*.app[0].typename = "UdpSink"
*.sta*.app[0].localPort = 5000

# per-receiver PHY data rates the access point uses towards each station
# (keys are peer interface module paths, resolved to their MAC address at run time)
*.accessPoint.wlan[*].mac.dcf.rateSelection.dataFrameBitratePerReceiver = {"sta1.wlan[0]": 6Mbps, "sta2.wlan[0]": 24Mbps, "sta3.wlan[0]": 54Mbps}

# enable the per-station rate bar chart above the access point
*.visualizer.*.rateVisualizer.displayRates = true
*.visualizer.*.rateVisualizer.maxRate = 54Mbps
# only draw the chart for the access point
*.visualizer.*.rateVisualizer.nodeFilter = "accessPoint"
