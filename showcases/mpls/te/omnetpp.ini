[General]
network = MplsTeShowcase
total-stack = 64MiB
abstract = true

# Router IDs and RSVP-TE peers are both derived automatically (from the highest
# interface address, and from the TED, respectively); no manual configuration
# of either is needed.
**.LSR*.routerId = "auto"

# Ingress LSR1 is statically configured with the FEC table (which destination
# maps to which tunnel/LSP) and the traffic database (the two explicit-route,
# bandwidth-reserved sessions described in the showcase documentation).
**.LSR1.classifier.config = xmldoc("LSR1_fec.xml")
**.LSR1.rsvp.traffic = xmldoc("LSR1_rsvp.xml")

**.LSR*.rsvp.helloInterval = 0.2s
**.LSR*.rsvp.helloTimeout = 0.5s

**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 10

# host1 -> host3 over the high-priority tunnel (1), host2 -> host4 over the
# low-priority tunnel (2)
**.host1.numApps = 1
**.host1.app[0].typename = "UdpBasicApp"
**.host1.app[0].localPort = 100
**.host1.app[0].destPort = 100
**.host1.app[0].messageLength = 128 bytes
**.host1.app[0].sendInterval = 0.01s
**.host1.app[0].destAddresses = "host3"

**.host2.numApps = 1
**.host2.app[0].typename = "UdpBasicApp"
**.host2.app[0].localPort = 100
**.host2.app[0].destPort = 100
**.host2.app[0].messageLength = 128 bytes
**.host2.app[0].sendInterval = 0.01s
**.host2.app[0].destAddresses = "host4"

**.host{3..4}.numApps = 1
**.host{3..4}.app[0].typename = "UdpSink"
**.host{3..4}.app[0].localPort = 100

[Config ExplicitRouteBandwidth]
description = "(a) explicit-route LSPs with bandwidth reservation, no failures or preemption"
sim-time-limit = 3s

[Config PriorityPreemption]
description = "(b) a higher-priority path preempts a lower-priority reservation sharing its links"
sim-time-limit = 4s
**.scenarioManager.script = xmldoc("scenario_preemption.xml")

[Config FailureReroute]
description = "(c) Hello-detected LSR failure tears down and retries the affected LSP"
sim-time-limit = 6s
*.*.hasStatus = true
**.scenarioManager.script = xmldoc("scenario_failure.xml")
