[General]
network = PimShowcaseNetwork
abstract = true

# Source application: sends UDP multicast traffic
**.source.numApps = 1
**.source.app[0].typename = "UdpBasicApp"
**.source.app[0].destPort = 5000
**.source.app[0].messageLength = 500B
**.source.app[0].destAddresses = "239.1.1.1"
**.source.app[0].startTime = 10s
**.source.app[0].sendInterval = 1s

# Receivers: join multicast group and receive traffic
**.receiver*.numApps = 1
**.receiver*.app[0].typename = "UdpSink"
**.receiver*.app[0].localPort = 5000
**.receiver*.app[0].multicastGroup = "239.1.1.1"

[Config PimDm]
description = "PIM Dense Mode: flood-and-prune multicast delivery"
sim-time-limit = 100s

**.pimConfig = xml("<config><interface mode='dense'/></config>")

# receiver1 joins early, receiver2 joins later (demonstrates prune and graft)
**.receiver1.app[0].startTime = 5s
**.receiver2.app[0].startTime = 50s

# Source sends for the entire simulation
**.source.app[0].stopTime = 90s

[Config PimSm]
description = "PIM Sparse Mode: shared tree with Rendezvous Point"
sim-time-limit = 100s

**.pimConfig = xml("<config><interface mode='sparse'/></config>")

# R1 acts as the Rendezvous Point (assign a known address to its interface)
**.configurator.config = xml("<config><interface hosts='R1' towards='R0' address='10.99.0.1' netmask='255.255.255.0'/><interface hosts='R0' towards='R1' address='10.99.0.2' netmask='255.255.255.0'/><interface hosts='**' address='10.x.x.x' netmask='255.255.255.x'/></config>")
**.pim.pimSM.RP = "10.99.0.1"

# receiver1 joins early, receiver2 joins later
**.receiver1.app[0].startTime = 5s
**.receiver2.app[0].startTime = 30s

# Source sends for the entire simulation
**.source.app[0].stopTime = 90s

[Config Iptv]
description = "IPTV streaming over a routed network with PIM-SM"
network = PimIptvNetwork
sim-time-limit = 60s

# PIM-SM for multicast routing
**.pimConfig = xml("<config><interface mode='sparse'/></config>")

# R10 acts as the Rendezvous Point (assign a known address to its interface)
**.configurator.config = xml("<config><interface hosts='R10' towards='R00' address='10.99.0.1' netmask='255.255.255.0'/><interface hosts='R00' towards='R10' address='10.99.0.2' netmask='255.255.255.0'/><interface hosts='**' address='10.x.x.x' netmask='255.255.255.x'/></config>")
**.pim.pimSM.RP = "10.99.0.1"

# IPTV server: streams video-like traffic to multicast group
**.server.numApps = 1
**.server.app[0].typename = "UdpBasicApp"
**.server.app[0].destPort = 5000
**.server.app[0].messageLength = 1000B
**.server.app[0].destAddresses = "239.1.1.1"
**.server.app[0].startTime = 25s
**.server.app[0].sendInterval = 0.04s
**.server.app[0].stopTime = 55s

# IPTV client: joins the multicast group
**.client.numApps = 1
**.client.app[0].typename = "UdpSink"
**.client.app[0].localPort = 5000
**.client.app[0].multicastGroup = "239.1.1.1"
**.client.app[0].startTime = 30s
