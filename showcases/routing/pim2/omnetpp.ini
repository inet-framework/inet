[General]
network = PimShowcaseNetwork
abstract = true

# Use layered Ethernet interface (includes explicit PHY layer)
#**.eth[*].typename = "LayeredEthernetInterface"
**.eth*.bitrate = 100Mbps

# Source application: sends UDP multicast traffic
**.source.numApps = 1
**.source.app[0].typename = "UdpBasicApp"
**.source.app[0].destPort = 5000
**.source.app[0].messageLength = 500B
**.source.app[0].destAddresses = "239.1.1.1"
**.source.app[0].startTime = 10s
**.source.app[0].sendInterval = 1s

# Use multi-visualizer for multiple color-coded channel visualizers
**.visualizer.typename = "IntegratedMultiCanvasVisualizer"

# Color-coded per-link traffic: UDP (blue), PIM (red), other (gray)
**.visualizer.numChannelVisualizers = 3
**.visualizer.channelVisualizer[0].displayChannelActivity = true
**.visualizer.channelVisualizer[0].packetFilter = "UdpBasicAppData*"
**.visualizer.channelVisualizer[0].lineColor = "blue"
**.visualizer.channelVisualizer[0].labelColor = "blue"
**.visualizer.channelVisualizer[1].displayChannelActivity = true
**.visualizer.channelVisualizer[1].packetFilter = "Pim* or PIM*"
**.visualizer.channelVisualizer[1].lineColor = "red"
**.visualizer.channelVisualizer[1].labelColor = "red"
**.visualizer.channelVisualizer[2].displayChannelActivity = true
**.visualizer.channelVisualizer[2].packetFilter = "not UdpBasicAppData* and not Pim* and not PIM*"
**.visualizer.channelVisualizer[2].lineColor = "gray"
**.visualizer.channelVisualizer[2].labelColor = "gray"

# Show multicast forwarding tree for 239.1.1.1 (updates as PIM builds/prunes the tree)
**.visualizer.numRoutingTableVisualizers = 1
**.visualizer.routingTableVisualizer[0].displayRoutingTables = true
**.visualizer.routingTableVisualizer[0].destinationFilter = ""
**.visualizer.routingTableVisualizer[0].multicastGroupFilter = "239.1.1.1"
**.visualizer.routingTableVisualizer[0].labelFormat = ""
**.visualizer.routingTableVisualizer[0].lineColor = "green"
**.visualizer.routingTableVisualizer[0].labelColor = "green"

# Compute checksums/FCS for pcap recording
**.checksumMode = "computed"
**.fcsMode = "computed"

# Record pcap traces on all interfaces
**.numPcapRecorders = 1
**.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-${iterationvarsf}${repetition}.pcap"
**.pcapRecorder[0].fileFormat = "pcap"
**.pcapRecorder[0].verbose = true
**.pcapRecorder[0].alwaysFlush = true

# Receivers: join multicast group and receive traffic
**.receiver*.numApps = 1
**.receiver*.app[0].typename = "UdpSink"
**.receiver*.app[0].localPort = 5000
**.receiver*.app[0].multicastGroup = "239.1.1.1"

[Config PimDm]
description = "PIM Dense Mode: flood-and-prune multicast delivery"
sim-time-limit = 100s

**.pimConfig = xml("<config><interface mode='dense'/></config>")

# receiver1 and receiver2 join early, receiver3 joins later (demonstrates prune and graft)
**.receiver1.app[0].startTime = 5s
**.receiver2.app[0].startTime = 5s
**.receiver3.app[0].startTime = 50s

# Source sends for the entire simulation
**.source.app[0].stopTime = 90s

[Config PimSm]
description = "PIM Sparse Mode: shared tree with Rendezvous Point"
sim-time-limit = 100s

# Per-router pcap to capture Register encapsulation on the DR→RP link
**.R0.numPcapRecorders = 1
**.R0.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-R0.pcap"
**.R0.pcapRecorder[0].fileFormat = "pcap"
**.R0.pcapRecorder[0].alwaysFlush = true
**.R1.numPcapRecorders = 1
**.R1.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-R1.pcap"
**.R1.pcapRecorder[0].fileFormat = "pcap"
**.R1.pcapRecorder[0].alwaysFlush = true

**.pimConfig = xml("<config><interface mode='sparse'/></config>")

# R1 acts as the Rendezvous Point (assign a known address to its interface)
**.configurator.config = xml("<config><interface hosts='R1' towards='R0' address='10.99.0.1' netmask='255.255.255.0'/><interface hosts='R0' towards='R1' address='10.99.0.2' netmask='255.255.255.0'/><interface hosts='**' address='10.x.x.x' netmask='255.255.255.x'/></config>")
**.pim.pimSM.RP = "10.99.0.1"

# receiver1 and receiver2 join early, receiver3 joins later
**.receiver1.app[0].startTime = 5s
**.receiver2.app[0].startTime = 5s
**.receiver3.app[0].startTime = 30s

# Source sends for the entire simulation
**.source.app[0].stopTime = 90s

[Config Iptv]
description = "IPTV streaming over a routed network with PIM-SM"
network = PimIptvNetwork
sim-time-limit = 60s

# PIM-SM for multicast routing
**.pimConfig = xml("<config><interface mode='sparse'/></config>")

# R10 acts as the Rendezvous Point (assign a known address to its interface)
**.configurator.config = xml("<config><interface hosts='R10' towards='R00' address='10.99.0.1' netmask='255.255.255.0'/><interface hosts='R00' towards='R10' address='10.99.0.2' netmask='255.255.255.0'/><interface hosts='**' address='10.x.x.x' netmask='255.255.255.x'/></config>")
**.pim.pimSM.RP = "10.99.0.1"

# IPTV server: streams video-like traffic to multicast group
**.server.numApps = 1
**.server.app[0].typename = "UdpBasicApp"
**.server.app[0].destPort = 5000
**.server.app[0].messageLength = 1000B
**.server.app[0].destAddresses = "239.1.1.1"
**.server.app[0].startTime = 30s
**.server.app[0].sendInterval = 0.04s
**.server.app[0].stopTime = 55s

# IPTV client: joins the multicast group before the server starts
**.client.numApps = 1
**.client.app[0].typename = "UdpSink"
**.client.app[0].localPort = 5000
**.client.app[0].multicastGroup = "239.1.1.1"
**.client.app[0].startTime = 20s
