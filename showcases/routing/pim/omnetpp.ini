[General]
network = PimComparisonShowcase
abstract = true

**.configurator.config = xmldoc("config.xml")
**.configurator.addStaticRoutes = false

# Source sends multicast traffic
**.Source.numApps = 1
**.Source.app[0].typename = "UdpBasicApp"
**.Source.app[0].destPort = 5000
**.Source.app[0].messageLength = 200B
**.Source.app[0].destAddresses = "239.0.0.1"
**.Source.app[0].startTime = 10s
**.Source.app[0].sendInterval = 1s
**.Source.app[0].stopTime = 50s

# Receiver1 joins the multicast group
**.Receiver1.numApps = 1
**.Receiver1.app[0].typename = "UdpSink"
**.Receiver1.app[0].localPort = 5000
**.Receiver1.app[0].multicastGroup = "239.0.0.1"
**.Receiver1.app[0].startTime = 5s

# Receiver2 does NOT join the multicast group (no app)

[Config PimDm]
sim-time-limit = 60s
description = "PIM-DM: flood-and-prune dense mode"
**.pimConfig = xml("<config><interface mode=\"dense\"/></config>")

[Config PimSm]
sim-time-limit = 60s
description = "PIM-SM: RP-based sparse mode"
**.pimConfig = xml("<config><interface mode=\"sparse\"/></config>")
**.RP.**.routerId = "10.0.0.4"
**.RP = "10.0.0.4"
