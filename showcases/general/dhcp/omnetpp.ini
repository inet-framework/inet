[General]
network = DhcpShowcase
**.eth[*].bitrate = 100Mbps

# Visualizer: show interface tables with address/mask
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.interfaceTableVisualizer.format = "%a/%l"

# Enable computed checksums for PcapRecorder compatibility
**.checksumMode = "computed"
**.fcsMode = "computed"

# PcapRecorder on server for debugging/demonstration
*.dhcpServer.numPcapRecorders = 1
*.dhcpServer.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-dhcpServer.pcap"
**.pcapRecorder[*].alwaysFlush = true

[Config BasicDHCP]
description = "Basic DHCP address assignment (DORA exchange)"
sim-time-limit = 50s

# DHCP Server
*.dhcpServer.numApps = 1
*.dhcpServer.app[0].typename = "DhcpServer"
*.dhcpServer.app[0].numReservedAddresses = 10
*.dhcpServer.app[0].maxNumClients = 50
*.dhcpServer.app[0].gateway = "192.168.1.1"
*.dhcpServer.app[0].leaseTime = 3600s

# DHCP Clients
*.client[*].numApps = 1
*.client[*].app[0].typename = "DhcpClient"
*.client[*].app[0].startTime = uniform(0s, 2s)

[Config LeaseRenewal]
description = "DHCP lease renewal (short lease triggers T1 renewal timer)"
extends = BasicDHCP
sim-time-limit = 200s

# Override lease time to 60s so T1=30s triggers renewal during simulation
*.dhcpServer.app[0].leaseTime = 60s

[Config ClientReboot]
description = "DHCP client shutdown and restart using ScenarioManager"
extends = BasicDHCP
sim-time-limit = 200s

**.hasStatus = true
*.scenarioManager.script = xmldoc("scenario.xml")
*.dhcpServer.app[0].leaseTime = 120s

[Config ServerReboot]
description = "DHCP server reboot causes lease rejection and re-acquisition"
extends = BasicDHCP
sim-time-limit = 200s

**.hasStatus = true
*.scenarioManager.script = xmldoc("scenario_server_reboot.xml")
*.dhcpServer.app[0].leaseTime = 100s

[Config Roaming]
description = "Mobile client roams between two wireless DHCP servers"
network = DhcpRoaming
sim-time-limit = 200s

**.eth[*].bitrate = 100Mbps

# Visualizer
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.interfaceTableVisualizer.format = "%a/%l"

# Radio
**.wlan[*].radio.transmitter.power = 2mW
**.radio.displayCommunicationRange = true

# Configurator: static addresses for wired interfaces only
**.configurator.config = xml(" \
    <config> \
        <interface hosts='dhcpServer1' names='eth0' address='192.168.1.1' netmask='255.255.255.0'/> \
        <interface hosts='dhcpServer2' names='eth0' address='192.168.2.1' netmask='255.255.255.0'/> \
        <interface among='server dhcpServer1' address='192.168.3.x' netmask='255.255.255.0'/> \
        <interface among='server dhcpServer2' address='192.168.4.x' netmask='255.255.255.0'/> \
        <wireless hosts='client'/> \
        <route hosts='server' destination='192.168.1.0' netmask='255.255.255.0' gateway='dhcpServer1' /> \
        <route hosts='server' destination='192.168.2.0' netmask='255.255.255.0' gateway='dhcpServer2' /> \
    </config> \
    ")

# Client mobility
*.client.mobility.typename = "RectangleMobility"
*.client.mobility.constraintAreaMinX = 60m
*.client.mobility.constraintAreaMinY = 100m
*.client.mobility.constraintAreaMaxX = 540m
*.client.mobility.constraintAreaMaxY = 150m
*.client.mobility.startPos = 0
*.client.mobility.speed = 20mps

**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 100m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxX = 600m
**.mobility.constraintAreaMaxY = 450m
**.mobility.constraintAreaMaxZ = 0m

# DHCP client
*.client.numApps = 1
*.client.app[0].typename = "DhcpClient"

# DHCP servers
*.dhcpServer1.numApps = 1
*.dhcpServer1.app[0].typename = "DhcpServer"
*.dhcpServer1.app[0].interface = "eth0"
*.dhcpServer1.app[0].numReservedAddresses = 10
*.dhcpServer1.app[0].maxNumClients = 100
*.dhcpServer1.app[0].leaseTime = 100s

*.dhcpServer2.numApps = 1
*.dhcpServer2.app[0].typename = "DhcpServer"
*.dhcpServer2.app[0].interface = "eth0"
*.dhcpServer2.app[0].numReservedAddresses = 10
*.dhcpServer2.app[0].maxNumClients = 100
*.dhcpServer2.app[0].leaseTime = 100s

*.dhcpServer*.forwarding = true
