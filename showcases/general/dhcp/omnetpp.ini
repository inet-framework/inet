[General]
network = DhcpShowcase
**.eth[*].bitrate = 100Mbps

# Configurator: assign static IP only to the DHCP server
*.configurator.config = xml("<config><interface hosts='dhcpServer' address='192.168.1.1' netmask='255.255.255.0'/></config>")

# Visualizer: show interface tables with address/mask
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true
#*.visualizer.interfaceTableVisualizer.format = "%a/%l"

# Enable computed checksums for PcapRecorder compatibility
**.checksumMode = "computed"
**.fcsMode = "computed"

# PcapRecorder on server for debugging/demonstration
*.dhcpServer.numPcapRecorders = 1
*.dhcpServer.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-dhcpServer.pcap"
**.pcapRecorder[*].alwaysFlush = true

[Config BasicDHCP]
description = "Basic DHCP address assignment (DORA exchange)"
sim-time-limit = 50s

# DHCP Server
*.dhcpServer.numApps = 1
*.dhcpServer.app[0].typename = "DhcpServer"
*.dhcpServer.app[0].numReservedAddresses = 10
*.dhcpServer.app[0].maxNumClients = 50
*.dhcpServer.app[0].gateway = "192.168.1.1"
*.dhcpServer.app[0].leaseTime = 3600s

# DHCP Clients
*.client[*].numApps = 1
*.client[*].app[0].typename = "DhcpClient"
*.client[*].app[0].startTime = uniform(0s, 2s)

# Visualizer: on the hosts only (not the switch, whose port MACs would just
# overlap), show each interface's MAC below the IP, so the server's lease
# table (IP -> MAC) can be matched to the hosts on the canvas
*.visualizer.interfaceTableVisualizer.format = "%N %\\%a%/%l%\\%m"
*.visualizer.interfaceTableVisualizer.nodeFilter = "dhcpServer or client*"

[Config LeaseRenewal]
description = "DHCP lease renewal (short lease triggers T1 renewal timer)"
extends = BasicDHCP
sim-time-limit = 200s

# Override lease time to 60s so T1=30s triggers renewal during simulation
*.dhcpServer.app[0].leaseTime = 60s

[Config CleanShutdown]
description = "DHCP client clean shutdown sends DHCPRELEASE; restart does a fresh DORA"
extends = BasicDHCP
sim-time-limit = 200s

**.hasStatus = true
*.scenarioManager.script = xmldoc("scenario_clean_shutdown.xml")
*.dhcpServer.app[0].leaseTime = 120s

[Config ClientCrash]
description = "DHCP client crash and restart (INIT-REBOOT) using ScenarioManager"
extends = BasicDHCP
sim-time-limit = 200s

**.hasStatus = true
*.scenarioManager.script = xmldoc("scenario.xml")
*.dhcpServer.app[0].leaseTime = 120s

[Config LeaseExpiration]
description = "Server reclaims a non-released address after leaseTime elapses"
extends = BasicDHCP
sim-time-limit = 200s

# 1-address pool: client[0] takes .10, no one else can join until it expires.
*.dhcpServer.app[0].maxNumClients = 1
*.dhcpServer.app[0].leaseTime = 30s

# client[0] runs at t=0, crashes at t=5; client[1] starts at t=80 (well after
# the lease expired) and must be able to acquire the reclaimed .10.
**.hasStatus = true
*.client[*].status.initialStatus = "down"
*.scenarioManager.script = xmldoc("scenario_lease_expiration.xml")

[Config ServerReboot]
description = "DHCP server reboot causes lease rejection and re-acquisition"
extends = BasicDHCP
sim-time-limit = 200s

**.hasStatus = true
*.scenarioManager.script = xmldoc("scenario_server_reboot.xml")
*.dhcpServer.app[0].leaseTime = 100s

[Config LossyDORA]
description = "Client retransmits DHCPDISCOVER with exponential backoff while server is down"
extends = BasicDHCP
sim-time-limit = 30s

# Only one client tries to bind; the server starts up at t=10s.
*.client[1..2].numApps = 0

# Server is initially down; ScenarioManager brings it up at t=10s.
**.hasStatus = true
*.dhcpServer.status.initialStatus = "down"
*.scenarioManager.script = xmldoc("scenario_lossy_dora.xml")

# Record DHCP traffic on the switch (which is always up) so the burst of
# retransmits sent while dhcpServer is DOWN is actually captured.
*.dhcpServer.numPcapRecorders = 0
*.switch.numPcapRecorders = 1
*.switch.pcapRecorder[0].pcapFile = "${resultdir}/${configname}-switch.pcap"

[Config Roaming]
description = "Mobile client roams between two wireless DHCP servers"
network = DhcpRoaming
sim-time-limit = 200s

# Radio
**.wlan[*].radio.transmitter.power = 2mW
**.radio.displayCommunicationRange = true

# Visualize data-link frames as fading arrows on the canvas, but filter out
# the constant 802.11 beacons so the chart stays focused on the DHCP and
# association traffic that drives the roam.
*.visualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.dataLinkVisualizer.packetFilter = "not (*Beacon* or *Probe*)"

# Quiet the built-in radio-signal animation so the canvas only shows the
# data-link arrows above (otherwise every transmission also draws a halo).
*.visualizer.mediumVisualizer[*].displaySignals = false

# Configurator: static addresses for wired interfaces only
*.configurator.config = xml(" \
    <config> \
        <interface hosts='dhcpServer1' names='eth0' address='192.168.1.1' netmask='255.255.255.0'/> \
        <interface hosts='dhcpServer2' names='eth0' address='192.168.2.1' netmask='255.255.255.0'/> \
        <interface among='server dhcpServer1' address='192.168.3.x' netmask='255.255.255.0'/> \
        <interface among='server dhcpServer2' address='192.168.4.x' netmask='255.255.255.0'/> \
        <wireless hosts='client'/> \
        <route hosts='server' destination='192.168.1.0' netmask='255.255.255.0' gateway='dhcpServer1' /> \
        <route hosts='server' destination='192.168.2.0' netmask='255.255.255.0' gateway='dhcpServer2' /> \
    </config> \
    ")

# Client mobility
*.client.mobility.typename = "RectangleMobility"
*.client.mobility.constraintAreaMinX = 60m
*.client.mobility.constraintAreaMinY = 100m
*.client.mobility.constraintAreaMaxX = 540m
*.client.mobility.constraintAreaMaxY = 150m
*.client.mobility.startPos = 0
*.client.mobility.speed = 20mps

**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 100m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxX = 600m
**.mobility.constraintAreaMaxY = 450m
**.mobility.constraintAreaMaxZ = 0m

# DHCP client
*.client.numApps = 1
*.client.app[0].typename = "DhcpClient"

# DHCP servers
*.dhcpServer1.numApps = 1
*.dhcpServer1.app[0].typename = "DhcpServer"
*.dhcpServer1.app[0].interface = "eth0"
*.dhcpServer1.app[0].numReservedAddresses = 10
*.dhcpServer1.app[0].maxNumClients = 100
*.dhcpServer1.app[0].leaseTime = 100s

*.dhcpServer2.numApps = 1
*.dhcpServer2.app[0].typename = "DhcpServer"
*.dhcpServer2.app[0].interface = "eth0"
*.dhcpServer2.app[0].numReservedAddresses = 10
*.dhcpServer2.app[0].maxNumClients = 100
*.dhcpServer2.app[0].leaseTime = 100s

*.dhcpServer*.forwarding = true
