[General]
network = inet.test.moduletest.lib.TcpTestNet1

#default-run=1

*.testing=false

# for scriptabletester
*.tcptester.script=""

# for randomtester
*.tcptester.pdelete=0
*.tcptester.pdelay=0
*.tcptester.pcopy=0
*.tcptester.numCopies=1
*.tcptester.delayValue=0

# cient and server test apps
*.cli_app.localAddress="10.0.0.1"
*.cli_app.localPort=1000
*.cli_app.connectAddress="10.0.0.2"
*.cli_app.connectPort=2000
*.srv_app.localAddress="10.0.0.2"
*.srv_app.localPort=2000
*.srv_app.connectAddress="10.0.0.1"
*.srv_app.connectPort=1000

*.cli_app.active=true
*.srv_app.active=false
*.cli_app.tOpen=0s
*.srv_app.tOpen=0s

*.cli_app.tSend=-1s
*.srv_app.tSend=-1s
*.cli_app.sendBytes=0B
*.srv_app.sendBytes=0B
*.cli_app.sendScript=""
*.srv_app.sendScript=""

*.cli_app.tClose=-1s
*.srv_app.tClose=-1s

# tcp settings
*.*_tcp.tcpAlgorithmClass="TcpReno"
*.*_tcp.advertisedWindow = 16384
*.*_tcp.delayedAcksEnabled = true
*.*_tcp.mss = 1024

# Pin the current (legacy) TCP option/timer defaults so that a later
# defaults-modernization change (workstream B8) stays a pure src/ diff and does
# not silently shift these trace-pinning tests. These equal the current Tcp.ned
# defaults; see tests/module/*.test that also pin them explicitly (immune anyway).
*.*_tcp.sackSupport = false
*.*_tcp.windowScalingSupport = false
*.*_tcp.timestampSupport = false
*.*_tcp.limitedTransmitEnabled = false
*.*_tcp.initialWindow = "rfc2001"
*.*_tcp.initialRto = 3s
*.*_tcp.minRto = 1s
*.*_tcp.maxRto = 240s
*.*_tcp.keepAliveEnabled = false
