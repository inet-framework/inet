# Pre-modernization ("legacy") TCP parameter defaults, for module tests written
# before the B8 defaults flip. INCLUDE THIS LAST in a test's [General] section:
# OMNeT++ uses the FIRST matching entry, so a test's own explicit tcp settings
# (appearing earlier in the file) take precedence, and these fill in only the
# parameters the test does not set. Both the TcpTestNet1 ("*_tcp") and the
# ClientServer/host ("tcp") module-naming conventions are covered; the two
# patterns are disjoint (**.tcp does not match cli_tcp/srv_tcp).
*.*_tcp.delayedAcksEnabled = false
*.*_tcp.limitedTransmitEnabled = false
*.*_tcp.sackSupport = false
*.*_tcp.windowScalingSupport = false
*.*_tcp.timestampSupport = false
*.*_tcp.initialWindow = "rfc2001"
*.*_tcp.initialRto = 3s
*.*_tcp.minRto = 1s
*.*_tcp.maxRto = 240s
*.*_tcp.mss = 536
*.*_tcp.advertisedWindow = 7504

**.tcp.delayedAcksEnabled = false
**.tcp.limitedTransmitEnabled = false
**.tcp.sackSupport = false
**.tcp.windowScalingSupport = false
**.tcp.timestampSupport = false
**.tcp.initialWindow = "rfc2001"
**.tcp.initialRto = 3s
**.tcp.minRto = 1s
**.tcp.maxRto = 240s
**.tcp.mss = 536
**.tcp.advertisedWindow = 7504

# congestion control default was TcpReno before C5
*.*_tcp.tcpAlgorithmClass = "TcpReno"
**.tcp.tcpAlgorithmClass = "TcpReno"

# loss-recovery defaults before D7 (dupthresh + features off)
*.*_tcp.lossDetectionMode = "dupthresh"
*.*_tcp.prrEnabled = false
*.*_tcp.lossUndoEnabled = false
*.*_tcp.adaptiveReorderingEnabled = false
**.tcp.lossDetectionMode = "dupthresh"
**.tcp.prrEnabled = false
**.tcp.lossUndoEnabled = false
**.tcp.adaptiveReorderingEnabled = false
