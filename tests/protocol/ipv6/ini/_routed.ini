#
# IPv6 conformance suite -- shared base config for the routed (multi-hop) network
# (Ipv6RoutedNetwork). The flat configurator statically addresses every interface and
# installs inter-router routes; DAD still runs on each link-local address. Per-test
# apps and knobs (Hop Limit, MTU, traffic timing) are layered per .test after this
# include. The NED path comes from the NEDPATH env set by run-tests.sh.
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#
[General]
network = inet.protocoltest.ipv6.Ipv6RoutedNetwork
sim-time-limit = 20s
seed-set = 0
record-vector-results = false

**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10
