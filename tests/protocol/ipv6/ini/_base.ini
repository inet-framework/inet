#
# IPv6 conformance suite -- shared base config (included by every test's %inifile).
#
# One advertising router + two hosts on a single Ethernet LAN (Ipv6LanNetwork, a switch
# joins all three into one IPv6 link). The router advertises the on-link /64 prefix as an
# AdvPrefix (configured directly on the router via its per-node `routes` XML, which works
# regardless of the switched topology), so the hosts autoconfigure their global address by
# SLAAC from the Router Advertisements -- the RFC 4862 path the suite observes. The
# Ipv6NetworkConfigurator adds the on-link routes but does not assign host addresses
# (assignAddressesToHosts=false). The router's unsolicited-RA cadence is turned down to a
# few seconds so periodic Router Advertisements fall inside the simulation.
#
# From this one configuration the whole boot sequence unfolds by itself: link-local DAD,
# Router Solicitation/Advertisement, SLAAC global-address formation + its DAD, and (once a
# host->host flow is added) address resolution. Per-test knobs (DAD disabled, same-MAC
# collision, optimistic DAD, bootup ordering, traffic) are layered per .test after this
# include. The NED path comes from the NEDPATH env set by run-tests.sh.
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#
[General]
network = inet.protocoltest.ipv6.Ipv6LanNetwork
sim-time-limit = 10s
seed-set = 0
record-vector-results = false

# On-link routes only; hosts obtain their global address dynamically (SLAAC).
*.configurator.assignAddressesToHosts = false
*.configurator.config = xml("<config> \
        <interface among='host1 host2 router' prefix='2001:db8:1:1::/64'/> \
    </config>")

# Make the router advertise the on-link prefix (SLAAC autonomous flag on). The
# Ipv6NetworkConfigurator does not set up an AdvPrefix across a switch, so it is
# configured here directly on the router's Ipv6RoutingTable.
*.router.routes = xml("<routingTable> \
        <local node='router'> \
            <interface name='eth0' AdvSendAdvertisements='on'> \
                <AdvPrefix AdvValidLifetime='2592000' AdvPreferredLifetime='604800' \
                           AdvOnLinkFlag='true' AdvAutonomousFlag='true'>2001:db8:1:1::/64</AdvPrefix> \
                <inetAddr tentative='false'>2001:db8:1:1::1</inetAddr> \
            </interface> \
        </local> \
    </routingTable>")

# Fast unsolicited RAs (3-4 s) so periodic Router Advertisements are observable.
*.router.ipv6.neighbourDiscovery.minIntervalBetweenRAs = 3s
*.router.ipv6.neighbourDiscovery.maxIntervalBetweenRAs = 4s

# Ethernet NIC queue (mirrors the tests/module IPv6 setups).
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10
