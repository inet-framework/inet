[General]
network = ProtocolTestDemo
sim-time-limit = 1s

# Deterministic: fixed seed.
seed-set = 0

# ---- UDP scenario: host1 sends periodic UDP datagrams to host2 ----
[Config UdpScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 5000
*.host1.app[0].localPort = 4000
*.host1.app[0].messageLength = 100B
*.host1.app[0].sendInterval = 0.2s
*.host1.app[0].startTime = 0.1s
*.host2.numApps = 1
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 5000

# ---- TCP scenario: host1 opens a connection to host2 (echo server) ----
[Config TcpScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "TcpSessionApp"
*.host1.app[0].connectAddress = "host2"
*.host1.app[0].connectPort = 1000
*.host1.app[0].tOpen = 0.1s
*.host1.app[0].tSend = 0.2s
*.host1.app[0].sendBytes = 100B
*.host1.app[0].tClose = 2s
*.host2.numApps = 1
*.host2.app[0].typename = "TcpEchoApp"
*.host2.app[0].localPort = 1000

# Phase 0: just log the normalised packet-event trace.
[Config Trace]
extends = UdpScenario
*.tester.logEvents = true

# Phase 1: matching-engine program (PASS expected).
[Config Pass]
extends = UdpScenario
*.tester.testName = "udp_basic_pass"

# Phase 1: matching-engine program that must miss its deadline (FAIL expected).
[Config Fail]
extends = UdpScenario
*.tester.testName = "udp_basic_fail"

# Phase 5: cross-node delivery correlation (PASS).
[Config Delivery]
extends = UdpScenario
*.tester.testName = "udp_delivery"

# Phase 5: alternation -- first matching branch wins (PASS).
[Config AnyOf]
extends = UdpScenario
*.tester.testName = "udp_anyof"

# Phase 5: repeat N occurrences (PASS).
[Config Repeat]
extends = UdpScenario
*.tester.testName = "udp_repeat"

# Phase 5: closed-world strict mode -- an in-scope but wrong packet fails (FAIL).
[Config StrictBad]
extends = UdpScenario
*.tester.testName = "udp_strict_bad"

# Phase 2: log the TCP-layer trace (to author/verify handshake assertions).
[Config TcpTrace]
extends = TcpScenario
*.tester.logEvents = true

# Phase 2: lambda predicates + captures asserting handshake seq/ack relations (PASS).
[Config TcpHandshake]
extends = TcpScenario
*.tester.testName = "tcp_handshake_seq"

# Phase 2: same, but asserts a wrong ack relationship (FAIL expected).
[Config TcpHandshakeBad]
extends = TcpScenario
*.tester.testName = "tcp_handshake_seq_bad"

# ---- Echo scenario: host2 echoes UDP datagrams; host1 has no app ----
[Config UdpEchoScenario]
*.host1.numApps = 0
*.host2.numApps = 1
*.host2.app[0].typename = "UdpEchoApp"
*.host2.app[0].localPort = 5000

# Phase 3: inject a UDP datagram into host2; assert it echoes back (PASS).
[Config Inject]
extends = UdpEchoScenario
*.tester.testName = "udp_inject_echo"

# ---- TCP peer scenario: host1 actively opens to a phantom IP (no real peer) ----
[Config TcpPeerScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "TcpSessionApp"
*.host1.app[0].connectAddress = "10.0.0.99"
*.host1.app[0].connectPort = 1000
*.host1.app[0].tOpen = 0.1s
*.host1.app[0].tSend = 5s
*.host1.app[0].sendBytes = 10B
*.host1.app[0].tClose = -1s
*.host2.numApps = 0

# Phase 4: reactive three-way handshake driven by the test as peer (PASS).
[Config TcpPeer]
extends = TcpPeerScenario
*.tester.testName = "tcp_handshake_peer"

# ---- Multi-flow scenario: host1 runs two UDP flows (ports 5000 and 5001) ----
[Config MultiFlowScenario]
*.host1.numApps = 2
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 5000
*.host1.app[0].messageLength = 100B
*.host1.app[0].sendInterval = 0.2s
*.host1.app[0].startTime = 0.1s
*.host1.app[1].typename = "UdpBasicApp"
*.host1.app[1].destAddresses = "host2"
*.host1.app[1].destPort = 5001
*.host1.app[1].messageLength = 100B
*.host1.app[1].sendInterval = 0.2s
*.host1.app[1].startTime = 0.15s
*.host2.numApps = 2
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 5000
*.host2.app[1].typename = "UdpSink"
*.host2.app[1].localPort = 5001

# Phase 5: unordered multi-flow + negative assertion (PASS).
[Config MultiFlow]
extends = MultiFlowScenario
*.tester.testName = "multi_flow"

# Phase 5: a negative assertion that is violated (FAIL).
[Config MultiFlowBad]
extends = MultiFlowScenario
*.tester.testName = "multi_flow_bad"

# Phase 5: an optional step that is skipped, then a required match (PASS).
[Config OptionalSkip]
extends = MultiFlowScenario
*.tester.testName = "optional_skip"

# ---- WiFi A-MSDU aggregation + Block Ack scenario (two ad-hoc 802.11n hosts) ----
[Config WifiScenario]
network = WifiBlockAckDemo
sim-time-limit = 0.05s
# bursty UDP so the queue builds up and the MAC aggregates + uses block ack
*.host1.numApps = 1
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 1000
*.host1.app[0].messageLength = 700B
*.host1.app[0].sendInterval = 0.1ms
*.host1.app[0].packetName = "Data"
*.host2.numApps = 1
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 1000
*.host*.ipv4.arp.typename = "GlobalArp"
# QoS + Block Ack
*.host*.wlan[*].mac.qosStation = true
*.host*.wlan[*].classifier.typename = "QosClassifier"
*.host*.wlan[*].mac.hcf.isBlockAckSupported = true
# radio (from the INET block-ack showcase)
*.host*.wlan[*].radio.receiver.energyDetection = -105dBm
*.host*.wlan[*].radio.receiver.sensitivity = -105dBm
*.host*.wlan[*].radio.receiver.snirThreshold = 0dB
*.host*.wlan[*].radio.transmitter.power = 0.12mW
# no fragmentation; enable A-MSDU aggregation
**.hcf.originatorMacDataService.fragmentationPolicy.fragmentationThreshold = 10000B
**.hcf.originatorMacDataService.msduAggregationPolicy.subframeNumThreshold = 2
**.hcf.originatorMacDataService.msduAggregationPolicy.aggregationLengthThreshold = 100

# Trace the WiFi MAC frame sequence (for authoring the test).
[Config WifiTrace]
extends = WifiScenario
sim-time-limit = 0.03s
*.tester.logEvents = true

# Block Ack frame sequence -- aggregation disabled (single MPDUs) so the agreement is used.
[Config WifiBlockAck]
extends = WifiScenario
*.tester.testName = "wifi_block_ack"
**.hcf.originatorMacDataService.msduAggregationPolicy.aggregationLengthThreshold = 10000
**.hcf.originatorMacDataService.msduAggregationPolicy.subframeNumThreshold = 100

# A-MSDU aggregation frame -- aggregation enabled (inherited from WifiScenario).
[Config WifiAggregation]
extends = WifiScenario
*.tester.testName = "wifi_aggregation"
