[General]
network = ProtocolTestDemo
sim-time-limit = 1s

# Deterministic: fixed seed.
seed-set = 0

# ---- UDP scenario: host1 sends periodic UDP datagrams to host2 ----
[Config UdpScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 5000
*.host1.app[0].localPort = 4000
*.host1.app[0].messageLength = 100B
*.host1.app[0].sendInterval = 0.2s
*.host1.app[0].startTime = 0.1s
*.host2.numApps = 1
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 5000

# ---- TCP scenario: host1 opens a connection to host2 (echo server) ----
[Config TcpScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "TcpSessionApp"
*.host1.app[0].connectAddress = "host2"
*.host1.app[0].connectPort = 1000
*.host1.app[0].tOpen = 0.1s
*.host1.app[0].tSend = 0.2s
*.host1.app[0].sendBytes = 100B
*.host1.app[0].tClose = 2s
*.host2.numApps = 1
*.host2.app[0].typename = "TcpEchoApp"
*.host2.app[0].localPort = 1000

# Phase 0: just log the normalised packet-event trace.
[Config Trace]
extends = UdpScenario
*.tester.logEvents = true

# Phase 1: matching-engine program (PASS expected).
[Config Pass]
extends = UdpScenario
*.tester.testName = "udp_basic_pass"

# Cookbook: ARP request/reply, observed on the default-ARP UDP scenario (PASS).
[Config ArpResolution]
extends = UdpScenario
*.tester.testName = "arp_resolution"

# Cookbook: IPv4 fragmentation of a 4000-byte UDP datagram over a 1500-byte MTU (PASS).
[Config Fragmentation]
extends = UdpScenario
*.host1.app[0].messageLength = 4000B
*.tester.testName = "ipv4_fragmentation"

# Trace for authoring the fragmentation assertions.
[Config FragTrace]
extends = UdpScenario
*.host1.app[0].messageLength = 4000B
*.tester.logEvents = true

# Phase 1: matching-engine program that must miss its deadline (FAIL expected).
[Config Fail]
extends = UdpScenario
*.tester.testName = "udp_basic_fail"

# Phase 5: cross-node delivery correlation (PASS).
[Config Delivery]
extends = UdpScenario
*.tester.testName = "udp_delivery"

# Phase 5: alternation -- first matching branch wins (PASS).
[Config AnyOf]
extends = UdpScenario
*.tester.testName = "udp_anyof"

# Phase 5: repeat N occurrences (PASS).
[Config Repeat]
extends = UdpScenario
*.tester.testName = "udp_repeat"

# Greedy count, lower bound satisfied (PASS).
[Config CountPass]
extends = UdpScenario
*.tester.testName = "udp_count_pass"

# Greedy count, upper bound overflowed (FAIL).
[Config CountOverflow]
extends = UdpScenario
*.tester.testName = "udp_count_overflow"

# Phase 5: closed-world strict mode -- an in-scope but wrong packet fails (FAIL).
[Config StrictBad]
extends = UdpScenario
*.tester.testName = "udp_strict_bad"

# Phase 2: log the TCP-layer trace (to author/verify handshake assertions).
[Config TcpTrace]
extends = TcpScenario
*.tester.logEvents = true

# Phase 2: lambda predicates + captures asserting handshake seq/ack relations (PASS).
[Config TcpHandshake]
extends = TcpScenario
*.tester.testName = "tcp_handshake_seq"

# Phase 2: same, but asserts a wrong ack relationship (FAIL expected).
[Config TcpHandshakeBad]
extends = TcpScenario
*.tester.testName = "tcp_handshake_seq_bad"

# ---- Echo scenario: host2 echoes UDP datagrams; host1 has no app ----
[Config UdpEchoScenario]
*.host1.numApps = 0
*.host2.numApps = 1
*.host2.app[0].typename = "UdpEchoApp"
*.host2.app[0].localPort = 5000

# Phase 3: inject a UDP datagram into host2; assert it echoes back (PASS).
[Config Inject]
extends = UdpEchoScenario
*.tester.testName = "udp_inject_echo"

# ---- TCP peer scenario: host1 actively opens to a phantom IP (no real peer) ----
[Config TcpPeerScenario]
*.host1.numApps = 1
*.host1.app[0].typename = "TcpSessionApp"
*.host1.app[0].connectAddress = "10.0.0.99"
*.host1.app[0].connectPort = 1000
*.host1.app[0].tOpen = 0.1s
*.host1.app[0].tSend = 5s
*.host1.app[0].sendBytes = 10B
*.host1.app[0].tClose = -1s
*.host2.numApps = 0

# Phase 4: reactive three-way handshake driven by the test as peer (PASS).
[Config TcpPeer]
extends = TcpPeerScenario
*.tester.testName = "tcp_handshake_peer"

# ---- Multi-flow scenario: host1 runs two UDP flows (ports 5000 and 5001) ----
[Config MultiFlowScenario]
*.host1.numApps = 2
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 5000
*.host1.app[0].messageLength = 100B
*.host1.app[0].sendInterval = 0.2s
*.host1.app[0].startTime = 0.1s
*.host1.app[1].typename = "UdpBasicApp"
*.host1.app[1].destAddresses = "host2"
*.host1.app[1].destPort = 5001
*.host1.app[1].messageLength = 100B
*.host1.app[1].sendInterval = 0.2s
*.host1.app[1].startTime = 0.15s
*.host2.numApps = 2
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 5000
*.host2.app[1].typename = "UdpSink"
*.host2.app[1].localPort = 5001

# Phase 5: unordered multi-flow + negative assertion (PASS).
[Config MultiFlow]
extends = MultiFlowScenario
*.tester.testName = "multi_flow"

# Phase 5: a negative assertion that is violated (FAIL).
[Config MultiFlowBad]
extends = MultiFlowScenario
*.tester.testName = "multi_flow_bad"

# Phase 5: an optional step that is skipped, then a required match (PASS).
[Config OptionalSkip]
extends = MultiFlowScenario
*.tester.testName = "optional_skip"

# ---- WiFi A-MSDU aggregation + Block Ack scenario (two ad-hoc 802.11n hosts) ----
[Config WifiScenario]
network = WifiBlockAckDemo
sim-time-limit = 0.05s
# bursty UDP so the queue builds up and the MAC aggregates + uses block ack
*.host1.numApps = 1
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host2"
*.host1.app[0].destPort = 1000
*.host1.app[0].messageLength = 700B
*.host1.app[0].sendInterval = 0.1ms
*.host1.app[0].packetName = "Data"
*.host2.numApps = 1
*.host2.app[0].typename = "UdpSink"
*.host2.app[0].localPort = 1000
*.host*.ipv4.arp.typename = "GlobalArp"
# QoS + Block Ack
*.host*.wlan[*].mac.qosStation = true
*.host*.wlan[*].classifier.typename = "QosClassifier"
*.host*.wlan[*].mac.hcf.isBlockAckSupported = true
# radio (from the INET block-ack showcase)
*.host*.wlan[*].radio.receiver.energyDetection = -105dBm
*.host*.wlan[*].radio.receiver.sensitivity = -105dBm
*.host*.wlan[*].radio.receiver.snirThreshold = 0dB
*.host*.wlan[*].radio.transmitter.power = 0.12mW
# no fragmentation; enable A-MSDU aggregation
**.hcf.originatorMacDataService.fragmentationPolicy.fragmentationThreshold = 10000B
**.hcf.originatorMacDataService.msduAggregationPolicy.subframeNumThreshold = 2
**.hcf.originatorMacDataService.msduAggregationPolicy.aggregationLengthThreshold = 100

# Trace the WiFi MAC frame sequence (for authoring the test).
[Config WifiTrace]
extends = WifiScenario
sim-time-limit = 0.03s
*.tester.logEvents = true

# Block Ack frame sequence -- aggregation disabled (single MPDUs) so the agreement is used.
[Config WifiBlockAck]
extends = WifiScenario
*.tester.testName = "wifi_block_ack"
**.hcf.originatorMacDataService.msduAggregationPolicy.aggregationLengthThreshold = 10000
**.hcf.originatorMacDataService.msduAggregationPolicy.subframeNumThreshold = 100
# request a Block Ack after a block of 5 data frames
*.host*.wlan[*].mac.hcf.originatorAckPolicy.blockAckReqThreshold = 5

# A-MSDU aggregation frame -- aggregation enabled (inherited from WifiScenario).
[Config WifiAggregation]
extends = WifiScenario
*.tester.testName = "wifi_aggregation"

# The full Block Ack sequence including ACKs (aggregation disabled, as in WifiBlockAck).
[Config WifiBlockAckFull]
extends = WifiBlockAck
*.tester.testName = "wifi_block_ack_full"

# ---- Phase 6 MITM scenario: TCP over a wired link with a PacketTap in the middle ----
[Config MitmTcpScenario]
network = ProtocolTestMitmDemo
sim-time-limit = 8s
*.host1.numApps = 1
*.host1.app[0].typename = "TcpSessionApp"
*.host1.app[0].connectAddress = "host2"
*.host1.app[0].connectPort = 1000
*.host1.app[0].tOpen = 0.1s
*.host1.app[0].tSend = 0.2s
*.host1.app[0].sendBytes = 100B
*.host1.app[0].tClose = -1s
*.host2.numApps = 1
*.host2.app[0].typename = "TcpEchoApp"
*.host2.app[0].localPort = 1000
# static ARP: no ARP exchange needed, so the only frames on the wire are the TCP/IP ones.
# Ipv4FlatNetworkConfigurator (set in the .ned) puts both hosts on one flat subnet and
# traverses the (non-IP) PacketTap for connectivity, so the split link is not a problem.
*.host*.ipv4.arp.typename = "GlobalArp"

# Transparent tap: verify the splice is transparent and trace the TCP frame sequence.
[Config MitmTrace]
extends = MitmTcpScenario
*.tap.action = "pass"
*.tester.logEvents = true

# Drop the first TCP data segment on the wire (the drop is driven by the test program's
# intercept(...) clause, so the tap needs no parameters here); the test asserts host1
# retransmits the same segment after the RTO. Should PASS.
[Config MitmRetransmit]
extends = MitmTcpScenario
*.tester.testName = "tcp_retransmit"

# Same, but the tap corrupts (mutates) the first data segment instead of dropping it.
[Config MitmMutate]
extends = MitmTcpScenario
*.tester.testName = "tcp_retransmit_mutate"

# ---- Phase 9 PLCA (10BASE-T1S) scenario: a controller + 2 data nodes on a multidrop bus ----
[Config PlcaScenario]
network = PlcaMultidropDemo
sim-time-limit = 2ms
seed-set = 0
*.numNodes = 2
# node[0] sends raw-Ethernet frames to the controller, so it uses its transmit opportunity.
*.*.ethernet.hasSocketSupport = true
*.node[0].numApps = 1
*.node[0].app[0].typename = "EthernetSourceApp"
*.node[0].app[0].io.interface = "eth0"
*.node[0].app[0].io.remoteAddress = "controller"
*.node[0].app[0].source.packetLength = 46B
*.node[0].app[0].source.productionInterval = 200us
*.controller.numApps = 1
*.controller.app[0].typename = "EthernetSinkApp"
*.controller.app[0].io.interface = "eth0"
*.controller.app[0].io.localAddress = "controller"

# Authoring: dump the PLCA state-machine signal trace (control + data FSM, TO id, commands).
[Config PlcaTrace]
extends = PlcaScenario
*.tester.stateSignals = "controlStateChanged dataStateChanged curID rxCmd txCmd"

# Phase 9: assert the PLCA control/data state-machine sequence (PASS).
[Config Plca]
extends = PlcaScenario
*.tester.testName = "plca_beacon_cycle"

# Phase 9: a deliberately-wrong state assertion (FAIL).
[Config PlcaBad]
extends = PlcaScenario
*.tester.testName = "plca_beacon_cycle_bad"

# ---- Mobile IPv6 (RFC 6275): MN roams home->foreign, registers with the HA, and route-
#      optimizes with the CN. Parameters mirror INET's proven MIPv6 route-optimization
#      module test so the handover + return-routability exchange fire deterministically. ----
[Config Mipv6Scenario]
network = Mipv6Demo
sim-time-limit = 85s
seed-set = 1
num-rngs = 3
**.mobility.rng-0 = 2
*.total_mn = 1
*.total_cn = 1

# RA-based movement detection (legacy path the module test uses)
**.neighbourDiscovery.minIntervalBetweenRAs = 3s
**.neighbourDiscovery.maxIntervalBetweenRAs = 7s
**.neighbourDiscovery.detectL2Movement = false

# radio medium
*.radioMedium.mediumLimitCache.maxTransmissionPower = 2.0mW
*.radioMedium.mediumLimitCache.minReceptionPower = -82dBm
*.radioMedium.mediumLimitCache.minInterferencePower = -82dBm
**.analogModel.ignorePartialInterference = true

# access points
**.wlan*.mgmt.numAuthSteps = 4
**.AP*.wlan*.mgmt.beaconInterval = 0.1s
**.AP_Home.wlan*.mgmt.ssid = "HOME"
**.AP_Home.wlan*.address = "10:AA:00:00:00:01"
**.AP_Home.eth[0].address = "10:AE:00:00:00:02"
**.AP_Home.eth[0].duplexMode = true
**.AP_1.wlan*.mgmt.ssid = "AP1"
**.AP_1.wlan*.address = "10:AA:00:00:A1:01"
**.AP_1.eth[0].address = "10:AE:00:00:A1:02"
**.AP_1.eth[0].duplexMode = true

# mobile node movement (rectangle: dwells in each AP's coverage; handover completes < t=70)
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.MN[0].mobility.typename = "RectangleMobility"
**.MN[0].mobility.constraintAreaMinX = 180m
**.MN[0].mobility.constraintAreaMinY = 170m
**.MN[0].mobility.constraintAreaMaxX = 630m
**.MN[0].mobility.constraintAreaMaxY = 180m
**.MN[0].mobility.startPos = 0
**.MN[0].mobility.speed = 5mps
**.MN*.mobility.updateInterval = 0.1s

# CN sends sparse pings to the MN's home address; tunneled traffic triggers route optimization
**.MN*.numApps = 0
**.CN*.numApps = 1
**.CN*.app[*].typename = "PingApp"
**.CN[0].app[0].destAddr = "aaaa:0:66:0:8aa:ff:fe00:8"
**.CN*.app[0].packetSize = 56B
**.CN*.app[*].sendInterval = 2s
**.CN*.app[0].hopLimit = 32
**.CN[0].app[0].count = 5
**.CN[0].app[0].startTime = 71s

**.forwarding = false

# Ethernet NICs
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10
**.eth*.duplexMode = true

# wireless channels
**.AP_Home.wlan*.radio.channelNumber = 1
**.AP_1.wlan*.radio.channelNumber = 2
**.MN*.wlan*.radio.channelNumber = 0
**.wlan*.agent.activeScan = true
**.wlan*.agent.defaultSsid = ""
**.wlan*.agent.channelsToScan = "1 2"
**.wlan*.agent.probeDelay = 0.1s
**.wlan*.agent.minChannelTime = 0.15s
**.wlan*.agent.maxChannelTime = 0.3s
**.wlan*.agent.authenticationTimeout = 5s
**.wlan*.agent.associationTimeout = 5s
**.wlan*.bitrate = 2Mbps
**.wlan*.mac.dcf.channelAccess.cwMin = 7
**.radio.transmitter.power = 2.0mW

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 850m
**.constraintAreaMaxY = 850m

# Authoring: log the packet trace to find the Mobility Header messages + field paths.
[Config Mipv6Trace]
extends = Mipv6Scenario
*.tester.logEvents = true

# The registration + route-optimization test (PASS).
[Config Mipv6]
extends = Mipv6Scenario
*.tester.testName = "mipv6_registration_and_ro"

# A deliberately-wrong assertion (FAIL).
[Config Mipv6Bad]
extends = Mipv6Scenario
*.tester.testName = "mipv6_registration_and_ro_bad"
