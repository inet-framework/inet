#
# Protocol Test Framework -- reusable base configuration.
#
# Include this from a test suite's omnetpp.ini to inherit the common settings every
# protocol-test scenario wants, then add your own [Config ...] sections:
#
#     include protocoltest-base.ini
#
#     [Config MyScenario]
#     network = MyNetwork
#     *.tester.testName = "my_program"
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#

[General]
# Deterministic runs: a fixed seed so traces (and therefore assertions) are reproducible.
seed-set = 0

# The ProtocolTester ends the simulation as soon as it reaches a PASS/FAIL verdict, but
# keep a finite limit so a never-satisfied program still terminates.
sim-time-limit = 1s

# By default a ProtocolTester with no testName just logs the normalised event trace; set
# *.tester.testName per [Config ...] to run a named program. Print the English description
# of the program at startup (set to false to silence it).
*.tester.printDescription = true

# Static ARP keeps the wire to just the frames under test (no ARP request/reply noise).
# Comment this out in a scenario that is specifically exercising ARP.
*.host*.ipv4.arp.typename = "GlobalArp"
