#
# WiFi conformance suite -- configurations.
#
# One [Config <test-name>] per test program; the section sets `*.tester.testName` to
# select the registered program. Per-generation PHY (opMode/band/antennas) is set in a
# [Config Wifi<Gen>Scenario] base that the test configs extend. A [Config Wifi<Gen>Trace]
# (logEvents=true) is provided for authoring assertions against the real frame sequence.
#
# Run e.g.:  ./wifitests -u Cmdenv -n .:../lib:../../../src -c wifi_association
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#

include ../lib/protocoltest-base.ini

[General]
network = WifiInfraNetwork
sim-time-limit = 5s
# Static ARP so the only frames on the air are the 802.11 ones under test.
*.sta*.ipv4.arp.typename = "GlobalArp"
*.ap.ipv4.arp.typename = "GlobalArp"

# ======================================================================================
# 802.11ac (WiFi 5) -- VHT, 5 GHz, 80 MHz
# ======================================================================================
[Config WifiAcScenario]
# Override the 1s safety limit from protocoltest-base.ini (its [General] wins by
# first-assignment, so set the real limit here, where the section outranks [General]).
sim-time-limit = 3s
*.sta*.wlan[*].opMode = "ac"
*.ap.wlan[*].opMode = "ac"
**.bandName = "5 GHz (80 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].radio.antenna.numAntennas = 2
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB
# QoS (EDCA) so data frames are QoS data (type 40) and aggregation/block-ack are usable.
*.sta*.wlan[*].mac.qosStation = true
*.ap.wlan[*].mac.qosStation = true
*.sta*.wlan[*].classifier.typename = "QosClassifier"
*.ap.wlan[*].classifier.typename = "QosClassifier"
# Uplink UDP from sta1 to sta2 (relayed by the AP), starting after association has
# settled (~0.6s). This is what produces the QoS data frames the tests observe.
*.sta1.numApps = 1
*.sta1.app[0].typename = "UdpBasicApp"
*.sta1.app[0].destAddresses = "sta2"
*.sta1.app[0].destPort = 5000
*.sta1.app[0].messageLength = 1000B
*.sta1.app[0].sendInterval = 2ms
*.sta1.app[0].startTime = 1s
*.sta2.numApps = 1
*.sta2.app[0].typename = "UdpSink"
*.sta2.app[0].localPort = 5000

# Authoring trace: dump the normalised event stream instead of running a program.
[Config WifiAcTrace]
extends = WifiAcScenario
*.tester.logEvents = true

# ---- tests ----
[Config wifi_association]
extends = WifiAcScenario
*.tester.testName = "wifi_association"

[Config wifi_11ac_vht_80mhz]
extends = WifiAcScenario
*.tester.testName = "wifi_11ac_vht_80mhz"
# Force an 80 MHz / 1-stream VHT mode (MCS7) for the PHY-mode assertion; the default
# rate selection would use a 20 MHz VHT mode. TX-only test, so reception SNR is moot.
*.sta*.wlan[*].bitrate = 292.5Mbps
*.ap.wlan[*].bitrate = 292.5Mbps
