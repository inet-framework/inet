#
# WiFi conformance suite -- shared base config (included by every test's %inifile).
#
# Generation-independent: the network, run limits, static ARP, baseline radio, and an
# uplink UDP flow sta1 -> sta2 (relayed by the AP) that starts after association settles
# and produces the data frames most tests observe. The NED path comes from the NEDPATH
# env set by run-tests.sh, so no ned-path is needed here.
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#
[General]
network = inet.protocoltest.wifi.WifiInfraNetwork
sim-time-limit = 3s
seed-set = 0

*.sta*.ipv4.arp.typename = "GlobalArp"
*.ap.ipv4.arp.typename = "GlobalArp"

**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.receiver.sensitivity = -85dBm
**.wlan[*].radio.receiver.snirThreshold = 4dB

*.sta1.numApps = 1
*.sta1.app[0].typename = "UdpBasicApp"
*.sta1.app[0].destAddresses = "sta2"
*.sta1.app[0].destPort = 5000
*.sta1.app[0].messageLength = 1000B
*.sta1.app[0].sendInterval = 2ms
*.sta1.app[0].startTime = 1s
*.sta2.numApps = 1
*.sta2.app[0].typename = "UdpSink"
*.sta2.app[0].localPort = 5000
