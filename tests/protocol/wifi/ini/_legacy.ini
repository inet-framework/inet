# 802.11-1997 legacy: DSSS at 1 Mbps (Ieee80211DsssMode), 2.4 GHz, DCF. (opMode "b" carries
# the legacy DSSS rates; bitrate 1Mbps forces a DSSS rather than an HR/DSSS-CCK mode.)
[General]
*.sta*.wlan[*].opMode = "b"
*.ap.wlan[*].opMode = "b"
**.bandName = "2.4 GHz"
**.wlan[*].radio.antenna.numAntennas = 1
*.sta*.wlan[*].bitrate = 1Mbps
*.ap.wlan[*].bitrate = 1Mbps
*.sta*.wlan[*].mac.qosStation = false
*.ap.wlan[*].mac.qosStation = false
