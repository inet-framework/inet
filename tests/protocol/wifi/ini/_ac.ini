#
# 802.11ac (WiFi 5) PHY: VHT, 5 GHz, 80 MHz channel, QoS/EDCA enabled.
# Included (before _base.ini) by every 11ac test's %inifile.
#
# SPDX-License-Identifier: LGPL-3.0-or-later
#
[General]
*.sta*.wlan[*].opMode = "ac"
*.ap.wlan[*].opMode = "ac"
**.bandName = "5 GHz (80 MHz)"
**.centerFrequency = 5GHz
**.wlan[*].radio.antenna.numAntennas = 2
# QoS (EDCA): data frames are QoS data (type 40); enables aggregation + block ack.
*.sta*.wlan[*].mac.qosStation = true
*.ap.wlan[*].mac.qosStation = true
*.sta*.wlan[*].classifier.typename = "QosClassifier"
*.ap.wlan[*].classifier.typename = "QosClassifier"
