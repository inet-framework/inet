[General]
sim-time-limit = 10s
**.vector-recording = false
*.*.eth[*].bitrate = 100Mbps
#*.numHostsPerSwitch = intuniform(1, 3)
#*.numHostsPerAccess = intuniform(1, 3)
#*.numHostsPerSite = intuniform(1, 3)
#*.numHostsPerLeaf = intuniform(1, 3)

# =============================================================================
# Classic research backbones (hand-crafted, fixed size)
# =============================================================================

[Config Nsfnet]
description = "14-node US research backbone (1989), sparse irregular mesh"
network = inet.networks.NsfnetNetwork

[Config UsBackbone]
description = "39-node irregular mesh modeled on major US/Canada carrier POPs"
network = inet.networks.UsBackboneNetwork

[Config LargeUsBackbone]
description = "56-node US backbone with geographic hub/periphery layout"
network = inet.networks.LargeUsBackboneNetwork

[Config Geant]
description = "22-node European research backbone, dense center with sparse periphery"
network = inet.networks.GeantNetwork

[Config LargeGeant]
description = "44-node European backbone with geographic node placement"
network = inet.networks.LargeGeantNetwork

[Config Cost239]
description = "11-node dense European optical reference network, high average degree"
network = inet.networks.Cost239Network

[Config LargeCost239]
description = "22-node dense optical mesh, 5 tiers with heavy cross-linking"
network = inet.networks.LargeCost239Network

[Config Irregular10]
description = "10-node hand-crafted irregular backbone"
network = inet.networks.Irregular10Network

[Config Irregular20]
description = "20-node hand-crafted irregular backbone"
network = inet.networks.Irregular20Network

[Config Irregular40]
description = "40-node hand-crafted irregular backbone"
network = inet.networks.Irregular40Network

[Config CrossLinkedTree]
description = "15-node tree with lateral cross-links for redundancy"
network = inet.networks.CrossLinkedTreeNetwork

[Config LargeCrossLinkedTree]
description = "30-node deeper/wider tree with cross-links"
network = inet.networks.LargeCrossLinkedTreeNetwork

[Config HubSpokeWan]
description = "18-node hub-and-spoke with branches and sub-branches"
network = inet.networks.HubSpokeWanNetwork

[Config LargeHubSpokeWan]
description = "36-node hub-spoke WAN with 5 hubs and deeper branches"
network = inet.networks.LargeHubSpokeWanNetwork

[Config ClusteredMesh]
description = "18-node network of 3 dense clusters with inter-cluster bridges"
network = inet.networks.ClusteredMeshNetwork

[Config LargeClusteredMesh]
description = "36-node clustered mesh with 6 clusters and 8 inter-cluster bridges"
network = inet.networks.LargeClusteredMeshNetwork

# =============================================================================
# Connectivity × redundancy combinations
# =============================================================================

[Config WcNoRedundancy]
description = "15-node weakly connected clusters joined by single bridge links, no redundancy"
network = inet.networks.WcNoRedundancyNetwork

[Config LargeWcNoRedundancy]
description = "30-node weakly connected network, no redundancy"
network = inet.networks.LargeWcNoRedundancyNetwork

[Config WcRegional]
description = "15-node weakly connected clusters internally meshed, lone bridges between regions"
network = inet.networks.WcRegionalNetwork

[Config LargeWcRegional]
description = "30-node weakly connected network with regional redundancy"
network = inet.networks.LargeWcRegionalNetwork

[Config WcEndToEnd]
description = "14-node weakly connected dual chains with cross-links, end-to-end redundancy"
network = inet.networks.WcEndToEndNetwork

[Config LargeWcEndToEnd]
description = "28-node weakly connected network with end-to-end redundancy"
network = inet.networks.LargeWcEndToEndNetwork

[Config HcNoRedundancy]
description = "13-node highly connected dense sub-graphs joined at articulation point"
network = inet.networks.HcNoRedundancyNetwork

[Config LargeHcNoRedundancy]
description = "26-node highly connected network, no redundancy"
network = inet.networks.LargeHcNoRedundancyNetwork

[Config HcRegional]
description = "16-node highly connected dense clusters with shared inter-cluster links"
network = inet.networks.HcRegionalNetwork

[Config LargeHcRegional]
description = "32-node highly connected network with regional redundancy"
network = inet.networks.LargeHcRegionalNetwork

[Config HcEndToEnd]
description = "14-node highly connected dense irregular mesh, end-to-end redundancy"
network = inet.networks.HcEndToEndNetwork

[Config LargeHcEndToEnd]
description = "28-node highly connected dense mesh"
network = inet.networks.LargeHcEndToEndNetwork

# =============================================================================
# Archetype topologies
# =============================================================================

[Config CoreAccess]
description = "20-node ISP-like: dense core mesh, dual-homed aggregation, irregular access trees"
network = inet.networks.CoreAccessNetwork

[Config LargeCoreAccess]
description = "40-node ISP-like: 6-node core, 6 aggregation, 28 access branches"
network = inet.networks.LargeCoreAccessNetwork

[Config PeerMesh]
description = "15-node flat irregular peer mesh, no hierarchy, uneven local density"
network = inet.networks.PeerMeshNetwork

[Config LargePeerMesh]
description = "30-node flat peer mesh with 5 overlapping clusters and sparse bridges"
network = inet.networks.LargePeerMeshNetwork

[Config ScaleFree]
description = "20-node hub-dominated organic growth, heavy-tailed degree distribution"
network = inet.networks.ScaleFreeNetwork

[Config LargeScaleFree]
description = "50-node scale-free: 4 hubs (deg 10-14), 10 connectors, 36 leaves"
network = inet.networks.LargeScaleFreeNetwork
