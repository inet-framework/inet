[General]
network = RegNetwork
sim-time-limit = 10s

*.configurator.config = xml("<config> \
        <interface hosts='xtr' address='10.0.0.1' netmask='255.255.255.0'/> \
        <interface hosts='ms' address='10.0.0.2' netmask='255.255.255.0'/> \
    </config>")

*.xtr.app[0].typename = "Lisp"
*.ms.app[0].typename = "Lisp"
*.xtr.app[0].configData = xmldoc("reg.xml", "LispConfig/Router[@id='xtr']/LISP")
*.ms.app[0].configData = xmldoc("reg.xml", "LispConfig/Router[@id='ms']/LISP")
