[General]
network = MapServerNetwork
sim-time-limit = 30s

# ----- addressing + routing (manual; coarse EID prefix -> TUN so cache-miss traffic is captured) -----
*.configurator.addStaticRoutes = false
*.configurator.config = xml("<config> \
        <interface hosts='host1' address='192.168.1.10' netmask='255.255.255.0'/> \
        <interface hosts='xtr1' names='eth0' address='192.168.1.1' netmask='255.255.255.0'/> \
        <interface hosts='xtr1' names='eth1' address='10.0.0.1' netmask='255.255.255.0'/> \
        <interface hosts='host2' address='192.168.2.10' netmask='255.255.255.0'/> \
        <interface hosts='xtr2' names='eth0' address='192.168.2.1' netmask='255.255.255.0'/> \
        <interface hosts='xtr2' names='eth1' address='10.0.0.2' netmask='255.255.255.0'/> \
        <interface hosts='ms' names='eth0' address='10.0.0.3' netmask='255.255.255.0'/> \
        <interface hosts='xtr1' names='tun0' address='192.0.2.1' netmask='255.255.255.0'/> \
        <interface hosts='xtr2' names='tun0' address='198.51.100.1' netmask='255.255.255.0'/> \
        <route hosts='host1' destination='0.0.0.0' netmask='0.0.0.0' gateway='192.168.1.1'/> \
        <route hosts='host2' destination='0.0.0.0' netmask='0.0.0.0' gateway='192.168.2.1'/> \
        <route hosts='xtr1' destination='192.168.1.0' netmask='255.255.255.0' interface='eth0'/> \
        <route hosts='xtr1' destination='10.0.0.0' netmask='255.255.255.0' interface='eth1'/> \
        <route hosts='xtr1' destination='192.168.0.0' netmask='255.255.0.0' interface='tun0'/> \
        <route hosts='xtr2' destination='192.168.2.0' netmask='255.255.255.0' interface='eth0'/> \
        <route hosts='xtr2' destination='10.0.0.0' netmask='255.255.255.0' interface='eth1'/> \
        <route hosts='xtr2' destination='192.168.0.0' netmask='255.255.0.0' interface='tun0'/> \
        <route hosts='ms' destination='10.0.0.0' netmask='255.255.255.0' interface='eth0'/> \
    </config>")

# ----- LISP -----
*.xtr*.hasUdp = true
*.ms.hasUdp = true
*.xtr*.app[0].typename = "Lisp"
*.ms.app[0].typename = "Lisp"
*.xtr1.app[0].configData = xmldoc("lisp.xml", "LispConfig/Router[@id='xtr1']/LISP")
*.xtr2.app[0].configData = xmldoc("lisp.xml", "LispConfig/Router[@id='xtr2']/LISP")
*.ms.app[0].configData = xmldoc("lisp.xml", "LispConfig/Router[@id='ms']/LISP")

# ----- host1 pings host2; xtr1 must dynamically resolve 192.168.2.0/24 -----
*.host1.numApps = 1
*.host1.app[0].typename = "PingApp"
*.host1.app[0].destAddr = "192.168.2.10"
*.host1.app[0].startTime = 5s
*.host1.app[0].sendInterval = 1s
