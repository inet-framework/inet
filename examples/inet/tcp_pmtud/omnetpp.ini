[General]
abstract = true
network = PmtudNet
sim-time-limit = 300s

# Bottleneck MTU (access links stay at default 1500 B)
*.router1.ppp[1].ppp.mtu = 800B
*.router2.ppp[0].ppp.mtu = 800B

# TCP
**.tcp.typename = "Tcp"
**.tcp.mss = 1460
**.checksumMode = "computed"

# Client: TcpBasicClientApp (request-response with think time gaps)
*.client.numApps = 1
*.client.app[0].typename = "TcpBasicClientApp"
*.client.app[0].connectAddress = "server"
*.client.app[0].connectPort = 1000
*.client.app[0].startTime = 1s
*.client.app[0].numRequestsPerSession = 10
*.client.app[0].requestLength = 100B
*.client.app[0].replyLength = 10000B
*.client.app[0].thinkTime = 5s
*.client.app[0].idleInterval = 10s

# Server
*.server.numApps = 1
*.server.app[0].typename = "TcpGenericServerApp"
*.server.app[0].localPort = 1000

# NIC queues
**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 50

# ---------------------------------------------------------------
# PMTUD disabled: no DF bit, router fragments oversized packets
# ---------------------------------------------------------------
[Config PmtudDisabled]
description = "PMTUD disabled: router fragments packets, no MSS change"
**.tcp.pmtudEnabled = false

# ---------------------------------------------------------------
# PMTUD enabled: client sets DF, gets ICMP Frag Needed, reduces MSS
# ---------------------------------------------------------------
[Config PmtudEnabled]
description = "PMTUD enabled: MSS reduced after ICMP Fragmentation Needed"
**.tcp.pmtudEnabled = true

# ---------------------------------------------------------------
# PMTUD probe: short timeout (60s) to demonstrate MSS restoration
# After 60s the original MSS is restored; if the bottleneck is
# still small, a new ICMP error reduces MSS again.
# ---------------------------------------------------------------
[Config PmtudProbe]
extends = PmtudEnabled
description = "PMTUD with short timeout: demonstrates MSS increase probe and re-reduction"
**.tcp.pmtudTimeout = 30s
