[General]
sim-time-limit = 30s

# ---------------------------------------------------------------
# Phase 2 demo: hard ICMP error aborts TCP connection in SYN_SENT
# ---------------------------------------------------------------
[Config HardError]
network = TcpIcmpErrorTest

*.configurator.config = xml("<config><interface hosts='*' address='10.0.0.x' netmask='255.255.255.0'/></config>")

# Client tries to TCP-connect to a Router that has no TCP module.
# Router's IPv4 sends ICMP Protocol Unreachable (hard error).
# Phase 2: TCP immediately reports CONNECTION_REFUSED.
*.client.numApps = 1
*.client.app[0].typename = "TcpSessionApp"
*.client.app[0].active = true
*.client.app[0].connectAddress = "target"
*.client.app[0].connectPort = 1000
*.client.app[0].localPort = -1
*.client.app[0].tOpen = 0.5s
*.client.app[0].tSend = 0s
*.client.app[0].sendBytes = 1B
*.client.app[0].tClose = -1s

# ---------------------------------------------------------------
# Phase 3 demo: PMTUD — ICMP Fragmentation Needed reduces TCP MSS
# ---------------------------------------------------------------
[Config Pmtud]
network = TcpPmtudTest

# Enable PMTUD: set DF bit so routers send ICMP PTB instead of fragmenting
**.tcp.dontFragment = true

# TCP MSS must exceed the bottleneck MTU (default mss=536 is too small).
# With mss=1460, TCP segments are 1460+20+20 = 1500 bytes.
**.tcp.mss = 1460

# Bottleneck: router-server PPP link has 576-byte MTU.
# TCP segments (1500 bytes) exceed this, triggering ICMP PTB when DF is set.
*.router.ppp[1].ppp.mtu = 576B

# ICMP must quote enough of the original packet for TCP seq validation
**.icmp.quoteLength = 100B

# Client sends a large TCP stream to server
*.client.numApps = 1
*.client.app[0].typename = "TcpSessionApp"
*.client.app[0].active = true
*.client.app[0].connectAddress = "server"
*.client.app[0].connectPort = 1000
*.client.app[0].localPort = -1
*.client.app[0].tOpen = 0.5s
*.client.app[0].tSend = 1s
*.client.app[0].sendBytes = 100000B
*.client.app[0].tClose = -1s

# Server: echo app
*.server.numApps = 1
*.server.app[0].typename = "TcpEchoApp"
*.server.app[0].localPort = 1000
*.server.app[0].echoFactor = 0
*.server.app[0].echoDelay = 0s
