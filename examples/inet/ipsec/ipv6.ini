[General]
network = TwoHosts6
abstract = true

# NIC configuration
**.ppp[*].queueType = "DropTailQueue"
**.ppp[*].queue.frameCapacity = 10

# wire each node's Ipv6NodeConfigurator to the global configurator (static global
# addresses, so "client1"/"server" in the SPD resolve to routable addresses)
**.ipv6.configurator.networkConfiguratorModule = "configurator"

# IPsec on both hosts; the SPD/SAD config is the same as the IPv4 example -- the
# selectors use module names (client1/server) that resolve to the nodes' IPv6 addresses
**.client*.**.hasIpsec = true
**.server.**.hasIpsec = true
**.client1.**spdConfig = xmldoc("ipsecConfig.xml", "ipsecConfig/Devices/Device[@id='client1']/")
**.server.**spdConfig = xmldoc("ipsecConfig.xml", "ipsecConfig/Devices/Device[@id='server']/")

**.ipsec.ahProtectOutDelay = 7us
**.ipsec.ahProtectInDelay  = 9us
**.ipsec.espProtectOutDelay = 7us
**.ipsec.espProtectInDelay  = 9us

[Config UDPTraffic6]
description = "IPsec over IPv6 with UDP traffic"
sim-time-limit = 200s

# Three streams (as in the IPv4 example):
#  app[0]: 1000->2000 UDP: ESP-protected
#  app[1]: 1001->2001 UDP: BYPASS
#  app[2]: 1002->2002 UDP: not in IPsec (dropped)
**.numApps = 3
**.client*.app[*].typename = "UdpBasicApp"
**.client*.app[0].localPort = 1000
**.client*.app[1].localPort = 1001
**.client*.app[2].localPort = 1002
**.client*.app[*].destAddresses = "server"
**.client*.app[0].destPort = 2000
**.client*.app[1].destPort = 2001
**.client*.app[2].destPort = 2002
**.client*.app[*].startTime = 1s
**.client*.app[*].stopTime = 5s
**.client*.app[*].sendInterval = 0.1s
**.client*.app[*].messageLength = 1024B

**.server*.app[*].typename = "UdpSink"
**.server*.app[0].localPort = 2000
**.server*.app[1].localPort = 2001
**.server*.app[2].localPort = 2002

[Config TCPTraffic6]
description = "IPsec over IPv6 with TCP traffic"
sim-time-limit = 200s

**.numApps = 3
**.client*.app[*].typename = "TcpSessionApp"
**.client*.app[*].active = true
**.client*.app[0].localPort = 1000
**.client*.app[1].localPort = 1001
**.client*.app[2].localPort = 1002
**.client*.app[*].connectAddress = "server"
**.client*.app[0].connectPort = 2000
**.client*.app[1].connectPort = 2001
**.client*.app[2].connectPort = 2002
**.client*.app[*].tOpen = 0.2s
**.client*.app[*].tSend = 0.4s
**.client*.app[*].sendBytes = 1000000B
**.client*.app[*].sendScript = ""
**.client*.app[*].tClose = 25s

**.server*.app[*].typename = "TcpEchoApp"
**.server*.app[0].localPort = 2000
**.server*.app[1].localPort = 2001
**.server*.app[2].localPort = 2002
**.server*.app[0].echoFactor = 2.0
**.server*.app[0].echoDelay = 0s

[Config Multicast6]
extends = UDPTraffic6
description = "IPsec over IPv6 with multicast traffic (just BYPASS'd)"
sim-time-limit = 200s

# single extra UDP stream to an IPv6 (global-scope) multicast group; IPsec must let it
# pass unprotected -- the egress hook short-circuits to BYPASS on a multicast destination
# (getRemoteAddress().isMulticast()), before any SPD lookup
**.multicastForwarding = true

**.numApps = 1
**.client1.app[0].typename = "UdpBasicApp"
**.client1.app[0].destAddresses = "ff0e::8"
**.client1.app[0].destPort = 2100

**.server*.app[0].typename = "UdpSink"
**.server*.app[0].localPort = 2100
**.server*.app[0].multicastGroup = "ff0e::8"
