[General]
network = PimSmIpv6
description = "IPv6 PIM-SM register + shared tree + SPT switchover"
sim-time-limit = 120s

# See README for a description of the scenario.

# All PIM interfaces run in sparse mode.
**.pimConfig = xml("<config><interface mode=\"sparse\"/></config>")

# Statically configured Rendezvous Point (global address assigned by the configurator).
**.pim.pimSM.RP = "aaaa:1:65:0:8aa:ff:fe00:4"

# MLD on every node (the Receiver becomes a listener; routers learn membership).
**.ipv6.hasMld = true

# Skip Duplicate Address Detection for a fast, deterministic startup.
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# Source: behind DR_S, sends to the IPv6 group ff0e::8
**.Source.numApps = 1
**.Source.app[0].typename = "UdpBasicApp"
**.Source.app[0].destAddresses = "ff0e::8"
**.Source.app[0].destPort = 5000
**.Source.app[0].messageLength = 100B
**.Source.app[0].timeToLive = 10
**.Source.app[0].startTime = 20s
**.Source.app[0].sendInterval = 1s
**.Source.app[0].stopTime = 100s

# Receiver: behind DR_R, joins ff0e::8 for the whole run (before the source starts)
**.Receiver.numApps = 1
**.Receiver.app[0].typename = "UdpSink"
**.Receiver.app[0].localPort = 5000
**.Receiver.app[0].multicastGroup = "ff0e::8"

# Ethernet queue configuration (mirrors the other PIM/MLD examples)
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 100
