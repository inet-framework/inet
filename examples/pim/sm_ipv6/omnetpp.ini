[General]
network = PimSmIpv6
description = "IPv6 PIM-SM register + shared tree + SPT switchover"
sim-time-limit = 120s

# All PIM interfaces run in sparse mode (read by each router's PimInterfaceTable).
**.pimConfig = xml("<config><interface mode=\"sparse\"/></config>")

# Statically configured Rendezvous Point. The RP node is reachable at this
# global address (assigned by Ipv6FlatNetworkConfigurator); every router's
# PIM-SM uses it as the single static RP for all groups.
**.pim.pimSM.RP = "aaaa:1:65:0:8aa:ff:fe00:4"

# MLD on every node: the Receiver becomes a listener, routers learn local
# membership and emit ipv6MulticastGroupRegistered/Unregistered events that drive
# PIM-SM shared-tree joins.
**.ipv6.hasMld = true

# Fast deterministic startup: skip Duplicate Address Detection so global/link-local
# addresses (and thus PIM Hellos and unicast routes) are usable from t=0.
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# -------- Source: behind DR_S, sends to the IPv6 group ff0e::8 --------
# hop limit > number of hops so the routers forward the encapsulated/native stream.
**.Source.numApps = 1
**.Source.app[0].typename = "UdpBasicApp"
**.Source.app[0].destAddresses = "ff0e::8"
**.Source.app[0].destPort = 5000
**.Source.app[0].messageLength = 100B
**.Source.app[0].timeToLive = 10
**.Source.app[0].startTime = 20s
**.Source.app[0].sendInterval = 1s
**.Source.app[0].stopTime = 100s

# -------- Receiver: behind DR_R, joins ff0e::8 for the whole run --------
# It joins before the source starts, so the (*,G) shared tree toward the RP is up
# first; the stream then reaches it via Register/RP, then via the SPT.
**.Receiver.numApps = 1
**.Receiver.app[0].typename = "UdpSink"
**.Receiver.app[0].localPort = 5000
**.Receiver.app[0].multicastGroup = "ff0e::8"

# Ethernet queue configuration (mirrors the other PIM/MLD examples)
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 100
