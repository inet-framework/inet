[General]
network = PimDmIpv6
description = "IPv6 PIM-DM flood-and-prune"
sim-time-limit = 120s

# Pure-IPv6 PIM-DM. The MulticastRouter6 example node (extends Router6, no IPv4
# stack) enables PIM + multicast forwarding and sets pim.addressFamily = "ipv6";
# Router6 already points pim.routingTableModule at ipv6.routingTable. All
# addressing and multicast routing is IPv6 (Ipv6FlatNetworkConfigurator + PIM6).

# All PIM interfaces run in dense mode (read by each router's PimInterfaceTable).
**.pimConfig = xml("<config><interface mode=\"dense\"/></config>")

# MLD on every node: hosts become listeners, routers learn local membership and
# emit ipv6MulticastGroupRegistered/Unregistered -> PIM-DM receiver-added events.
**.ipv6.hasMld = true

# Fast deterministic startup: skip Duplicate Address Detection so global/link-local
# addresses (and thus PIM Hellos and unicast routes) are usable from t=0.
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# -------- Source: behind R1, sends to the IPv6 group ff0e::1 --------
# timeToLive (IPv6 hop limit) > 1 so the routers forward the stream.
**.Source1.numApps = 1
**.Source1.app[0].typename = "UdpBasicApp"
**.Source1.app[0].destAddresses = "ff0e::1"
**.Source1.app[0].destPort = 5000
**.Source1.app[0].messageLength = 100B
**.Source1.app[0].timeToLive = 10
**.Source1.app[0].startTime = 30s
**.Source1.app[0].sendInterval = 1s
**.Source1.app[0].stopTime = 115s

# -------- Host2: receiver behind R2; joins ff0e::1 for the whole run --------
# This branch MUST receive the stream (flood reaches it and is not pruned).
**.Host2.numApps = 1
**.Host2.app[0].typename = "UdpSink"
**.Host2.app[0].localPort = 5000
**.Host2.app[0].multicastGroup = "ff0e::1"

# -------- Host3: late joiner behind R3 --------
# Host3 has no receiver at first, so R3's branch is PRUNED after the initial
# flood. Host3 joins ff0e::1 at t=70s, which makes R3 send a Graft upstream and
# the branch starts forwarding again.
**.Host3.numApps = 1
**.Host3.app[0].typename = "UdpSink"
**.Host3.app[0].localPort = 5000
**.Host3.app[0].multicastGroup = "ff0e::1"
**.Host3.app[0].startTime = 70s

# Host1 (behind R2, on a separate interface) never joins: that downstream
# interface is pruned and stays pruned.

# Ethernet queue configuration (mirrors the MLD example settings)
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 100
