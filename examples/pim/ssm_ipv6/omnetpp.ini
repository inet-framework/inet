[General]
network = PimSmSsmIpv6
description = "IPv6 PIM-SM source-specific multicast (SSM): receiver includes one of two sources"
sim-time-limit = 60s

# See README for a description of the scenario (and the source-address note).

# All PIM interfaces run in sparse mode. No RP: SSM groups (FF3x::/32) use (S,G) trees.
**.pimConfig = xml("<config><interface mode=\"sparse\"/></config>")

# MLDv2 on every node (needed for source-specific INCLUDE membership).
**.ipv6.hasMld = true
**.ipv6.mld.typename = "Mldv2"

# Skip Duplicate Address Detection for a fast, deterministic startup.
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# Two sources, both sending to the SSM group ff3e::8
**.Source*.numApps = 1
**.Source*.app[0].typename = "UdpBasicApp"
**.Source*.app[0].destAddresses = "ff3e::8"
**.Source*.app[0].destPort = 5000
**.Source*.app[0].messageLength = 100B
**.Source*.app[0].timeToLive = 10
**.Source1.app[0].startTime = 20s
**.Source2.app[0].startTime = 21s
**.Source*.app[0].sendInterval = 1s
**.Source*.app[0].stopTime = 55s

# Receiver: SSM INCLUDE membership for ff3e::8 from Source1 only.
# multicastSources is Source1's *global* address (not link-local); see README for why.
**.Receiver.numApps = 1
**.Receiver.app[0].typename = "UdpSink"
**.Receiver.app[0].localPort = 5000
**.Receiver.app[0].multicastGroup = "ff3e::8"
**.Receiver.app[0].multicastSources = "aaaa:2:65:0:8aa:ff:fe00:1"

# Ethernet queues (mirror the other PIM/MLD examples)
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 100
