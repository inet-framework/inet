[General]
sim-time-limit = 10s
**.vector-recording = false
*.*.eth[*].bitrate = 100Mbps

# =============================================================================
# 1. Generic / Abstract
# =============================================================================

[Config Linear]
network = inet.networks.LinearNetwork
*.numNodes = 6
*.numHostsPerSwitch = intuniform(1, 3)

[Config Ring]
network = inet.networks.RingNetwork
*.numNodes = 8
*.numHostsPerSwitch = intuniform(1, 3)

[Config Star]
network = inet.networks.StarNetwork
*.numNodes = 8

[Config Dumbbell]
network = inet.networks.DumbbellNetwork
*.numLeftHosts = 3
*.numRightHosts = 3

[Config FullMesh]
network = inet.networks.FullMeshNetwork
*.numNodes = 6
*.numHostsPerSwitch = intuniform(1, 3)

[Config Tree]
network = inet.networks.TreeNetwork
*.k = 3
*.depth = 2
*.numHostsPerSwitch = intuniform(1, 3)

[Config Grid]
network = inet.networks.GridNetwork
*.rows = 4
*.cols = 4
*.numHostsPerSwitch = intuniform(1, 3)

[Config Torus]
network = inet.networks.TorusNetwork
*.rows = 4
*.cols = 4
*.numHostsPerSwitch = intuniform(1, 3)

[Config Hypercube]
network = inet.networks.HypercubeNetwork
*.numDimensions = 4
*.numHostsPerSwitch = intuniform(1, 3)

[Config Ladder]
network = inet.networks.LadderNetwork
*.numRungs = 6
*.numHostsPerSwitch = intuniform(1, 3)

[Config DualHomed]
network = inet.networks.DualHomedNetwork
*.numHosts = 6

[Config Bipartite]
network = inet.networks.BipartiteNetwork
*.numGroupA = 4
*.numGroupB = 4
*.numHostsPerSwitch = intuniform(1, 3)

[Config HubSpokeRing]
network = inet.networks.HubSpokeRingNetwork
*.numSpokes = 6
*.numHostsPerSpoke = intuniform(1, 3)

# =============================================================================
# 2. Datacenter
# =============================================================================

[Config LeafSpine]
network = inet.networks.LeafSpineNetwork
*.numSpines = 2
*.numLeaves = 4
*.numHostsPerLeaf = intuniform(1, 3)

[Config FatTree]
network = inet.networks.FatTreeNetwork
*.k = 4
