[General]
network = BabelReconvergence
sim-time-limit = 60s

# IPv6-only; only the routers run Babel
**.hasIpv4 = false
**.hasIpv6 = true
*.r1.hasBabel = true
*.r2.hasBabel = true
*.r3.hasBabel = true

# apply the computed global IPv6 addresses; let Babel provide transit routes
**.ipv6.configurator.networkConfiguratorModule = "configurator"
*.configurator.addStaticRoutes = true
*.configurator.addDirectRoutes = true
*.configurator.addRemoteRoutes = false
*.configurator.addDefaultRoutes = true

# break the r1--r2 link at t=30s
*.scenarioManager.script = xmldoc("scenario.xml")

# h1 pings h2 continuously across the whole run
*.h1.numApps = 1
*.h1.app[0].typename = "PingApp"
*.h1.app[0].destAddr = "h2"
*.h1.app[0].startTime = 10s
*.h1.app[0].sendInterval = 1s
*.h1.app[0].count = 50
