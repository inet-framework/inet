[General]
network = BabelRouting
sim-time-limit = 30s

# IPv6-only; only the routers run Babel
**.hasIpv4 = false
**.hasIpv6 = true
*.r1.hasBabel = true
*.r2.hasBabel = true
*.r3.hasBabel = true

# connect each node's IPv6 configurator to the global one so the computed
# global addresses are actually applied to the interfaces
**.ipv6.configurator.networkConfiguratorModule = "configurator"

# The configurator assigns addresses, connected routes and host default routes,
# but NOT the router-to-router transit routes: Babel has to provide those.
*.configurator.addStaticRoutes = true
*.configurator.addDirectRoutes = true
*.configurator.addRemoteRoutes = false
*.configurator.addDefaultRoutes = true

# h1 pings h2 once Babel has converged
*.h1.numApps = 1
*.h1.app[0].typename = "PingApp"
*.h1.app[0].destAddr = "h2"
*.h1.app[0].startTime = 5s
*.h1.app[0].sendInterval = 1s
*.h1.app[0].count = 15
