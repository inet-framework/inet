[General]
network = BabelDualStack
sim-time-limit = 30s

# dual-stack: both IPv4 and IPv6 everywhere; the routers run Babel
**.hasIpv4 = true
**.hasIpv6 = true
*.r1.hasBabel = true
*.r2.hasBabel = true
*.r3.hasBabel = true

# --- IPv6: connected + host-default routes only; Babel provides the transit ---
**.ipv6.configurator.networkConfiguratorModule = "configurator6"
*.configurator6.addStaticRoutes = true
*.configurator6.addDirectRoutes = true
*.configurator6.addRemoteRoutes = false
*.configurator6.addDefaultRoutes = true

# --- IPv4: the configurator provides addresses and routes; Babel also forms
#     IPv4 adjacencies and installs its own IPv4 routes alongside ---

# h1 pings h2 over both IPv6 (app[0]) and IPv4 (app[1])
*.h1.numApps = 2
*.h1.app[0].typename = "PingApp"
*.h1.app[0].destAddr = "h2(ipv6)"
*.h1.app[1].typename = "PingApp"
*.h1.app[1].destAddr = "h2(ipv4)"
**.h1.app[*].startTime = 10s
**.h1.app[*].sendInterval = 1s
**.h1.app[*].count = 15
