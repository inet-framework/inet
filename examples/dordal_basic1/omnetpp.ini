[General]
network = SingleTcpSender
sim-time-limit = 10s

# --- IP configuration ---
*.configurator.config = xml("<config> \
    <interface hosts='A' address='10.0.0.1' netmask='255.255.255.0'/> \
    <interface hosts='B' address='10.0.1.1' netmask='255.255.255.0'/> \
    <interface hosts='R' address='10.0.x.x' netmask='255.255.255.0'/> \
</config>")

# --- Router queue ---
*.R.ppp[*].queue.typename = "DropTailQueue"
*.R.ppp[*].queue.packetCapacity = 7

# --- TCP: match ns-2 basic1.tcl defaults ---
**.tcp.tcpAlgorithmClass = "TcpReno"
**.tcp.mss = 960                       # ns-2 packetSize_=960 (data only; +40 headers = 1000 on wire)
**.tcp.advertisedWindow = 65535        # ~68 segments, large enough not to cap cwnd
**.tcp.delayedAcksEnabled = false      # ns-2 default
**.tcp.nagleEnabled = false            # ns-2 default
**.tcp.sackSupport = false             # plain Reno, no SACK
**.tcp.windowScalingSupport = false
**.tcp.timestampSupport = false
**.tcp.increasedIWEnabled = false      # IW = 1 segment (RFC 2001)
**.tcp.limitedTransmitEnabled = false

# --- Sender (A): bulk FTP-like transfer ---
*.A.numApps = 1
*.A.app[0].typename = "TcpSessionApp"
*.A.app[0].active = true
*.A.app[0].connectAddress = "B"
*.A.app[0].connectPort = 1000
*.A.app[0].tOpen = 0s
*.A.app[0].tSend = 0s
*.A.app[0].sendBytes = 10MB
*.A.app[0].tClose = 0s

# --- Receiver (B): TCP sink ---
*.B.numApps = 1
*.B.app[0].typename = "TcpSinkApp"
*.B.app[0].localPort = 1000

# --- Result recording ---
**.tcp.conn-*.cwnd.result-recording-modes = +vector
**.tcp.conn-*.ssthresh.result-recording-modes = +vector
**.tcp.conn-*.rtt.result-recording-modes = +vector
**.tcp.conn-*.srtt.result-recording-modes = +vector

# =============================================================================
# Baseline: direct ns-2 parameter mapping with TcpReno and queue=7
# =============================================================================
[Config Reno]
description = "Baseline: TcpReno with queue=7, direct ns-2 parameter mapping"

# =============================================================================
# Fix 1: Use TcpNewReno to handle multiple losses per window gracefully
# =============================================================================
[Config NewReno]
description = "TcpNewReno: handles multiple losses per window via partial ACK detection"
**.tcp.tcpAlgorithmClass = "TcpNewReno"

# =============================================================================
# Fix 2: Larger queue to ensure single drops at tooth peaks
# =============================================================================
[Config LargerQueue]
description = "TcpReno with queue=10: more buffer reduces multi-drop events"
*.R.ppp[*].queue.packetCapacity = 10

# =============================================================================
# Fix 3: Reduce MSS so total on-wire packet = 1000 bytes (matching ns-2)
# MSS + 20(TCP) + 20(IP) + 5(PPP hdr) + 2(PPP trailer) = 1000 → MSS = 953
# =============================================================================
[Config AdjustedMSS]
description = "MSS=953: compensate for PPP overhead so on-wire size matches ns-2's 1000 bytes"
**.tcp.mss = 953

# =============================================================================
# Fix 4: Enable SACK for precise loss recovery (RFC 3517)
# =============================================================================
[Config SACK]
description = "TcpReno with SACK: RFC 3517 SACK-based loss recovery identifies and retransmits exactly the lost segments"
**.tcp.sackSupport = true

# =============================================================================
# Fix 5: Longer simulation to let sawtooth stabilize after initial transient
# =============================================================================
[Config LongSim]
description = "TcpReno baseline but 100s sim-time to observe steady-state behavior"
sim-time-limit = 100s

# =============================================================================
# Fix 6: NewReno + SACK combination
# =============================================================================
[Config NewRenoSACK]
description = "TcpNewReno with SACK: best multi-loss handling"
**.tcp.tcpAlgorithmClass = "TcpNewReno"
**.tcp.sackSupport = true
