[General]
network = SingleTcpSender
sim-time-limit = 10s

# --- IP configuration ---
*.configurator.config = xml("<config> \
    <interface hosts='A' address='10.0.0.1' netmask='255.255.255.0'/> \
    <interface hosts='B' address='10.0.1.1' netmask='255.255.255.0'/> \
    <interface hosts='R' address='10.0.x.x' netmask='255.255.255.0'/> \
</config>")

# --- Router queue: 6 in queue + 1 in transmitter = 7 total (matches ns-2 queue-limit=7) ---
*.R.ppp[*].queue.typename = "DropTailQueue"
*.R.ppp[*].queue.packetCapacity = 6

# --- TCP: match ns-2 basic1.tcl defaults ---
**.tcp.tcpAlgorithmClass = "TcpReno"
**.tcp.mss = 960                       # ns-2 packetSize_=960 (data only; +40 headers = 1000 on wire)
**.tcp.advertisedWindow = 65535        # ~68 segments, large enough not to cap cwnd
**.tcp.delayedAcksEnabled = false      # ns-2 default
**.tcp.nagleEnabled = false            # ns-2 default
**.tcp.sackSupport = false             # plain Reno, no SACK
**.tcp.windowScalingSupport = false
**.tcp.timestampSupport = false
**.tcp.increasedIWEnabled = false      # IW = 1 segment (RFC 2001)
**.tcp.limitedTransmitEnabled = false

# --- Sender (A): bulk FTP-like transfer ---
*.A.numApps = 1
*.A.app[0].typename = "TcpSessionApp"
*.A.app[0].active = true
*.A.app[0].connectAddress = "B"
*.A.app[0].connectPort = 1000
*.A.app[0].tOpen = 0s
*.A.app[0].tSend = 0s
*.A.app[0].sendBytes = 10MB
*.A.app[0].tClose = 0s

# --- Receiver (B): TCP sink ---
*.B.numApps = 1
*.B.app[0].typename = "TcpSinkApp"
*.B.app[0].localPort = 1000

# --- Result recording ---
**.tcp.conn-*.cwnd.result-recording-modes = +vector
**.tcp.conn-*.ssthresh.result-recording-modes = +vector
**.tcp.conn-*.rtt.result-recording-modes = +vector
**.tcp.conn-*.srtt.result-recording-modes = +vector
