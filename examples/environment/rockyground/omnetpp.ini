[General]
network = RockyGroundShowcase
sim-time-limit = 1s

# The scene's local ENU tangent plane is anchored at this geographic origin;
# it matches the center of dem.tif (a small GDAL elevation raster in this dir).
*.coordinateSystem.sceneLatitude = 37.8deg
*.coordinateSystem.sceneLongitude = -122.4deg
*.coordinateSystem.sceneAltitude = 0m

# The ground surface comes from real geospatial elevation data via Rocky.
*.physicalEnvironment.ground.typename = "RockyGround"
*.physicalEnvironment.ground.elevationFile = "dem.tif"
*.physicalEnvironment.ground.coordinateSystemModule = "^.^.coordinateSystem"
