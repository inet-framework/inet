#
# Mobile IPv6 (RFC 3775) example on the Mipv6Network topology: a mobile node (MN)
# roams from its home network to a foreign access network, registers a care-of
# address with its home agent, and exchanges traffic with one or more correspondent
# nodes (CN) -- first via the bidirectional home-agent tunnel, then route-optimized.
# The configs below exercise plain handover, route optimization with two CNs, etc.
#

[General]
abstract = true
num-rngs = 3
seed-set = 1
**.mobility.rng-0 = 2

network = Mipv6Network

# number of client computers (MN(s) in our case)
#NOTE: When increasing the number of MN, make sure that they either have different movement patterns, or different speeds, or (incase they have same speed and movement pattern/direction) then they should not have similar positions on the scene (i.e., their positions should not overlap) or else (for some strange reason) MIPv6 operation will not work
*.total_mn = 1

# number of Servers (CN(s) in our case)
*.total_cn = 2

# The Ipv6NetworkConfigurator (wired up in Mipv6Network.ned) assigns addresses and
# shortest-path routes. Movement detection relies on a Router Solicitation sent on
# each handover (the default detectL2Movement behaviour of Ipv6NeighbourDiscovery),
# so realistic Router Advertisement intervals suffice -- no artificially fast RAs.
**.neighbourDiscovery.minIntervalBetweenRAs = 3s
**.neighbourDiscovery.maxIntervalBetweenRAs = 7s

# channel physical parameters
*.radioMedium.mediumLimitCache.maxTransmissionPower = 2.0mW
*.radioMedium.mediumLimitCache.minReceptionPower = -82dBm
*.radioMedium.mediumLimitCache.minInterferencePower = -82dBm

# access point
**.wlan*.mgmt.numAuthSteps = 4

# ALL APs common parameters
**.AP*.wlan*.mgmt.beaconInterval = 0.1s

# Access Point AP_Home ; AP_1 ; AP_2 ; AP_3 Parameters for EthernetCsmaMacPhy
**.AP_Home.wlan*.mgmt.ssid = "HOME"
**.AP_Home.wlan*.address = "10:AA:00:00:00:01"
**.AP_Home.eth[0].address = "10:AE:00:00:00:02"
**.AP_Home.eth[0].duplexMode = true
**.AP_Home.eth[0].*.scalar-recording = false

**.AP_1.wlan*.mgmt.ssid = "AP1"
**.AP_1.wlan*.address = "10:AA:00:00:A1:01" #the A1:01 specifies AP_1:interface 1
**.AP_1.eth[0].address = "10:AE:00:00:A1:02" #the A1:02 specifies AP_1:interface 2
#**.AP_1.eth[0].txrate = 100Mbps
**.AP_1.eth[0].duplexMode = true
**.AP_1.eth[0].*.scalar-recording = false

# mobility
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m

# the MN travels from its home network (AP_Home) out to the foreign network (AP_1),
# handing over on the way
**.MN[0].mobility.typename = "RectangleMobility"
**.MN[0].mobility.constraintAreaMinX = 180m
**.MN[0].mobility.constraintAreaMinY = 170m
**.MN[0].mobility.constraintAreaMaxX = 630m
**.MN[0].mobility.constraintAreaMaxY = 180m
**.MN[0].mobility.startPos = 0
**.MN[0].mobility.speed = 5mps

**.MN*.mobility.updateInterval = 0.1s

# = =====================================================================

# Application traffic is set up per [Config] below; nothing runs by default.
**.numApps = 0

# Common ping parameters for the apps the configs enable. Correspondent nodes always
# ping the MN's HOME address 2001:db8:0:2:8aa:ff:fe00:8 (the stable MIPv6 identity =
# home prefix 2001:db8:0:2::/64 + the MN's interface id): while the MN is away the
# home agent intercepts it and tunnels to the current care-of address, until the flow
# gets route-optimized.
**.app[*].typename = "PingApp"
**.app[*].packetSize = 56B
**.app[*].hopLimit = 32
**.app[*].printPing = true

# = ============================================================================================

# tcp settings.
**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336  # 14*mss
**.tcp.tcpAlgorithmClass = "TcpReno"

# ip settings
#FIXME
**.forwarding = false

# Ethernet NIC configuration
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue" # in routers
**.eth[*].queue.dataQueue.packetCapacity = 10  # in routers
**.eth[*].encap.*.scalar-recording = false

##################################
**.eth*.duplexMode = true
**.eth*.mac.*.scalar-recording = false

**.ap.*.scalar-recording = false
**.hub.*.scalar-recording = false

# analog model
**.analogModel.ignorePartialInterference = true

# wireless channels
**.AP_Home.wlan*.radio.channelNumber = 1
**.AP_1.wlan*.radio.channelNumber = 2
**.MN*.wlan*.radio.channelNumber = 0  # just initially -- it'll scan

# wireless configuration
**.wlan*.agent.activeScan = true
**.wlan*.agent.defaultSsid = ""
**.wlan*.agent.channelsToScan = "1 2"  # "" means all
**.wlan*.agent.probeDelay = 0.1s
**.wlan*.agent.minChannelTime = 0.15s
**.wlan*.agent.maxChannelTime = 0.3s
**.wlan*.agent.authenticationTimeout = 5s
**.wlan*.agent.associationTimeout = 5s

# nic settings
**.wlan*.bitrate = 2Mbps

**.wlan*.mac.dcf.channelAccess.cwMin = 7

**.radio.transmitter.power = 2.0mW

# relay unit configuration
*.AP*.bridging.typename = "MacRelayUnit"

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 850m
**.constraintAreaMaxY = 850m

[Config Handover]
description = "A mobile node hands over from its home network to a foreign network and registers its care-of address with the home agent"
sim-time-limit = 70s

# Move out quickly so the handover (and the home-agent registration) completes early
# in the run, leaving time to observe the tunneled traffic.
**.MN[0].mobility.speed = 15mps

# One correspondent node pings the MN's home address throughout: directly while the
# MN is home, then via the home-agent tunnel once it has registered a care-of address.
*.CN[0].numApps = 1
*.CN[0].app[0].destAddr = "2001:db8:0:2:8aa:ff:fe00:8"
*.CN[0].app[0].sendInterval = 0.5s
*.CN[0].app[0].startTime = 1s

[Config RouteOptimizationTwoCNs]
description = "Route optimization between the mobile node and two correspondent nodes"
sim-time-limit = 90s

# Move out slowly (5 mps) so the MN is settled in the foreign network when the CNs
# start pinging at t=71s; both CNs ping the MN's home address, so the home agent
# intercepts and tunnels the traffic, and each flow independently triggers the
# return-routability procedure and a binding update (route optimization).
*.CN[*].numApps = 1
*.CN[*].app[0].destAddr = "2001:db8:0:2:8aa:ff:fe00:8"
*.CN[*].app[0].count = 5
*.CN[*].app[0].sendInterval = 2s
*.CN[*].app[0].startTime = 71s

