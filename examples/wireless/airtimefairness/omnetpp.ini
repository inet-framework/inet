[General]
network = AirtimeFairnessNetwork
sim-time-limit = 3s
warmup-period = 1s   # discard the association/ramp transient; measure steady state over [1s, 3s]

# In a saturated BSS, contending nodes' backoff counters can reach zero on the same slot,
# a real CSMA/CA collision rather than a misconfiguration, so relax the guard.
*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

# Resolve ARP globally so no ARP frames consume airtime.
*.*.ipv4.arp.typename = "GlobalArp"

# ---- Fixed positions: all stations ~8-9 m from the AP, so every link is equally good ----
*.sta[*].mobility.typename = "StationaryMobility"
*.sta[*].mobility.initFromDisplayString = false
*.sta[*].mobility.initialX = 9m
*.sta[*].mobility.initialY = 8m + parentIndex() * 2m
*.sta[*].mobility.initialZ = 0m
*.accessPoint.mobility.initialX = 17m
*.accessPoint.mobility.initialY = 12m
*.accessPoint.mobility.initialZ = 0m

# ---- 802.11g. The AP transmits to sta[0] at 6 Mbps and to the others at 54 Mbps, the way
# a real AP rate-adapts per client (here configured statically via per-receiver rate). Every
# link is error-free, so the slow client is slow by rate, not by a weak link. ----
*.sta[*].wlan[*].opMode = "g(erp)"
*.accessPoint.wlan[*].opMode = "g(erp)"
*.sta[*].wlan[*].bitrate = 54Mbps
*.accessPoint.wlan[*].bitrate = 54Mbps
*.sta[*].wlan[*].radio.transmitter.power = 100mW
*.accessPoint.wlan[*].radio.transmitter.power = 100mW
*.accessPoint.wlan[*].mac.dcf.rateSelection.dataFrameBitratePerReceiver = {"sta[0].wlan[0]": 6Mbps}

# ---- Saturating downlink: the server sources one backlogged UDP flow per station; the
# stations sink. ~8 Mbps per flow saturates the AP but stays well under the 100 Mbps server
# link, so the AP transmit queue is the only bottleneck. ----
*.server.numApps = 3
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destAddresses = "sta[" + string(index) + "]"
*.server.app[*].destPort = 5000 + index
*.server.app[*].messageLength = 1000B
*.server.app[*].sendInterval = 1ms
*.sta[*].numApps = 1
*.sta[*].app[0].typename = "UdpSink"
*.sta[*].app[0].localPort = 5000 + parentIndex()

# ---- Airtime-fair transmit queue at the AP (one FIFO sub-queue per client). The two configs
# below flip only its fairnessEnabled switch, so the sole variable is frame-fair vs airtime-fair
# scheduling. ----
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.typename = "AirtimeFairnessQueue"
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.packetCapacity = 50

[Config Anomaly]
description = "Frame-fair (round-robin): sta[0]'s long frames drag the fast clients down"
# Serve each client an equal number of FRAMES -> sta[0]'s 9x-longer frames dominate the airtime
# and every client collapses to sta[0]'s throughput (the downlink rate anomaly).
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.fairnessEnabled = false

[Config AirtimeFair]
description = "Airtime-fair: the fast clients recover, sta[0] held to its airtime share"
# Give each client an equal share of on-air TIME (fairnessEnabled defaults to true): the fast
# clients pack more frames into their slice and recover, sta[0] is capped at its time share.
*.accessPoint.wlan[*].mac.dcf.channelAccess.pendingQueue.quantum = 1500us
