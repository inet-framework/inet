[General]
abstract = true
network = SensorGatewayNetwork
sim-time-limit = 100s
simtime-resolution = ns

# Gateway forwarding between wireless and wired subnets
*.gateway.forwarding = true

# Disable automatic default routes so configurator handles everything
**.addDefaultRoutes = false

# Wireless interface: use generic WirelessInterface with 802.15.4 narrowband radio + sensor MAC
**.wlan[*].typename = "WirelessInterface"
**.wlan[*].radio.typename = "Ieee802154NarrowbandRadio"
**.wlan[*].queue.typename = "DropTailQueue"
**.wlan[*].queue.packetCapacity = 20

# 802.15.4 radio parameters (defaults from Ieee802154NarrowbandRadio are used)
# Explicitly set scalar signal representation for consistency with the radio medium
**.wlan[*].radio.signalAnalogRepresentation = "scalar"

# Ethernet bitrate
**.eth[*].bitrate = 100Mbps

# Energy model for battery-powered sensor nodes
*.sensor*.hasStatus = true
*.sensor*.energyStorage.typename = "SimpleEpEnergyStorage"
*.sensor*.energyStorage.nominalCapacity = 10J
*.sensor*.energyStorage.initialCapacity = 10J
*.sensor*.energyManagement.typename = "SimpleEpEnergyManagement"
*.sensor*.energyManagement.nodeShutdownCapacity = 0.1J
*.sensor*.wlan[*].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

# ARP: use global resolution to avoid ARP broadcast issues across subnets
**.arp.typename = "GlobalArp"

# Checksum and FCS mode for correct packet serialization
**.checksumMode = "computed"
**.fcsMode = "computed"

# PCAP recorder on gateway for debugging wireless side only (avoid Ethernet signal type issues)
*.gateway.numPcapRecorders = 1
*.gateway.pcapRecorder[0].pcapFile = "${resultdir}/gateway.pcap"
*.gateway.pcapRecorder[0].moduleNamePatterns = "wlan[*]"
*.gateway.pcapRecorder[0].alwaysFlush = true

# UDP applications: sensors send data to server
*.sensor*.numApps = 1
*.sensor*.app[0].typename = "UdpBasicApp"
*.sensor*.app[0].destAddresses = "server"
*.sensor*.app[0].destPort = 1000
*.sensor*.app[0].messageLength = 20Byte
*.sensor*.app[0].packetName = "SensorData"

*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 1000

# Statistic recording: disable everything, then selectively re-enable specific stats
**.vector-recording = false
**.packetReceived:count.scalar-recording = true
**.packetSent:count.scalar-recording = true
**.residualEnergyCapacity:last.scalar-recording = true
**.powerConsumption:vector.vector-recording = true
**.scalar-recording = false

# Visualizer settings
*.visualizer.routingTableVisualizer.displayRoutingTables = false
*.visualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.physicalLinkVisualizer.displayLinks = true

[Config BMac]
description = "B-MAC protocol with default sensor data rate"

**.wlan[*].mac.typename = "BMac"
**.wlan[*].mac.headerLength = 1B
**.wlan[*].mac.slotDuration = 0.025s

*.sensor*.app[0].sendInterval = 1s
*.sensor*.app[0].startTime = exponential(1s)

[Config XMac]
description = "X-MAC protocol with default sensor data rate"

**.wlan[*].mac.typename = "XMac"
**.wlan[*].mac.headerLength = 1B
*.gateway.wlan[*].mac.slotDuration = 0.1s
*.sensor*.wlan[*].mac.slotDuration = 0.25s

*.sensor*.app[0].sendInterval = 1s
*.sensor*.app[0].startTime = exponential(1s)

[Config BMacDataRateStudy]
description = "B-MAC with varying sensor data rates"
extends = BMac

*.sensor*.app[0].sendInterval = ${sendInterval = 0.1s, 0.5s, 1s, 5s}

[Config XMacDataRateStudy]
description = "X-MAC with varying sensor data rates"
extends = XMac

*.sensor*.app[0].sendInterval = ${sendInterval = 0.1s, 0.5s, 1s, 5s}

[Config SmokeTest]
description = "Quick smoke test for all configs"
sim-time-limit = 5s
