[General]
network = PerStationRateExample
sim-time-limit = 5s
description = "Per-station 802.11 data rate selection (an AP serving stations at different rates)"

# ==========================================================================
# The point of this example: the access point uses a different PHY data rate
# per station, configured via the per-receiver rate-selection parameter.
# Keys are peer interface module paths, resolved to their MAC address at run time.
# ==========================================================================
*.accessPoint.wlan[*].mac.dcf.rateSelection.dataFrameBitratePerReceiver = {"sta1.wlan[0]": 6Mbps, "sta2.wlan[0]": 24Mbps, "sta3.wlan[0]": 54Mbps}

# UDP downlink from the wired server, through the access point, to each station
*.server.numApps = 3
*.server.app[*].typename = "UdpBasicApp"
*.server.app[0].destAddresses = "sta1"
*.server.app[1].destAddresses = "sta2"
*.server.app[2].destAddresses = "sta3"
*.server.app[*].destPort = 5000
*.server.app[*].messageLength = 1000B
*.server.app[*].sendInterval = 10ms
*.server.app[*].startTime = uniform(0s, 10ms)

*.sta*.numApps = 1
*.sta*.app[0].typename = "UdpSink"
*.sta*.app[0].localPort = 5000

# radio: advertise the full 802.11g rate set so 6/24/54 Mbps are all available
**.wlan[*].radio.transmitter.power = 100mW
**.wlan[*].radio.transmitter.centerFrequency = 2.4GHz
**.wlan[*].opMode = "g(erp)"

# simplified 802.11 management (no association exchange needed for this example)
*.accessPoint.wlan[*].mgmt.typename = "Ieee80211MgmtApSimplified"
*.sta*.wlan[*].mgmt.typename = "Ieee80211MgmtStaSimplified"
*.sta*.wlan[*].agent.typename = ""
*.accessPoint.wlan[*].address = "10:00:00:00:00:00"
*.sta*.wlan[*].mgmt.accessPointAddress = "10:00:00:00:00:00"

# static node positions (host-level mobility only; must not match the radio antenna's
# nested mobility, hence *.*.mobility rather than **.mobility)
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 600m
**.constraintAreaMaxY = 700m
**.constraintAreaMaxZ = 0m
*.*.mobility.typename = "StationaryMobility"
*.*.mobility.initFromDisplayString = false
*.*.mobility.initialZ = 0m
*.server.mobility.initialX = 100m
*.server.mobility.initialY = 450m
*.accessPoint.mobility.initialX = 300m
*.accessPoint.mobility.initialY = 450m
*.sta1.mobility.initialX = 500m
*.sta1.mobility.initialY = 300m
*.sta2.mobility.initialX = 550m
*.sta2.mobility.initialY = 450m
*.sta3.mobility.initialX = 500m
*.sta3.mobility.initialY = 600m

# secondary: watch the per-station rates live as a bar chart above the access point
# (rateVisualizer is a direct submodule of the IntegratedCanvasVisualizer)
*.visualizer.rateVisualizer.displayRates = true
*.visualizer.rateVisualizer.maxRate = 54Mbps
*.visualizer.rateVisualizer.nodeFilter = "accessPoint"

# ==========================================================================
# Adaptive variant: instead of configured rates, the access point runs AARF
# per-station rate control. The stations sit at increasing distances, so each
# link adapts to a different rate independently (near stays fast, far falls
# back) -- which the single interface-wide rate of classic rate control could
# not do. Run with: -c Adaptive
# ==========================================================================
[Config Adaptive]
description = "Adaptive per-station rate control (AARF), stations at increasing distance"
sim-time-limit = 30s

# no static per-receiver rates; let rate control drive
*.accessPoint.wlan[*].mac.dcf.rateSelection.dataFrameBitratePerReceiver = {}
# AARF per-station rate control on the access point, starting at the top rate
*.accessPoint.wlan[*].mac.dcf.rateControl.typename = "AarfRateControl"
*.accessPoint.wlan[*].mac.dcf.rateControl.initialRate = 54Mbps
*.accessPoint.wlan[*].mac.dcf.rateControl.interval = 1s

# lower the transmit power and raise the noise floor so the rate cliff falls
# within the playground (otherwise 54 Mbps reaches every station)
**.wlan[*].radio.transmitter.power = 50mW
*.radioMedium.backgroundNoise.power = -96dBm
# spread the stations along a line at increasing distance from the access point,
# so their links settle at different rates (near ~54, mid ~36, far ~24 Mbps)
**.constraintAreaMaxX = 700m
*.accessPoint.mobility.initialX = 100m
*.accessPoint.mobility.initialY = 500m
*.sta1.mobility.initialX = 200m
*.sta1.mobility.initialY = 500m
*.sta2.mobility.initialX = 350m
*.sta2.mobility.initialY = 500m
*.sta3.mobility.initialX = 500m
*.sta3.mobility.initialY = 500m
