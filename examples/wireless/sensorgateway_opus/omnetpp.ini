[General]
network = SensorGatewayNetwork
sim-time-limit = 100s

# --- Node status (required for SimpleEpEnergyStorage) ---
*.sensor[*].hasStatus = true
*.gateway.hasStatus = true
*.server.hasStatus = true

# --- Gateway: IP forwarding, one 802.15.4 wlan interface ---
*.gateway.forwarding = true
*.gateway.numWlanInterfaces = 1

# --- Sensor energy model ---
*.sensor[*].energyStorage.typename = "SimpleEpEnergyStorage"
*.sensor[*].energyStorage.nominalCapacity = 1J
*.sensor[*].energyStorage.initialCapacity = 1J

# --- UDP application: sensors send to server ---
*.sensor[*].numApps = 1
*.sensor[*].app[0].typename = "UdpBasicApp"
*.sensor[*].app[0].destAddresses = "server"
*.sensor[*].app[0].destPort = 5000
*.sensor[*].app[0].messageLength = 50B
*.sensor[*].app[0].sendInterval = 2s
*.sensor[*].app[0].startTime = uniform(0s, 2s)

# --- Server: UDP sink ---
*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 5000

# --- Ethernet bitrate ---
*.gateway.eth[*].bitrate = 100Mbps
*.server.eth[*].bitrate = 100Mbps

# --- Mobility: explicit positions (meters) ---
**.mobility.initFromDisplayString = false
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxX = 300m
**.mobility.constraintAreaMaxY = 300m

*.sensor[0].mobility.initialX = 50m
*.sensor[0].mobility.initialY = 100m
*.sensor[1].mobility.initialX = 100m
*.sensor[1].mobility.initialY = 50m
*.sensor[2].mobility.initialX = 150m
*.sensor[2].mobility.initialY = 100m
*.sensor[3].mobility.initialX = 100m
*.sensor[3].mobility.initialY = 150m
*.gateway.mobility.initialX = 100m
*.gateway.mobility.initialY = 100m

# =========================================================================
# CSMA (standard 802.15.4 MAC)
# =========================================================================
[Config Csma]
description = "Standard 802.15.4 CSMA MAC, low data rate (2s interval)"

# Sensors use Ieee802154NarrowbandInterface (SensorNode default)
*.sensor[*].wlan[*].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

# Gateway 802.15.4 wlan
*.gateway.wlan[*].typename = "Ieee802154NarrowbandInterface"

# =========================================================================
# B-MAC (low-power listening)
# =========================================================================
[Config BMac]
description = "B-MAC low-power listening, low data rate (2s interval)"

# BMac preamble collisions are expected in low-power listening MACs
*.radioMedium.sameTransmissionStartTimeCheck = "warning"

# Sensor interfaces
*.sensor[*].wlan[*].typename = "BMacInterface"
*.sensor[*].wlan[*].radio.typename = "Ieee802154NarrowbandRadio"
*.sensor[*].wlan[*].mac.bitrate = 250000bps
*.sensor[*].wlan[*].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

# Gateway 802.15.4 wlan
*.gateway.wlan[*].typename = "BMacInterface"
*.gateway.wlan[*].radio.typename = "Ieee802154NarrowbandRadio"
*.gateway.wlan[*].mac.bitrate = 250000bps

# =========================================================================
# X-MAC (short preamble)
# =========================================================================
[Config XMac]
description = "X-MAC short preamble, low data rate (2s interval)"

# XMac preamble collisions are expected in low-power listening MACs
*.radioMedium.sameTransmissionStartTimeCheck = "warning"

# Sensor interfaces
*.sensor[*].wlan[*].typename = "XMacInterface"
*.sensor[*].wlan[*].radio.typename = "Ieee802154NarrowbandRadio"
*.sensor[*].wlan[*].mac.bitrate = 250000bps
*.sensor[*].wlan[*].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

# Gateway 802.15.4 wlan
*.gateway.wlan[*].typename = "XMacInterface"
*.gateway.wlan[*].radio.typename = "Ieee802154NarrowbandRadio"
*.gateway.wlan[*].mac.bitrate = 250000bps

# =========================================================================
# High data rate variants (0.5s send interval)
# =========================================================================
[Config Csma-HighRate]
extends = Csma
description = "Standard 802.15.4 CSMA MAC, high data rate (0.5s interval)"
*.sensor[*].app[0].sendInterval = 0.5s

[Config BMac-HighRate]
extends = BMac
description = "B-MAC low-power listening, high data rate (0.5s interval)"
*.sensor[*].app[0].sendInterval = 0.5s

[Config XMac-HighRate]
extends = XMac
description = "X-MAC short preamble, high data rate (0.5s interval)"
*.sensor[*].app[0].sendInterval = 0.5s
