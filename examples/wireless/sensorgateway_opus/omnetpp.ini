[General]
network = SensorGatewayNetwork
sim-time-limit = 100s
num-rngs = 3

# --- Node positions (match NED display positions) ---
*.sensor1.mobility.initialX = 150m
*.sensor1.mobility.initialY = 100m
*.sensor2.mobility.initialX = 450m
*.sensor2.mobility.initialY = 100m
*.sensor3.mobility.initialX = 150m
*.sensor3.mobility.initialY = 400m
*.sensor4.mobility.initialX = 450m
*.sensor4.mobility.initialY = 400m
*.gateway.mobility.typename = "StationaryMobility"
*.gateway.mobility.initialX = 300m
*.gateway.mobility.initialY = 250m
*.server.mobility.typename = "StationaryMobility"
*.server.mobility.initialX = 550m
*.server.mobility.initialY = 250m

# --- Gateway: dual interface (802.15.4 wlan + Ethernet), IP forwarding ---
*.gateway.forwarding = true
*.gateway.numWlanInterfaces = 1

# --- Server: Ethernet only, no wireless ---
*.server.numWlanInterfaces = 0

# --- Ethernet bitrate ---
*.gateway.eth[0].bitrate = 100Mbps
*.server.eth[0].bitrate = 100Mbps

# --- Energy storage on sensors: finite battery with SimpleEpEnergyStorage ---
*.sensor*.hasStatus = true
*.sensor*.energyStorage.typename = "SimpleEpEnergyStorage"
*.sensor*.energyStorage.nominalCapacity = 1000J
*.sensor*.energyStorage.initialCapacity = 1000J

# --- Energy consumer on sensor radios ---
*.sensor*.wlan[0].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

# --- UDP sensor application: sensors send to server ---
*.sensor*.numApps = 1
*.sensor*.app[0].typename = "UdpBasicApp"
*.sensor*.app[0].destAddresses = "server"
*.sensor*.app[0].destPort = 5000
*.sensor*.app[0].messageLength = 50B
*.sensor*.app[0].sendInterval = ${sendInterval = 1s, 5s, 10s}
*.sensor*.app[0].startTime = uniform(0s, 1s)

# --- UDP sink on server ---
*.server.numApps = 1
*.server.app[0].typename = "UdpSink"
*.server.app[0].localPort = 5000

# --- IPv4 configurator: put sensors and gateway wlan on one subnet ---
*.configurator.config = xml("<config> \
    <interface hosts='sensor*' address='10.0.0.x' netmask='255.255.255.0'/> \
    <interface hosts='gateway' names='wlan0' address='10.0.0.x' netmask='255.255.255.0'/> \
    <interface hosts='gateway' names='eth0' address='10.0.1.1' netmask='255.255.255.0'/> \
    <interface hosts='server' address='10.0.1.2' netmask='255.255.255.0'/> \
</config>")

# --- PCAP recording for debugging ---
*.gateway.recordPcap = true
*.gateway.numPcapRecorders = 1
*.server.recordPcap = true
*.server.numPcapRecorders = 1

# --- Visualizer settings ---
*.visualizer.*.networkRouteVisualizer.displayRoutes = true
*.visualizer.*.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.*.numDataLinkVisualizers = 1
*.visualizer.*.dataLinkVisualizer[0].displayLinks = true

# =========================================================================
# Config CSMA: Default 802.15.4 CSMA-CA MAC (Ieee802154NarrowbandInterface)
# =========================================================================
[Config CSMA]
description = "802.15.4 CSMA-CA MAC (default)"

# Sensors already default to Ieee802154NarrowbandInterface via SensorNode
# Gateway uses the same interface type for 802.15.4 compatibility
*.gateway.wlan[0].typename = "Ieee802154NarrowbandInterface"
*.gateway.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"

# =========================================================================
# Config BMac: B-MAC (Low Power Listening) with 802.15.4 radio
# =========================================================================
[Config BMac]
description = "B-MAC (Low Power Listening)"

# Override all 802.15.4 nodes to use BMacInterface
*.sensor*.wlan[0].typename = "BMacInterface"
*.sensor*.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"
*.sensor*.wlan[0].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

*.gateway.wlan[0].typename = "BMacInterface"
*.gateway.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"

# BMac parameters
*.sensor*.wlan[0].mac.slotDuration = 0.5s
*.sensor*.wlan[0].mac.checkInterval = 0.01s
*.sensor*.wlan[0].mac.useMACAcks = true
*.gateway.wlan[0].mac.slotDuration = 0.5s
*.gateway.wlan[0].mac.checkInterval = 0.01s
*.gateway.wlan[0].mac.useMACAcks = true

# =========================================================================
# Config XMac: X-MAC (Short Preamble) with 802.15.4 radio
# =========================================================================
[Config XMac]
description = "X-MAC (Short Preamble Wakeup)"

# Override all 802.15.4 nodes to use XMacInterface
*.sensor*.wlan[0].typename = "XMacInterface"
*.sensor*.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"
*.sensor*.wlan[0].radio.energyConsumer.typename = "SensorStateBasedEpEnergyConsumer"

*.gateway.wlan[0].typename = "XMacInterface"
*.gateway.wlan[0].radio.typename = "Ieee802154NarrowbandScalarRadio"

# XMac parameters
*.sensor*.wlan[0].mac.slotDuration = 0.5s
*.sensor*.wlan[0].mac.checkInterval = 0.01s
*.sensor*.wlan[0].mac.useMACAcks = true
*.gateway.wlan[0].mac.slotDuration = 0.5s
*.gateway.wlan[0].mac.checkInterval = 0.01s
*.gateway.wlan[0].mac.useMACAcks = true
