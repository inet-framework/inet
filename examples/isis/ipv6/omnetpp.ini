[General]
network = IsisIpv6
sim-time-limit = 25s

# Configurator assigns addresses + on-link routes; hosts learn their default
# route via Router Advertisements. No remote (multi-hop) routes - IS-IS does
# the rest.
*.configurator.config = xmldoc("Ipv6Config.xml")
*.configurator.addRemoteRoutes = false
**.ipv6.configurator.networkConfiguratorModule = "configurator"

# IPv6-only routers; point IS-IS at the IPv6 routing table only
*.r*.hasIpv4 = false
*.r*.hasIpv6 = true
*.r*.isis.routingTableModule = ""
*.r*.isis.routingTableModule6 = "^.ipv6.routingTable"

# IS-IS (Level 1) on the inter-router links, single area 49.0001
*.r1.isis.configData = xml("<isis net='49.0001.1921.6800.0001.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.r2.isis.configData = xml("<isis net='49.0001.1921.6800.0002.00' isType='L1'><interface name='eth0' helloInterval='1s'/><interface name='eth1' helloInterval='1s'/></isis>")
*.r3.isis.configData = xml("<isis net='49.0001.1921.6800.0003.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")

# Ping hostA -> hostB over IPv6 once IS-IS has converged.
*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "2001:db8:3::100"
*.hostA.app[0].startTime = 8s
*.hostA.app[0].sendInterval = 1s
