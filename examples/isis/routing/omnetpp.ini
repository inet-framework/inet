[General]
network = IsisNetwork
sim-time-limit = 20s

# The configurator assigns addresses + direct routes and host default routes,
# but NOT remote routes: reaching h3 from h1 depends entirely on IS-IS.
*.configurator.addStaticRoutes = true
*.configurator.addDirectRoutes = true
*.configurator.addRemoteRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addManualRoutes = true
*.configurator.config = xml("<config>\
    <interface hosts='h1' address='10.0.1.10' netmask='255.255.255.0'/>\
    <interface hosts='r1' towards='h1' address='10.0.1.1' netmask='255.255.255.0'/>\
    <interface hosts='r1' towards='r2' address='10.0.12.1' netmask='255.255.255.0'/>\
    <interface hosts='r2' towards='r1' address='10.0.12.2' netmask='255.255.255.0'/>\
    <interface hosts='r2' towards='r3' address='10.0.23.2' netmask='255.255.255.0'/>\
    <interface hosts='r3' towards='r2' address='10.0.23.3' netmask='255.255.255.0'/>\
    <interface hosts='r3' towards='h3' address='10.0.3.3' netmask='255.255.255.0'/>\
    <interface hosts='h3' address='10.0.3.10' netmask='255.255.255.0'/>\
    <route hosts='h1' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.1.1'/>\
    <route hosts='h3' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.3.3'/>\
    </config>")

# IS-IS on the inter-router links (Level 1, single area 49.0001).
*.r1.isis.configData = xml("<isis net='49.0001.1921.6800.0001.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.r2.isis.configData = xml("<isis net='49.0001.1921.6800.0002.00' isType='L1'><interface name='eth0' helloInterval='1s'/><interface name='eth1' helloInterval='1s'/></isis>")
*.r3.isis.configData = xml("<isis net='49.0001.1921.6800.0003.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")

# Ping across the network once IS-IS has converged.
*.h1.numApps = 1
*.h1.app[0].typename = "PingApp"
*.h1.app[0].destAddr = "10.0.3.10"
*.h1.app[0].startTime = 8s
*.h1.app[0].sendInterval = 1s

cmdenv-express-mode = false
**.cmdenv-log-level = info
