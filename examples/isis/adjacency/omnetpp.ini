[General]
network = IsisAdjacency
sim-time-limit = 20s

# Assign IPv4 addresses (also surfaced in the IS-IS IP Interface Address TLV).
*.configurator.config = xml("<config><interface hosts='**' address='10.0.0.x' netmask='255.255.255.0'/></config>")

# IS-IS: one area (49.0001), Level-1, distinct system IDs, fast Hellos.
*.r1.isis.configData = xml("<isis net='49.0001.1921.6800.0001.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")
*.r2.isis.configData = xml("<isis net='49.0001.1921.6800.0002.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")

# Show IS-IS info-level log output.
cmdenv-express-mode = false
**.cmdenv-log-level = info
