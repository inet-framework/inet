[General]
network = IsisLan
sim-time-limit = 20s

# Configurator assigns addresses + direct routes + host default routes only;
# IS-IS provides the routes between the stub subnets.
*.configurator.addStaticRoutes = true
*.configurator.addDirectRoutes = true
*.configurator.addRemoteRoutes = false
*.configurator.addDefaultRoutes = false
*.configurator.addManualRoutes = true
*.configurator.config = xml("<config>\
    <interface hosts='r1' names='eth1' address='10.0.0.1' netmask='255.255.255.0'/>\
    <interface hosts='r2' names='eth1' address='10.0.0.2' netmask='255.255.255.0'/>\
    <interface hosts='r3' names='eth1' address='10.0.0.3' netmask='255.255.255.0'/>\
    <interface hosts='r1' names='eth0' address='10.0.1.1' netmask='255.255.255.0'/>\
    <interface hosts='h1' address='10.0.1.10' netmask='255.255.255.0'/>\
    <interface hosts='r2' names='eth0' address='10.0.2.1' netmask='255.255.255.0'/>\
    <interface hosts='h2' address='10.0.2.10' netmask='255.255.255.0'/>\
    <interface hosts='r3' names='eth0' address='10.0.3.1' netmask='255.255.255.0'/>\
    <interface hosts='h3' address='10.0.3.10' netmask='255.255.255.0'/>\
    <route hosts='h1' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.1.1'/>\
    <route hosts='h2' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.2.1'/>\
    <route hosts='h3' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.3.1'/>\
    </config>")

# IS-IS on each router's LAN-facing interface (Level 1, area 49.0001).
*.r1.isis.configData = xml("<isis net='49.0001.1921.6800.0001.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.r2.isis.configData = xml("<isis net='49.0001.1921.6800.0002.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.r3.isis.configData = xml("<isis net='49.0001.1921.6800.0003.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")

# Ping h1 -> h3 across the shared LAN.
*.h1.numApps = 1
*.h1.app[0].typename = "PingApp"
*.h1.app[0].destAddr = "10.0.3.10"
*.h1.app[0].startTime = 8s
*.h1.app[0].sendInterval = 1s
