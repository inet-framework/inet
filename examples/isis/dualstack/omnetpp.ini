[General]
network = IsisDualStack
sim-time-limit = 30s

# Dual-stack hosts and routers
*.hostA.hasIpv6 = true
*.hostB.hasIpv6 = true
*.r*.hasIpv6 = true
*.r*.isis.routingTableModule6 = "^.ipv6.routingTable"

# IPv4 configurator: addresses + on-link + manual host default routes only
*.configurator.config = xmldoc("Ipv4Config.xml")
*.configurator.addRemoteRoutes = false

# IPv6 configurator: addresses + on-link routes; host defaults come from RAs
*.configurator6.config = xmldoc("Ipv6Config.xml")
*.configurator6.addRemoteRoutes = false
**.ipv6.configurator.networkConfiguratorModule = "configurator6"

# IS-IS (Level 1) on the inter-router links, advertising both IPv4 and IPv6
*.r1.isis.configData = xml("<isis net='49.0001.1921.6800.0001.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.r2.isis.configData = xml("<isis net='49.0001.1921.6800.0002.00' isType='L1'><interface name='eth0' helloInterval='1s'/><interface name='eth1' helloInterval='1s'/></isis>")
*.r3.isis.configData = xml("<isis net='49.0001.1921.6800.0003.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")

# Ping hostA -> hostB over both IPv4 and IPv6
*.hostA.numApps = 2
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "10.0.3.10"
*.hostA.app[0].startTime = 8s
*.hostA.app[0].sendInterval = 1s
*.hostA.app[1].typename = "PingApp"
*.hostA.app[1].destAddr = "2001:db8:3::100"
*.hostA.app[1].startTime = 8s
*.hostA.app[1].sendInterval = 1s
