[General]
network = IsisAndBgp
sim-time-limit = 100s

**.ipv6.configurator.networkConfiguratorModule = "configurator"

# IPv6-only routers; IS-IS installs into the IPv6 routing table
*.r*.hasIpv4 = false
*.r*.hasIpv6 = true
*.r*.isis.routingTableModule = ""
*.r*.isis.routingTableModule6 = "^.ipv6.routingTable"

# ---- IS-IS (IGP), per router; intra-AS router links only (NOT the eBGP link) ----
# AS 65001 = IS-IS area 49.0001
*.rA1.isis.configData = xml("<isis net='49.0001.1921.6800.0011.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.rA2.isis.configData = xml("<isis net='49.0001.1921.6800.0012.00' isType='L1'><interface name='eth0' helloInterval='1s'/><interface name='eth1' helloInterval='1s'/></isis>")
*.rA3.isis.configData = xml("<isis net='49.0001.1921.6800.0013.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")
# AS 65002 = IS-IS area 49.0002
*.rB1.isis.configData = xml("<isis net='49.0002.1921.6800.0021.00' isType='L1'><interface name='eth1' helloInterval='1s'/></isis>")
*.rB2.isis.configData = xml("<isis net='49.0002.1921.6800.0022.00' isType='L1'><interface name='eth0' helloInterval='1s'/><interface name='eth1' helloInterval='1s'/></isis>")
*.rB3.isis.configData = xml("<isis net='49.0002.1921.6800.0023.00' isType='L1'><interface name='eth0' helloInterval='1s'/></isis>")

# ---- BGP over IPv6 (MP-BGP) ----
*.r*.hasBgp = true
*.r*.bgp.addressFamily = "ipv6"
*.r*.bgp.routingTableModule = "^.ipv6.routingTable"
*.r*.bgp.bgpConfig = xmldoc("BgpConfig6.xml")
# the IGP is IS-IS, not OSPFv2, and there is no redistribution, so BGP must not
# try to bind to an OSPF module
*.r*.bgp.ospfRoutingModule = ""
*.rA1.bgp.routerId = "1.1.1.1"
*.rA2.bgp.routerId = "1.1.1.2"
*.rA3.bgp.routerId = "1.1.1.3"
*.rB1.bgp.routerId = "2.2.2.1"
*.rB2.bgp.routerId = "2.2.2.2"
*.rB3.bgp.routerId = "2.2.2.3"
# border routers advertise themselves as next hop into their AS, so the internal
# routers resolve the BGP next hop via IS-IS
*.rA3.bgp.nextHopSelf = true
*.rB1.bgp.nextHopSelf = true

# end-to-end check: hostA pings hostB (inter-AS, via BGP). Succeeds only once
# IS-IS has converged (intra-AS reachability + next-hop resolution) AND BGP has
# exchanged the inter-AS prefixes.
*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "2001:db8:2:3::100"
*.hostA.app[0].startTime = 70s
*.hostA.app[0].sendInterval = 1s

# -----------------------------------------------------------------------------
# IS-IS only (no BGP): verifies that IS-IS provides multi-hop intra-AS IPv6
# reachability. hostA pings rA3's far (rA2-facing) address, reachable from rA1
# only via the IS-IS route through rA2.
# -----------------------------------------------------------------------------
[Config IsisOnly]
description = "IS-IS IGP only, no BGP - intra-AS IPv6 routing"
*.r*.hasBgp = false
*.hostA.app[0].destAddr = "2001:db8:1:23::3"   # rA3 (intra-AS, via IS-IS)
*.hostA.app[0].startTime = 20s
