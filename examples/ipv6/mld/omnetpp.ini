#
# MLDv1 demonstration scenario: IPv6 host listeners join a multicast group
# (ff0e::1), the Router6 querier sends periodic General Listener Queries, one
# host leaves the group triggering an MLD Done -> Multicast-Address-Specific
# Query sequence.
#
# Run command (from this directory):
#   inet -u Cmdenv -f omnetpp.ini -c MldDemo -r 0
#
# Expected EV markers in the Cmdenv log:
#   "sending Multicast Listener Report for group=ff0e::1 on iface="  (host join)
#   "recorded listener for group=ff0e::1"                            (router records)
#   "sending General Listener Query on iface="                       (router periodic query)
#   "received General Listener Query on iface="                      (host sees query)
#   "sending Multicast Listener Done for group=ff0e::1 on iface="    (host2 leave)
#   "received Multicast Listener Done for group=ff0e::1"             (router sees done)
#   "sending Multicast-Address-Specific Query for group=ff0e::1"     (router MAS query)
#

[General]
network = MldDemo
cmdenv-express-mode = false
cmdenv-log-prefix = "%C: "

# Fix RNG seed for deterministic behavior of uniform(0, maxRespTime) in startHostTimer
seed-set = 0

# Run for 30s: enough for join -> General Query -> Done -> MAS Query cycle
sim-time-limit = 30s

[Config MldDemo]
description = "MLDv1 listener + querier demo"

# Enable MLD on all nodes: hosts become listeners, router becomes querier
**.ipv6.hasMld = true

# Disable DAD for fast deterministic startup (eliminates ~1s+ delay per address)
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# Activate the querier on the router.
# MUST be set at the node (Router6) level: NetworkLayerNodeBase propagates
#   *.multicastForwarding = this.multicastForwarding
# to all submodules (including ipv6.routingTable), overriding any per-submodule setting.
**.router.multicastForwarding = true

# Router timing: short startupQueryInterval so the General Query fires before host2 leaves.
# queryInterval is long so only one periodic Query fires in the 30s window.
**.router.ipv6.mldv1.startupQueryInterval = 2s
**.router.ipv6.mldv1.queryInterval = 100s
**.router.ipv6.mldv1.queryResponseInterval = 1s
# lastListenerQueryInterval=1s, lastListenerQueryCount=2: leave countdown = 2s.
**.router.ipv6.mldv1.lastListenerQueryInterval = 1s
**.router.ipv6.mldv1.lastListenerQueryCount = 2
# multicastListenerInterval=10s: listener entry stays alive well past the join time
# so it is present when host2 leaves at t=10s.
**.router.ipv6.mldv1.multicastListenerInterval = 10s

# host1: persistent listener; joins ff0e::1 and stays for the whole simulation.
# Socket join fires ipv6MulticastGroupJoinedSignal -> Mldv1 sends unsolicited Report.
**.host1.numApps = 1
**.host1.app[0].typename = "UdpSink"
**.host1.app[0].localPort = 1000
**.host1.app[0].multicastGroup = "ff0e::1"

# host2: transient listener; joins ff0e::1 at t=0 and leaves at t=10s.
# Socket close at stopTime fires ipv6MulticastGroupLeftSignal -> Mldv1 sends Done.
# The router receives the Done and sends a Multicast-Address-Specific Query for ff0e::1.
**.host2.numApps = 1
**.host2.app[0].typename = "UdpSink"
**.host2.app[0].localPort = 1000
**.host2.app[0].multicastGroup = "ff0e::1"
**.host2.app[0].stopTime = 10s

# sender: optional UdpBasicApp sending data to ff0e::1 to show data delivery to listeners.
# timeToLive=10 so the router can forward (hop limit > 1 required for forwarding).
# Sends start at t=5s (after addresses are settled and listeners are registered).
**.sender.numApps = 1
**.sender.app[0].typename = "UdpBasicApp"
**.sender.app[0].destAddresses = "ff0e::1"
**.sender.app[0].destPort = 1000
**.sender.app[0].messageLength = 64B
**.sender.app[0].timeToLive = 10
**.sender.app[0].startTime = 5s
**.sender.app[0].sendInterval = 2s
**.sender.app[0].stopTime = 25s

# Ethernet queue configuration (mirrors MLD module test settings)
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10
