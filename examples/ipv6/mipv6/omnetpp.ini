#
# Mobile IPv6 (RFC 3775) example on the Mipv6Network topology: a mobile node (MN)
# roams from its home network to a foreign access network, registers a care-of
# address with its home agent, and exchanges traffic with one or more correspondent
# nodes (CN) -- first via the bidirectional home-agent tunnel, then route-optimized.
# The configurations below exercise plain handover and route optimization with two CNs.
#

[General]
network = Mipv6Network
abstract = true
seed-set = 1
num-rngs = 3
**.mobility.rng-0 = 2   # give the mobility its own RNG, isolated from the wireless MAC

*.total_mn = 1
*.total_cn = 2

# The Ipv6NetworkConfigurator (wired up in Mipv6Network.ned) assigns addresses and
# shortest-path routes. Movement detection relies on a Router Solicitation sent on each
# handover (the default detectL2Movement behaviour of Ipv6NeighbourDiscovery), so
# realistic Router Advertisement intervals suffice -- no artificially fast RAs.
**.neighbourDiscovery.minIntervalBetweenRAs = 3s
**.neighbourDiscovery.maxIntervalBetweenRAs = 7s

# wireless channel physical parameters
*.radioMedium.mediumLimitCache.maxTransmissionPower = 2.0mW
*.radioMedium.mediumLimitCache.minReceptionPower = -82dBm
*.radioMedium.mediumLimitCache.minInterferencePower = -82dBm

# access points: SSIDs and fixed (easy-to-recognize) MAC addresses
**.AP*.wlan*.mgmt.beaconInterval = 0.1s
**.AP_Home.wlan*.mgmt.ssid = "HOME"
**.AP_Home.wlan*.address = "10:AA:00:00:00:01"
**.AP_Home.eth[0].address = "10:AE:00:00:00:02"
**.AP_1.wlan*.mgmt.ssid = "AP1"
**.AP_1.wlan*.address = "10:AA:00:00:A1:01"
**.AP_1.eth[0].address = "10:AE:00:00:A1:02"
# the access points bridge their wireless and wired sides with a plain (no STP) MAC relay
*.AP*.bridging.typename = "MacRelayUnit"

# the home network is on wireless channel 1, the foreign network on channel 2; the
# mobile node starts unassociated (channel 0) and scans both
**.AP_Home.wlan*.radio.channelNumber = 1
**.AP_1.wlan*.radio.channelNumber = 2
**.wlan*.agent.channelsToScan = "1 2"
**.wlan*.agent.probeDelay = 0.1s
**.wlan*.agent.minChannelTime = 0.15s
**.wlan*.agent.maxChannelTime = 0.3s
**.wlan*.agent.authenticationTimeout = 5s
**.wlan*.agent.associationTimeout = 5s
**.wlan*.bitrate = 2Mbps
**.wlan*.mac.dcf.channelAccess.cwMin = 7
**.radio.transmitter.power = 2.0mW
**.analogModel.ignorePartialInterference = true

# The MN dwells in its home network for a while, then dashes out to the foreign network
# (AP_1) and settles there, so the "at home / handing over / in the foreign network"
# phases are easy to follow. See movement.xml for the exact schedule.
**.MN[0].mobility.typename = "TurtleMobility"
**.MN[0].mobility.turtleScript = xmldoc("movement.xml")
**.MN*.mobility.updateInterval = 0.1s
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.constraintAreaMaxX = 850m
**.constraintAreaMaxY = 850m

# Show the mobile node's live MIPv6 status above its icon in Qtenv: the associated SSID
# and its home/away/route-optimized state. The values come from WATCH'd variables in the
# wlan MIB and the mipv6 submodule; the leading '.' makes the paths relative to this node.
*.MN[*].displayStringTextFormat = "AP: {.wlan[0].mib.ssid}\n{.ipv6.mipv6.mobilityStatus}"

# application defaults; the actual traffic is enabled per [Config] below
**.app[*].typename = "PingApp"
**.app[*].packetSize = 56B
**.app[*].hopLimit = 32
#**.app[*].printPing = true   # uncomment to log each ping and reply

# hosts do not forward; the routers and home agent forward by virtue of their NED type
**.forwarding = false

# Ethernet queues
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10

[Config Handover]
description = "Plain handover: the foreign network is reached through the bidirectional home-agent tunnel (route optimization disabled)"
sim-time-limit = 70s

# Route optimization is turned off, so this configuration shows handover with plain
# bidirectional tunneling and nothing else: one correspondent node pings the MN's home
# address throughout -- reaching it directly while it is home, then through the home-agent
# tunnel once it has handed over and registered a care-of address. The RouteOptimizationTwoCNs
# config below is the same scenario with route optimization left on.
#
# The destination is hardcoded (the home prefix 2001:db8:0:2::/64 assigned to the home link
# + the MN's interface id) rather than resolved with "MN[0](ipv6)": the resolver returns the
# MN's link-local address before SLAAC completes, and its *care-of* address once it has moved
# away -- never reliably the stable home address that a correspondent node must target.
*.MN[*].ipv6.mipv6.useRouteOptimization = false
*.CN[0].numApps = 1
*.CN[0].app[0].destAddr = "2001:db8:0:2:8aa:ff:fe00:8"
*.CN[0].app[0].sendInterval = 0.5s
*.CN[0].app[0].startTime = 1s

[Config RouteOptimizationTwoCNs]
description = "Route optimization between the mobile node and two correspondent nodes"
sim-time-limit = 60s

# Route optimization is left enabled (the default). The MN dwells at home, then dashes to
# the foreign network and settles there (see movement.xml). Once it is settled and registered
# (~t=25s), two correspondent nodes start pinging its home address (see the Handover config
# for why this address is hardcoded), so the home agent first tunnels the traffic and then
# each flow independently runs the return-routability procedure and installs a binding --
# leaving the MN route-optimized with both correspondents at once, bypassing the tunnel.
*.CN[*].numApps = 1
*.CN[*].app[0].destAddr = "2001:db8:0:2:8aa:ff:fe00:8"
*.CN[*].app[0].count = 5
*.CN[*].app[0].sendInterval = 2s
*.CN[*].app[0].startTime = 30s
