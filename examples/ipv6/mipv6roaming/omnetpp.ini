#
# Mobile IPv6 (RFC 3775) roaming example: a mobile node moves across THREE access
# networks -- its home network and two foreign networks -- performing two successive
# handovers. In each foreign network it forms a new care-of address and re-registers it
# with the home agent; a correspondent node's traffic follows the mobile node throughout.
#

[General]
network = Mipv6RoamingNetwork
abstract = true
seed-set = 1
num-rngs = 3
**.mobility.rng-0 = 2   # give the mobility its own RNG, isolated from the wireless MAC

*.total_mn = 1
*.total_cn = 1

# The Ipv6NetworkConfigurator assigns addresses + routes; the mobile node autoconfigures
# its home/care-of addresses (SLAAC). Movement is detected from a Router Solicitation on
# each L2 (re)association (default detectL2Movement), so realistic RA intervals suffice.
**.neighbourDiscovery.minIntervalBetweenRAs = 3s
**.neighbourDiscovery.maxIntervalBetweenRAs = 7s

# wireless channel physical parameters
*.radioMedium.mediumLimitCache.maxTransmissionPower = 2.0mW
*.radioMedium.mediumLimitCache.minReceptionPower = -82dBm
*.radioMedium.mediumLimitCache.minInterferencePower = -82dBm

# access points: SSIDs and fixed (easy-to-recognize) MAC addresses
**.AP*.wlan*.mgmt.beaconInterval = 0.1s
**.AP_Home.wlan*.mgmt.ssid = "HOME"
**.AP_Home.wlan*.address = "10:AA:00:00:00:01"
**.AP_Home.eth[0].address = "10:AE:00:00:00:02"
**.AP_1.wlan*.mgmt.ssid = "AP1"
**.AP_1.wlan*.address = "10:AA:00:00:A1:01"
**.AP_1.eth[0].address = "10:AE:00:00:A1:02"
**.AP_2.wlan*.mgmt.ssid = "AP2"
**.AP_2.wlan*.address = "10:AA:00:00:A2:01"
**.AP_2.eth[0].address = "10:AE:00:00:A2:02"

# each access network is on its own wireless channel (home=1, foreign-1=2, foreign-2=3);
# the mobile node starts unassociated (channel 0) and scans all three
**.AP_Home.wlan*.radio.channelNumber = 1
**.AP_1.wlan*.radio.channelNumber = 2
**.AP_2.wlan*.radio.channelNumber = 3
**.wlan*.agent.channelsToScan = "1 2 3"
**.wlan*.agent.probeDelay = 0.1s
**.wlan*.agent.minChannelTime = 0.15s
**.wlan*.agent.maxChannelTime = 0.3s
**.wlan*.agent.authenticationTimeout = 5s
**.wlan*.agent.associationTimeout = 5s
**.wlan*.bitrate = 2Mbps
**.wlan*.mac.dcf.channelAccess.cwMin = 7
**.radio.transmitter.power = 2.0mW
**.analogModel.ignorePartialInterference = true

# mobility - the MN dwells in each network for a while, then dashes to the next one,
# performing two handovers (home -> AP_1 -> AP_2). See movement.xml for the schedule.
**.MN[0].mobility.typename = "TurtleMobility"
**.MN[0].mobility.turtleScript = xmldoc("movement.xml")
**.MN*.mobility.updateInterval = 0.1s
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.constraintAreaMaxX = 1050m
**.constraintAreaMaxY = 850m

# Show the mobile node's live MIPv6 status above its icon in Qtenv: the associated SSID
# and its home/away/route-optimized state. The values come from WATCH'd variables in the
# wlan MIB and the mipv6 submodule. The leading '.' makes the paths relative to this node
# (a bare path would be resolved from the top-level network).
*.MN[*].displayStringTextFormat = "AP: {.wlan[0].mib.ssid}\n{.ipv6.mipv6.mobilityStatus}"

# application defaults; the actual traffic is enabled per [Config] below
**.app[*].typename = "PingApp"
**.app[*].packetSize = 56B
**.app[*].hopLimit = 32
#**.app[*].printPing = true   # uncomment to log each ping and reply

# hosts do not forward; the routers and home agent forward by virtue of their NED type
**.forwarding = false

# Ethernet queues
**.eth[*].queue.typename = "EthernetQosQueue"
**.eth[*].queue.dataQueue.typename = "DropTailQueue"
**.eth[*].queue.dataQueue.packetCapacity = 10

[Config Roaming]
description = "A mobile node roams across three access networks, handing over twice"
sim-time-limit = 70s

# The correspondent node pings the mobile node's stable HOME address throughout. As the
# mobile node hands over (home -> AP_1 -> AP_2), the home agent tunnels these pings to its
# current care-of address, so the echo replies follow it across both foreign networks --
# demonstrating session continuity under mobility. The address is hardcoded (the home
# prefix 2001:db8:0:2::/64 + the MN's interface id) rather than resolved with
# "MN[0](ipv6)": the resolver returns the link-local address before SLAAC completes, and
# the *care-of* address once the node has moved away -- never reliably the home address.
*.CN[0].numApps = 1
*.CN[0].app[0].destAddr = "2001:db8:0:2:8aa:ff:fe00:b"
*.CN[0].app[0].sendInterval = 0.5s
*.CN[0].app[0].startTime = 1s
