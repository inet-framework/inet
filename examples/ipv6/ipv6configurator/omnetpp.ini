[General]
network = Ipv6ConfiguratorNetwork
sim-time-limit = 60s
abstract = true

# Enable the per-node Ipv6NodeConfigurator to use the global configurator
**.ipv6.configurator.networkConfiguratorModule = "configurator"

# Dump configuration for demonstration
**.configurator.dumpAddresses = true
**.configurator.dumpRoutes = true
**.configurator.dumpLinks = true

# UDP traffic: host1 -> host3 (cross-LAN)
**.host1.numApps = 1
**.host1.app[0].typename = "UdpBasicApp"
**.host1.app[0].destAddresses = "host3"
**.host1.app[0].destPort = 5000
**.host1.app[0].messageLength = 1000B
**.host1.app[0].sendInterval = 1s
**.host1.app[0].startTime = 5s

# UDP traffic: host2 -> host4 (cross-LAN)
**.host2.numApps = 1
**.host2.app[0].typename = "UdpBasicApp"
**.host2.app[0].destAddresses = "host4"
**.host2.app[0].destPort = 5000
**.host2.app[0].messageLength = 500B
**.host2.app[0].sendInterval = 2s
**.host2.app[0].startTime = 6s

# UDP sinks
**.host3.numApps = 1
**.host3.app[0].typename = "UdpSink"
**.host3.app[0].localPort = 5000

**.host4.numApps = 1
**.host4.app[0].typename = "UdpSink"
**.host4.app[0].localPort = 5000

[Config Default]
description = "Default prefix assignment (2001:db8:x:x::/64)"
# Uses the default XML config: all interfaces get a /64 prefix from the
# documentation address space, automatically incremented per link.

[Config Hierarchical]
description = "Hierarchical prefix assignment using XML configuration"
# Assign different /48 blocks to each LAN
**.configurator.config = xml("<config> \
    <interface among='host1 host2 router1' prefix='2001:db8:1:x::/64'/> \
    <interface among='host3 host4 router2' prefix='2001:db8:2:x::/64'/> \
    <interface among='router1 router2' prefix='2001:db8:ff:x::/64'/> \
</config>")

[Config ManualRouters]
description = "Routers configured with static addresses; hosts use SLAAC"
# configurator assigns addresses only to routers and sets AdvPrefixes;
# hosts obtain their global addresses via SLAAC (Router Advertisements).
**.configurator.assignAddressesToHosts = false
**.configurator.config = xml("<config> \
    <interface among='host1 host2 router1' prefix='2001:db8:1:x::/64'/> \
    <interface among='host3 host4 router2' prefix='2001:db8:2:x::/64'/> \
    <interface among='router1 router2' prefix='2001:db8:ff:x::/64'/> \
</config>")
# Need longer sim time for SLAAC to complete (DAD takes ~1s)
sim-time-limit = 120s

[Config CustomRA]
description = "Custom RA/NDP parameters via XML attributes"
# Demonstrates per-interface RA tuning: short prefix lifetimes, fast RA intervals
**.configurator.assignAddressesToHosts = false
**.configurator.config = xml("<config> \
    <interface among='host1 host2 router1' prefix='2001:db8:1:x::/64' \
              advValidLifetime='86400' advPreferredLifetime='3600' \
              maxRtrAdvInterval='30' minRtrAdvInterval='10'/> \
    <interface among='host3 host4 router2' prefix='2001:db8:2:x::/64' \
              advValidLifetime='86400' advPreferredLifetime='3600' \
              maxRtrAdvInterval='30' minRtrAdvInterval='10'/> \
    <interface among='router1 router2' prefix='2001:db8:ff:x::/64'/> \
</config>")
sim-time-limit = 120s
