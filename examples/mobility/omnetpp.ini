[Config AttachedMobility]
extends = MobileNetwork, Area, Update
description = "attached"
*.numHosts = 3

# mobility visualizer shows velocity and orientation
*.hasVisualizer = true
*.visualizer.mobilityVisualizer.moduleFilter = "**.mobility" # filter for host mobilities, ignore mobility superposition elements
*.visualizer.mobilityVisualizer.displayMovementTrails = true
*.visualizer.mobilityVisualizer.displayOrientations = true
*.visualizer.mobilityVisualizer.displayVelocities = true

# other hosts are also moving around in a larger circle following host[0]
**.host[0].mobility.typename = "CircleMobility"
**.host[0].mobility.cx = 300m
**.host[0].mobility.cy = 200m
**.host[0].mobility.r = 150m
**.host[0].mobility.speed = 40mps

# other hosts are also moving around in a larger circle following host[0]
**.host[*].mobility.typename = "AttachedMobility"
**.host[*].mobility.mobilityModule = "^.^.host[0].mobility"
**.host[1].mobility.offsetX = 50m
**.host[1].mobility.offsetHeading = 90deg
**.host[2].mobility.offsetX = -50m
**.host[2].mobility.offsetHeading = -90deg

[Config SuperpositioningMobility]
extends = MobileNetwork, Area, Update
description = "superpositioning"
*.numHosts = 8

# mobility visualizer shows velocity and orientation
*.hasVisualizer = true
*.visualizer.mobilityVisualizer.moduleFilter = "**.mobility" # filter for host mobilities, ignore mobility superposition elements
*.visualizer.mobilityVisualizer.displayMovementTrails = true
*.visualizer.mobilityVisualizer.displayOrientations = true
*.visualizer.mobilityVisualizer.displayVelocities = true

# last host stays in the center of the scene
**.host[7].mobility.typename = "StationaryMobility"
**.host[7].mobility.initialX = 300m
**.host[7].mobility.initialY = 200m
**.host[7].mobility.initialZ = 0m

# other hosts move around the scene using mobility superpositon
**.host[*].mobility.typename = "SuperpositioningMobility"
**.host[*].mobility.numElements = 4

# other hosts are intiallly positioned in static concentric circles
**.host[*].mobility.element[0].typename = "StaticConcentricMobility"
**.host[*].mobility.element[0].subjectModule = "^.^"
**.host[*].mobility.element[0].numHosts = 7

# other hosts are also moving around in a larger circle following host[0]
**.host[0].mobility.element[1].typename = "CircleMobility"
**.host[0].mobility.element[1].faceForward = false
**.host[0].mobility.element[1].cx = 300m
**.host[0].mobility.element[1].cy = 200m
**.host[0].mobility.element[1].r = 150m
**.host[0].mobility.element[1].speed = 40mps
**.host[*].mobility.element[1].typename = "AttachedMobility" # other hosts follow the movement of the 2nd element of host[0]'s mobility superposition
**.host[*].mobility.element[1].mobilityModule = "^.^.^.host[0].mobility.element[1]"

# other hosts are also slightly moving randomly around their position in the group
**.host[*].mobility.element[2].typename = "MassMobility"
**.host[*].mobility.element[2].faceForward = false
**.host[*].mobility.element[2].initFromDisplayString = false
**.host[*].mobility.element[2].initialX = 0m
**.host[*].mobility.element[2].initialY = 0m
**.host[*].mobility.element[2].initialZ = 0m
**.host[*].mobility.element[2].constraintAreaMinX = 0m
**.host[*].mobility.element[2].constraintAreaMinY = 0m
**.host[*].mobility.element[2].constraintAreaMaxX = 50m # limiting the random movement
**.host[*].mobility.element[2].constraintAreaMaxY = 50m # limiting the random movement
**.host[*].mobility.element[2].changeInterval = truncnormal(2s, 1s)
**.host[*].mobility.element[2].angleDelta = normal(0deg, 30deg)
**.host[*].mobility.element[2].speed = truncnormal(10mps, 3mps)

# other hosts are facing towards the last host sitting in the center
**.host[*].mobility.element[3].typename = "FacingMobility"
**.host[*].mobility.element[3].initFromDisplayString = false
**.host[*].mobility.element[3].initialX = 0m
**.host[*].mobility.element[3].initialY = 0m
**.host[*].mobility.element[3].initialZ = 0m
**.host[*].mobility.element[3].sourceMobility = "^" # the superposition is the source
**.host[*].mobility.element[3].targetMobility = "^.^.^.host[7].mobility" # last host is the target

[Config VehicleMobility]
extends = MobileNetwork, Area, Update
description = "vehicle"
*.hasEnvironment = true
*.hasVisualizer = true
*.numHosts = 1

*.visualizer.mobilityVisualizer.displayMobility = true
*.environment.ground.typename = "FlatGround"

*.host[0].mobility.typename = "VehicleMobility"
*.host[0].mobility.waypointFile = "vehicle_waypoints.txt"
*.host[0].mobility.waypointProximity = 5m
*.host[0].mobility.speed = 10mps
*.host[0].mobility.groundModule = "environment.ground"

[Config SatelliteMobility]
description = "Whole globe; open the Europe module for a regional map, then Budapest for the Óbuda street map; GnssTackMobility for airplanes"
network = SatelliteNetwork
sim-time-limit = 48h
# absolute UTC mapped to simulation time 0, configured on each satellite and visualizer
**.epoch = "2000-06-28T00:20:19Z"

# the geocentric (WGS84/ECEF) scene; ground stations and satellites share it
*.coordinateSystem.typename = "Wgs84EcefGeographicCoordinateSystem"

# --- satellites: each one is configured individually with the SGP4 mobility ---
# (shared settings via satellite[*], the per-satellite TLE selection just below)
*.sat[*].mobility.typename = "inet.mobility.single.SatelliteMobility"
*.sat[*].mobility.tleData = readFile("satellites.tle")
*.sat[*].mobility.coordinateSystemModule = "^.^.coordinateSystem"  # the network's shared Wgs84/ECEF frame (a leading-dot ".coordinateSystem" would look for a nonexistent submodule of the mobility itself, leaving the geographic {geo_position} display text empty)
*.sat[*].mobility.updateInterval = 10s
*.sat[*].mobility.attitudeMode = "velocity"

# select which satellite from the TLE file each node propagates (by name; the name is
# also shown as the label next to each satellite on the map and in the sky views)
*.sat[0].mobility.satelliteName = "TEME"  # Vanguard 1 (the name line in satellites.tle)
*.sat[1].mobility.satelliteName = "ISS"

# label each node on the map with its satellite name (the node's display-name; it
# mirrors the satelliteName above - ini can't reference the submodule param directly)
*.sat[0].display-name = "TEME"
*.sat[1].display-name = "ISS"

# place the node icon at its projected map position: the geographic map visualizer sets up an
# equirectangular CanvasProjection, so the regular networkNodeVisualizer (and the icon's display
# string) now land on the map. SatelliteMobility defaults this to false (raw ECEF is not meaningful
# on a flat scene), so it is enabled here to place the node icons at their map positions.
*.sat[*].mobility.updateDisplayString = true

# --- aircraft: planes flying great-circle routes between major cities (GnssTrackMobility) ---
# each track is inline CSV "lat,lon,alt,time" rows: the departure city at 0 m, a climb-top and a
# descent-start waypoint at cruise altitude (both on the great circle, ~10%/90% along the route),
# then the arrival city at 0 m. So the plane climbs after take-off and descends before landing
# (altitude is interpolated linearly per segment), and its horizon footprint grows then shrinks.
# The 4th column is the time (seconds), so playback is timestamp-driven (the 'speed' param is then
# ignored). Each city waypoint is duplicated 1800 s apart, so the plane WAITS 30 minutes parked at
# both ends - before departing and after landing before turning back; ping-pong replays both dwells.
# updateDisplayString places the moving icon on the map; the route is shown by display-name.
*.plane[*].mobility.typename = "inet.mobility.single.GnssTrackMobility"
*.plane[*].mobility.coordinateSystemModule = "^.^.coordinateSystem"  # the network's shared Wgs84/ECEF frame (a leading-dot ".coordinateSystem" resolves to a nonexistent submodule of the mobility, leaving the {geo_position} display text empty)
*.plane[*].mobility.updateInterval = 60s
*.plane[*].mobility.updateDisplayString = true
*.plane[*].mobility.loopMode = "pingPong"
# trackData times: 0/1800 = 30 min origin dwell; then climb-top, descent-start (~10%/90% of the
# flight time T); arrival at 1800+T; arrival+1800 = 30 min destination dwell (T ~ distance / 250 mps)
*.plane[0].display-name = "JFK - LHR"
*.plane[0].mobility.trackData = "40.64,-73.78,0,0\n40.64,-73.78,0,1800\n43.63,-68.40,10000,4000\n52.75,-8.30,10000,21600\n51.47,-0.45,0,23800\n51.47,-0.45,0,25600"
*.plane[1].display-name = "LAX - HND"   # crosses the antimeridian
*.plane[1].mobility.trackData = "33.94,-118.41,0,0\n33.94,-118.41,0,1800\n38.31,-126.60,10000,5300\n39.72,148.30,10000,33300\n35.55,139.78,0,36800\n35.55,139.78,0,38600"
*.plane[2].display-name = "DXB - GRU"
*.plane[2].mobility.trackData = "25.25,55.36,0,0\n25.25,55.36,0,1800\n21.56,44.08,10000,6600\n-19.35,-35.51,10000,45000\n-23.43,-46.47,0,49800\n-23.43,-46.47,0,51600"
*.plane[3].display-name = "LHR - BUD"   # London - Budapest (short European hop)
*.plane[3].mobility.trackData = "51.47,-0.45,0,0\n51.47,-0.45,0,1800\n51.20,1.62,10000,2400\n47.79,17.30,10000,7200\n47.43,19.26,0,7800\n47.43,19.26,0,9600"

# mobility visualization: the satelliteVisualizer (a MobilityCanvasVisualizer) also uses the
# equirectangular projection, so a movement trail traces each satellite's ground track on the map.
# restrict it to the satellites: only they get the rich decorations (position marker, ground-track
# trail, orientation cone, velocity arrow). The ground stations are not moving, so they just show
# their node icon and position label - i.e. only their location (configured per ground station below).
*.satVisualizer.moduleFilter = "**.sat[*].mobility"
*.satVisualizer.velocityProjection = "isometric" # default, trueLength, isometric
*.satVisualizer.orientationProjection = "isometric"
*.satVisualizer.displayMovementTrails = true
# hide the trail segment when a satellite wraps across the map's antimeridian (its projected point
# jumps nearly the full map width); a normal 10s ground-track step is ~1-2 px, the wrap is ~700 px
*.satVisualizer.movementTrailSegmentHideThreshold = 100  # px (world map is 720 px wide)
*.satVisualizer.displayPositions = false
*.satVisualizer.displayOrientations = true
# the orientation cone's base disc is colored by its up/down direction (blue up / red down by
# default; set orientationFillColorUp/Down, or leave one empty for no fill)
*.satVisualizer.displayVelocities = true
# the velocity arrow length is the projected ground motion scaled by this factor (~seconds of
# look-ahead, in map pixels); the default 1 is sub-pixel at orbital scale, so enlarge it (tunable)
*.satVisualizer.velocityArrowScale = 300

# mark the ground-station locations on the world map (their icons sit in a row below the map, so
# this draws a position marker at each station's projected geographic location)
*.gsVisualizer.moduleFilter = "**.gs[*].mobility or **.europe.mobility"
*.gsVisualizer.displayPositions = true

# the aircraft: show only their location (position marker) and ground-track movement trail
*.planeVisualizer.zIndex = -1
*.planeVisualizer.moduleFilter = "**.plane[*].mobility"
*.planeVisualizer.displayPositions = false
*.planeVisualizer.displayMovementTrails = true
# hide the wrap segment when a transoceanic route crosses the antimeridian (e.g. LAX-Tokyo)
*.planeVisualizer.movementTrailSegmentHideThreshold = 100

# --- map visualizer: draws the 2D world map (image + graticule) and sets up the shared
# equirectangular projection that the node icons, mobility figures and footprints all use.
# the map image and the visible latitude/longitude window are set per configuration below
# the absolute UTC wall-clock (lower-left corner); set to the same epoch as the satellites, per config below

# --- visibility footprint overlay: the coverage footprint is drawn by the geoHorizon visualizer
# (GeoHorizonCanvasVisualizer). It takes the map window from the 'map' visualizer it references
# (mapVisualizer below; the default looks for a 'geoMapVisualizer') and the ECEF coordinate system
# from its own coordinateSystemModule. Drawn for the satellites and the aircraft (a plane's footprint
# at 10 km altitude is a small ~350 km circle around it; a satellite's is much larger).
*.geoHorizon.displayVisibility = true
*.geoHorizon.coordinateSystemModule = "^.coordinateSystem"
*.geoHorizon.mapVisualizer = "^.map"
*.geoHorizon.moduleFilter = "**.sat[*].mobility or **.plane[*].mobility"

# --- ground stations (a vector) placed by latitude/longitude/height ---
# plain StationaryMobility taking the position from latitude/longitude; initFromDisplayString and
# updateFromDisplayString are off so the icon stays decoupled from the NED display position (a row
# below the map). Each station's name is shown by its display-name (the module name would be the
# ugly "groundStation[i]"); the text under the icon shows its geographic position ({geo_position}).
*.gs[*].mobility.typename = "inet.mobility.static.StationaryMobility"
*.gs[*].mobility.initFromDisplayString = false
*.gs[*].mobility.updateFromDisplayString = false
*.gs[*].mobility.updateDisplayString = true
*.gs[*].mobility.displayStringTextFormat = "{geo_position}"
*.gs[*].mobility.coordinateSystemModule = "^.^.coordinateSystem"

*.gs[0].display-name = "Lima"
*.gs[0].mobility.initialLatitude = -12.046deg
*.gs[0].mobility.initialLongitude = -77.043deg
*.gs[0].mobility.initialAltitude = 154m

*.gs[1].display-name = "Los Angeles"
*.gs[1].mobility.initialLatitude = 34.052deg
*.gs[1].mobility.initialLongitude = -118.244deg
*.gs[1].mobility.initialAltitude = 89m

# --- progressive map drill-down: the 'europe' module is placed on the world map; opening it
# shows the Europe map on its own canvas, and the 'budapest' module inside it (placed on the
# Europe map) opens the Óbuda OpenStreetMap view. Each level reuses the same shared ECEF frame,
# so a node placed by its mobility lands on its parent module's map (world -> Europe -> Óbuda).

# Europe placed on the world map by its mobility (central Europe)
*.europe.mobility.typename = "inet.mobility.static.StationaryMobility"
*.europe.mobility.coordinateSystemModule = "^.^.coordinateSystem"  # network Wgs84/ECEF
*.europe.mobility.initFromDisplayString = false
*.europe.mobility.updateFromDisplayString = false
*.europe.mobility.updateDisplayString = true
*.europe.mobility.initialLatitude = 48.8566deg   # Paris
*.europe.mobility.initialLongitude = 2.3522deg
*.europe.mobility.initialAltitude = 0m

# the Europe map (equirectangular crop) drawn on the europe module's own canvas; its extent
# defines the window and the map area aspect ratio matches the image (1308:1245 = 436:415)
*.europe.map.mapImage = "maps/europe-er"
*.europe.map.minLatitude = 37.0deg
*.europe.map.maxLatitude = 73.0deg
*.europe.map.minLongitude = -13.8deg
*.europe.map.maxLongitude = 44.3deg
*.europe.map.mapWidth = 654
*.europe.map.mapHeight = 622

# --- show the satellites and their footprints on the Europe map too (inside the europe module) ---
# Both visualizers draw on the europe module's own canvas (visualizationTargetModule defaults to
# the parent), but watch the network-level satellite[*] nodes: their visualizationSubjectModule is
# pointed at the network (^.^ from a europe child) so the mobility state-change signals reach them.
# draw the managed node icons (satellites, planes, ground stations) on the Europe map; watch the
# network nodes and exclude the europe node itself (tracking its own ancestor would crash at cleanup)
# nodeFilter is matched against each node's full NAME (not its path), so the patterns are bare
# names (sat[*], not **.sat[*]); a path-style pattern would match nothing and draw no icons
*.europe.networkNodeVisualizer.visualizationSubjectModule = "^.^"
*.europe.networkNodeVisualizer.nodeFilter = "sat[*] or plane[*] or gs[*]"

# label each node icon on the Europe map with its display-name (TEME, ISS, Lima, JFK - LHR, ...).
# 'modules' matches the network nodes themselves (the label attaches to their containing node), and
# %N resolves to the node's display-name (its full name if none is set). The default
# networkNodeVisualizerModule "^.networkNodeVisualizer" points at the sibling above.
*.europe.infoVisualizer.modules = "**.sat[*] or **.plane[*] or **.gs[*]"
*.europe.infoVisualizer.format = "%N"
*.europe.infoVisualizer.backgroundColor = ""  # no text box, just the label (matches the world map look)
*.europe.infoVisualizer.placementHint = "bottom"

*.europe.satVisualizer.visualizationSubjectModule = "^.^"  # discover the network satellites
*.europe.satVisualizer.moduleFilter = "**.sat[*].mobility or **.plane[*].mobility"
*.europe.satVisualizer.displayPositions = true
*.europe.satVisualizer.displayMovementTrails = true
*.europe.satVisualizer.zIndex = -1  # above the Europe map image

# the visibility footprints, aligned to the Europe map and clipped to its window; drawn for the
# satellites and the aircraft (same as the world map), so a plane's small footprint shows up too
*.europe.geoHorizon.visualizationSubjectModule = "^.^"  # discover the network satellites and planes
*.europe.geoHorizon.coordinateSystemModule = "^.^.coordinateSystem"  # network Wgs84/ECEF frame
*.europe.geoHorizon.mapVisualizer = "^.map"  # the Europe map sibling (not the default geoMapVisualizer)
*.europe.geoHorizon.moduleFilter = "**.sat[*].mobility or **.plane[*].mobility"
*.europe.geoHorizon.displayVisibility = true

# Budapest placed on the Europe map by its mobility (Óbuda)
*.europe.budapest.mobility.typename = "inet.mobility.static.StationaryMobility"
*.europe.budapest.mobility.coordinateSystemModule = "^.^.^.coordinateSystem"  # network Wgs84/ECEF
*.europe.budapest.mobility.initFromDisplayString = false
*.europe.budapest.mobility.updateFromDisplayString = false
*.europe.budapest.mobility.updateDisplayString = true
*.europe.budapest.mobility.initialLatitude = 47.53771deg
*.europe.budapest.mobility.initialLongitude = 19.0334deg
*.europe.budapest.mobility.initialAltitude = 100m

# the OpenStreetMap backdrop of Óbuda, drawn on the budapest module's own canvas through its
# local (anchored) coordinate system (origin = the north-west corner of the obuda.osm <bounds>)
*.europe.budapest.coordinateSystem.sceneLatitude  = 47.53771deg  # maxlat from obuda.osm <bounds>
*.europe.budapest.coordinateSystem.sceneLongitude = 19.0334deg   # minlon from obuda.osm <bounds>
*.europe.budapest.map.mapFile = xmldoc("../openstreetmap/obuda.osm")

# --- sky view: az/el polar plot per ground station, showing the visible satellites; with the
# default infinite plotOffsetX/Y the plots are tiled in a grid below the world map (set finite
# offsets to anchor each plot next to its ground-station icon instead) ---
*.skyView.coordinateSystemModule = "^.coordinateSystem"
*.skyView.observerFilter = "**.gs[*].mobility"
*.skyView.targetFilter = "**.sat[*].mobility"
*.skyView.elevationMask = 10deg

# full 360deg window, shifted so the world map image is centered on longitude 10
# (the footprint overlay reads this same window from the map visualizer it references)
*.map.mapImage = "maps/world-er"
*.map.minLongitude = -170deg
*.map.maxLongitude = 190deg
