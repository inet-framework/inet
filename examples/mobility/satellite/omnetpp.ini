[General]
network = SatelliteMobilityShowcase
sim-time-limit = 6000s

# the geocentric (WGS84/ECEF) scene; ground stations and satellites share it
*.coordinateSystem.typename = "GeocentricCoordinateSystem"

# --- satellites, created and driven by the controller from the TLE file ---
*.controller.tleFiles = "satellites.tle"
*.controller.epoch = "2000-06-27T18:50:19Z"   # absolute UTC mapped to simulation time 0
*.controller.nodeType = "inet.examples.mobility.satellite.MobileNode"
*.controller.nodeName = "satellite"

# never update the the displayString because (even fo rthe stationary nodes) because thosw will result in extreme screen coordinates
# Stationary mobility has very big ECEF coordinates!

#*.*.mobility.updateDisplayString = false

# the created satellite[*] nodes use the SGP4 mobility, resolving the shared coordinate system
*.satellite[*].mobility.typename = "inet.mobility.geographic.SatelliteMobility"
*.satellite[*].mobility.coordinateSystemModule = "^.^.coordinateSystem"
*.satellite[*].mobility.updateInterval = 10s

# --- ground stations placed by latitude/longitude/height ---
# GeographicStationaryMobility keeps each icon at its fixed NED position and takes the
# position from latitude/longitude, decoupling the two (see the module's docs)
*.lima.mobility.typename = "GeographicStationaryMobility"
*.lima.mobility.coordinateSystemModule = "^.^.coordinateSystem"
*.lima.mobility.initialLatitude = -12.046deg
*.lima.mobility.initialLongitude = -77.043deg
*.lima.mobility.initialAltitude = 154m

*.losAngeles.mobility.typename = "GeographicStationaryMobility"
*.losAngeles.mobility.coordinateSystemModule = "^.^.coordinateSystem"
*.losAngeles.mobility.initialLatitude = 34.052deg
*.losAngeles.mobility.initialLongitude = -118.244deg
*.losAngeles.mobility.initialAltitude = 89m

# --- world map visualizer: project satellites and ground stations onto a 2D map ---
*.visualizer.geographicMapVisualizer.typename = "GeographicMapCanvasVisualizer"
*.visualizer.geographicMapVisualizer.coordinateSystemModule = "^.^.coordinateSystem"
*.visualizer.geographicMapVisualizer.projection = "equirectangular"  # or "mercator" (the map image must match)
*.visualizer.geographicMapVisualizer.mapImage = "maps/world-er"
*.visualizer.geographicMapVisualizer.longitudeOffset = -10deg  # degrees; shift if longitude 0 is not at the center of the map image
*.visualizer.geographicMapVisualizer.displayGroundTracks = true
*.visualizer.geographicMapVisualizer.displayFootprints = true
*.visualizer.geographicMapVisualizer.satelliteController = "^.^.controller"  # show absolute UTC clock from the controller's epoch

# --- sky view: az/el polar plot next to each ground station, showing the visible satellites ---
*.visualizer.geographicSkyViewVisualizer.typename = "GeographicSkyViewCanvasVisualizer"
*.visualizer.geographicSkyViewVisualizer.coordinateSystemModule = "^.^.coordinateSystem"
*.visualizer.geographicSkyViewVisualizer.observerFilter = "**.lima.mobility or **.losAngeles.mobility"
*.visualizer.geographicSkyViewVisualizer.targetFilter = "**.satellite[*].mobility"
*.visualizer.geographicSkyViewVisualizer.minElevationAngle = 5deg
