[General]
sim-time-limit = 10s
**.vector-recording = false

# --- Leaf-Spine DataCenter ---

[Config SmallLeafSpineDC]
description = "Small DC leaf-spine: 2 spines, 2 leaves, 4 hosts, 10G"
network = inet.topology.SmallLeafSpineDataCenterNetwork

[Config LeafSpineDC]
description = "DC leaf-spine: 2 spines, 4 leaves, 16 hosts, 25G"
network = inet.topology.LeafSpineDataCenterNetwork

[Config LargeLeafSpineDC]
description = "Large DC leaf-spine: 4 spines, 8 leaves, 64 hosts, 100G"
network = inet.topology.LargeLeafSpineDataCenterNetwork

# --- Fat-Tree DataCenter ---

[Config SmallFatTreeDC]
description = "Small DC fat-tree: k=4, 20 switches, 16 hosts, 10G"
network = inet.topology.SmallFatTreeDataCenterNetwork

[Config FatTreeDC]
description = "DC fat-tree: k=4, 20 switches, 16 hosts, 25G"
network = inet.topology.FatTreeDataCenterNetwork

[Config LargeFatTreeDC]
description = "Large DC fat-tree: k=8, 80 switches, 128 hosts, 100G"
network = inet.topology.LargeFatTreeDataCenterNetwork
