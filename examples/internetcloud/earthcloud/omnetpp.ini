[General]
sim-time-limit = 100s
network = EarthCloud

num-rngs = 2
**.internet.ipv4Delayer.rng-0 = 1

**.client[*].numApps = 6
**.client[*].app[*].typename = "PingApp"
**.client[*].app[*].sendInterval = 1000ms
**.client[*].app[*].printPing = true
**.client[*].app[*].stopTime = 100s
**.client[*].app[0].destAddresses = ["africa.server"]
**.client[*].app[1].destAddresses = ["asia.server"]
**.client[*].app[2].destAddresses = ["australia.server"]
**.client[*].app[3].destAddresses = ["europe.server"]
**.client[*].app[4].destAddresses = ["northAmerica.server"]
**.client[*].app[5].destAddresses = ["southAmerica.server"]

**.internet.ipv4Delayer.config = xmldoc("internetCloud.xml")

**.numClients = 1
