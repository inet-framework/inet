[General]
network = VsgSmokeTest
sim-time-limit = 1s
description = "VSG 3D smoke test — switch to the 3D view using the Qtenv toolbar"

# show the coordinate axes and give the scene a floor
*.sceneVisualizer.axisLength = 100m
*.sceneVisualizer.sceneMinX = 0m
*.sceneVisualizer.sceneMinY = 0m
*.sceneVisualizer.sceneMinZ = 0m
*.sceneVisualizer.sceneMaxX = 300m
*.sceneVisualizer.sceneMaxY = 300m
*.sceneVisualizer.sceneMaxZ = 0m

# Static topology only (the General config). Switch to the 3D view in Qtenv.

[Config Mobility]
description = "Moving nodes with VSG movement trails (run a while, then watch the 3D view)"
sim-time-limit = 60s
# hosts move (router stays put); LinearMobility bounces within the scene area
*.host*.mobility.typename = "LinearMobility"
*.host*.mobility.speed = 20mps
*.host*.mobility.constraintAreaMinX = 0m
*.host*.mobility.constraintAreaMinY = 0m
*.host*.mobility.constraintAreaMinZ = 0m
*.host*.mobility.constraintAreaMaxX = 300m
*.host*.mobility.constraintAreaMaxY = 300m
*.host*.mobility.constraintAreaMaxZ = 0m
*.host0.mobility.initialMovementHeading = 30deg
*.host1.mobility.initialMovementHeading = 150deg
*.host2.mobility.initialMovementHeading = 250deg
# enable the VSG movement trails + a bit of animation
*.mobilityVisualizer.displayMovementTrails = true
*.mobilityVisualizer.animationSpeed = 1
