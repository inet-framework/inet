[General]
network = RockyMapShowcase
sim-time-limit = 10s

# --- geographic anchor: the local scene ENU tangent plane sits at this lat/lon,
#     which is the centre of img.tif / dem.tif (-122.4, 37.8). ---
*.coordinateSystem.sceneLatitude = 37.8deg
*.coordinateSystem.sceneLongitude = -122.4deg
*.coordinateSystem.sceneAltitude = 0m

# --- render a real geospatial map via Rocky in the VSG 3D view ---
*.visualizer.sceneVisualizer.typename = "SceneRockyVisualizer"
*.visualizer.sceneVisualizer.coordinateSystemModule = "^.^.coordinateSystem"
*.visualizer.sceneVisualizer.imageFile = "img.tif"
*.visualizer.sceneVisualizer.elevationFile = "dem.tif"
*.visualizer.sceneVisualizer.rockyResourcePath = "/Users/gabortabi/rocky-install/share/rocky"
# the Rocky map is the ground now, so drop SceneVsgVisualizer's flat floor quad
*.visualizer.sceneVisualizer.displayScene = false
# frame a wide box so the initial view starts pulled back over the mapped area (the camera
# sizes itself from the node/scene extent) and there is room to zoom out to the horizon
*.visualizer.sceneVisualizer.sceneMinX = -15000m
*.visualizer.sceneVisualizer.sceneMinY = -15000m
*.visualizer.sceneVisualizer.sceneMinZ = 0m
*.visualizer.sceneVisualizer.sceneMaxX = 15000m
*.visualizer.sceneVisualizer.sceneMaxY = 15000m
*.visualizer.sceneVisualizer.sceneMaxZ = 3000m

# --- three stationary hosts spread across the mapped area (km-scale so they sit visibly on it) ---
*.host*.wlan[0].radio.typename = "Ieee80211ScalarRadio"
*.host*.mobility.typename = "StationaryMobility"
*.host*.mobility.initFromDisplayString = false
*.host1.mobility.initialX = 0m
*.host1.mobility.initialY = 0m
*.host1.mobility.initialZ = 50m
*.host2.mobility.initialX = 7000m
*.host2.mobility.initialY = 4500m
*.host2.mobility.initialZ = 50m
*.host3.mobility.initialX = -6500m
*.host3.mobility.initialY = 5500m
*.host3.mobility.initialZ = 50m


# Real Earth imagery + elevation streamed from readymap.org (the standard osgEarth/Rocky
# demo tile server) instead of the synthetic orange test tile. Needs internet at runtime.
[Config RealMap]
description = "Real Earth map (readymap.org online tiles) over San Francisco Bay"
*.visualizer.sceneVisualizer.imageFile = ""
*.visualizer.sceneVisualizer.elevationFile = ""
*.visualizer.sceneVisualizer.imageUrl = "https://readymap.org/readymap/tiles/1.0.0/7/"
*.visualizer.sceneVisualizer.elevationUrl = "https://readymap.org/readymap/tiles/1.0.0/116/"
