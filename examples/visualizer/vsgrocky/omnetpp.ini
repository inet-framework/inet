[General]
network = RockyMapShowcase
sim-time-limit = 10s

# --- geographic anchor: the local scene ENU tangent plane sits at this lat/lon,
#     which is the centre of img.tif / dem.tif (-122.4, 37.8). ---
*.coordinateSystem.sceneLatitude = 37.8deg
*.coordinateSystem.sceneLongitude = -122.4deg
*.coordinateSystem.sceneAltitude = 0m

# --- render a real geospatial map via Rocky in the VSG 3D view ---
*.visualizer.sceneVisualizer.typename = "SceneRockyVisualizer"
*.visualizer.sceneVisualizer.coordinateSystemModule = "^.^.coordinateSystem"
*.visualizer.sceneVisualizer.imageFile = "img.tif"
*.visualizer.sceneVisualizer.elevationFile = "dem.tif"
# Rocky needs its shaders at runtime: set the ROCKY_FILE_PATH environment variable to
# <your-rocky-install>/share/rocky before running, e.g.
#   ROCKY_FILE_PATH=$ROCKY_ROOT/share/rocky inet -u Qtenv -c RealMap
# (or set *.visualizer.sceneVisualizer.rockyResourcePath here to that absolute path).
# the Rocky map is the ground now, so drop SceneVsgVisualizer's flat floor quad
*.visualizer.sceneVisualizer.displayScene = false
# frame a wide box so the initial view starts pulled back over the mapped area (the camera
# sizes itself from the node/scene extent) and there is room to zoom out to the horizon
*.visualizer.sceneVisualizer.sceneMinX = -15000m
*.visualizer.sceneVisualizer.sceneMinY = -15000m
*.visualizer.sceneVisualizer.sceneMinZ = 0m
*.visualizer.sceneVisualizer.sceneMaxX = 15000m
*.visualizer.sceneVisualizer.sceneMaxY = 15000m
*.visualizer.sceneVisualizer.sceneMaxZ = 3000m

# --- three stationary hosts spread across the mapped area (km-scale so they sit visibly on it) ---
*.host*.mobility.typename = "StationaryMobility"
*.host*.mobility.initFromDisplayString = false
*.host1.mobility.initialX = 0m
*.host1.mobility.initialY = 0m
*.host1.mobility.initialZ = 50m
*.host2.mobility.initialX = 7000m
*.host2.mobility.initialY = 4500m
*.host2.mobility.initialZ = 50m
*.host3.mobility.initialX = -6500m
*.host3.mobility.initialY = 5500m
*.host3.mobility.initialZ = 50m


# Real Earth imagery + elevation streamed from readymap.org (the standard osgEarth/Rocky
# demo tile server) instead of the synthetic orange test tile. Needs internet at runtime.
[Config RealMap]
description = "Real Earth map (readymap.org online tiles) over San Francisco Bay"
*.visualizer.sceneVisualizer.imageFile = ""
*.visualizer.sceneVisualizer.elevationFile = ""
*.visualizer.sceneVisualizer.imageUrl = "https://readymap.org/readymap/tiles/1.0.0/7/"
*.visualizer.sceneVisualizer.elevationUrl = "https://readymap.org/readymap/tiles/1.0.0/116/"


# Nodes actually communicate over the real map: host1 sends UDP traffic to host3, and the
# radio signals + packet flow are drawn on the map. Uses INET's idealized wireless (unit-disk
# range) so connectivity is deterministic; needs internet (readymap tiles), extends RealMap.
[Config Communication]
extends = RealMap
description = "Nodes exchanging UDP traffic over the real map with pulsing signal spheres"

**.arp.typename = "GlobalArp"

# Realistic 802.11 ad-hoc radios: the SAME stack as the vsglidar drone demo whose signal
# spheres render correctly (Ieee80211ScalarRadioMedium via the network default + Ieee80211
# ad-hoc management). The idealized unit-disk radio does NOT produce the transmission waveform
# the sphere visualizer animates. Power boosted to bridge the ~1 km spacing over the bay.
*.host*.wlan[*].radio.transmitter.power = 300mW
*.host*.wlan[*].bitrate = 54Mbps
*.host*.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
*.host*.wlan[*].agent.typename = ""
*.radioMedium.maxCommunicationRange = 2km
*.radioMedium.maxInterferenceRange = 2km

# a ~800 m triangle over the bay, well within range
*.host1.mobility.initialX = 0m
*.host1.mobility.initialY = 0m
*.host2.mobility.initialX = 700m
*.host2.mobility.initialY = 400m
*.host3.mobility.initialX = -600m
*.host3.mobility.initialY = 500m

# host1 -> host3 UDP flow
*.host1.numApps = 1
*.host1.app[0].typename = "UdpBasicApp"
*.host1.app[0].destAddresses = "host3"
*.host1.app[0].destPort = 5000
*.host1.app[0].messageLength = 1000B
*.host1.app[0].sendInterval = 0.5s
*.host3.numApps = 1
*.host3.app[0].typename = "UdpSink"
*.host3.app[0].localPort = 5000

# Pulsing volumetric signal spheres — the vsglidar recipe (signalWaveShader), with the fading
# distance / wavelength scaled up for the ~km map so the spheres are large enough to see.
*.visualizer.mediumVisualizer.displaySignals = true
*.visualizer.mediumVisualizer.signalShape = "sphere"
*.visualizer.mediumVisualizer.signalWaveShader = true
*.visualizer.mediumVisualizer.signalFadingDistance = 300m
*.visualizer.mediumVisualizer.signalWaveLength = 150m
*.visualizer.mediumVisualizer.signalPropagationAnimationSpeed = 500/3e8
*.visualizer.mediumVisualizer.signalTransmissionAnimationSpeed = 50000/3e8
*.visualizer.mediumVisualizer.rangeSphere = false
*.visualizer.mediumVisualizer.displayCommunicationRanges = true
*.visualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.dataLinkVisualizer.fadeOutTime = 2s
*.visualizer.networkRouteVisualizer.displayRoutes = true
