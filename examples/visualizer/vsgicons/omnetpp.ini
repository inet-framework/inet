[General]
network = VsgIconShowcase
sim-time-limit = 60s
description = "VSG 3D icon/signal checkpoint (infrastructure wifi: ieee80211 badges, TCP connection icons, packet drops, wave signals)"

**.arp.typename = "GlobalArp"

# --- infrastructure WiFi: AccessPoint + associating stations (default full mgmt + agent) ---
*.accessPoint.wlan[0].mgmt.ssid = "vsg-net"
*.host*.wlan[0].agent.defaultSsid = "vsg-net"

# --- TCP flow hostA -> hostB (shows the transport-connection icon on both ends) ---
*.hostB.numApps = 1
*.hostB.app[0].typename = "TcpGenericServerApp"
*.hostB.app[0].localPort = 1000

*.hostA.numApps = 2
*.hostA.app[0].typename = "TcpBasicClientApp"
*.hostA.app[0].connectAddress = "hostB"
*.hostA.app[0].connectPort = 1000
*.hostA.app[0].startTime = uniform(1s, 2s)
*.hostA.app[0].numRequestsPerSession = 1000000
*.hostA.app[0].requestLength = 200B
*.hostA.app[0].replyLength = 1000B
*.hostA.app[0].thinkTime = 20ms
*.hostA.app[0].idleInterval = 0s
# hostA also sinks the UDP flood from hostC
*.hostA.app[1].typename = "UdpSink"
*.hostA.app[1].localPort = 5000

# --- UDP flood hostC -> hostA -> queue/contention packet drops ---
*.hostC.numApps = 1
*.hostC.app[0].typename = "UdpBasicApp"
*.hostC.app[0].destAddresses = "hostA"
*.hostC.app[0].destPort = 5000
*.hostC.app[0].messageLength = 1000byte
*.hostC.app[0].sendInterval = 1ms          # ~8 Mbps flood -> overruns the channel -> drops
*.hostC.app[0].startTime = uniform(0s, 1s)

# all nodes at normal power so every host associates (and gets an SSID badge); the drops come from
# the flood overwhelming the shared channel / interface queue, not from a weak link
*.accessPoint.wlan[*].radio.transmitter.power = 20mW
*.host*.wlan[*].radio.transmitter.power = 20mW
*.host*.forwarding = true

# --- hostC drifts, to show a mobility trail and varying signal levels ---
*.hostC.mobility.typename = "LinearMobility"
*.hostC.mobility.speed = 8mps
*.hostC.mobility.initialMovementHeading = 200deg
*.hostC.mobility.constraintAreaMinX = 40m
*.hostC.mobility.constraintAreaMinY = 40m
*.hostC.mobility.constraintAreaMinZ = 0m
*.hostC.mobility.constraintAreaMaxX = 360m
*.hostC.mobility.constraintAreaMaxY = 360m
*.hostC.mobility.constraintAreaMaxZ = 0m

# --- VSG 3D visualizer settings ---
*.visualizer.sceneVisualizer.axisLength = 50m
*.visualizer.sceneVisualizer.sceneMinX = 0m
*.visualizer.sceneVisualizer.sceneMinY = 0m
*.visualizer.sceneVisualizer.sceneMaxX = 400m
*.visualizer.sceneVisualizer.sceneMaxY = 400m
*.visualizer.sceneVisualizer.sceneMinZ = 0m
*.visualizer.sceneVisualizer.sceneMaxZ = 0m

*.visualizer.ieee80211Visualizer.displayAssociations = true   # SSID badges
*.visualizer.transportConnectionVisualizer.displayTransportConnections = true  # TCP icons
*.visualizer.packetDropVisualizer.displayPacketDrops = true   # packet-drop icons
*.visualizer.packetDropVisualizer.fadeOutTime = 3s

*.visualizer.mediumVisualizer.displaySignals = true           # wave-modulated rings
*.visualizer.mediumVisualizer.displayCommunicationRanges = true

*.visualizer.dataLinkVisualizer.displayLinks = true
*.visualizer.dataLinkVisualizer.fadeOutTime = 2s
*.visualizer.networkRouteVisualizer.displayRoutes = true
*.visualizer.mobilityVisualizer.displayMovementTrails = true
*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true
