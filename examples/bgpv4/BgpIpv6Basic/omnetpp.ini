[General]
network = BgpIpv6Basic
sim-time-limit = 30s

**.ipv6.configurator.networkConfiguratorModule = "configurator"

# both routers run BGP over IPv6 (IPv6-only)
*.r*.hasBgp = true
*.r*.hasIpv6 = true
*.r*.hasIpv4 = false
*.r*.bgp.addressFamily = "ipv6"
*.r*.bgp.routingTableModule = "^.ipv6.routingTable"
*.r*.bgp.bgpConfig = xmldoc("BgpConfig6.xml")
*.rA.bgp.routerId = "1.1.1.1"
*.rB.bgp.routerId = "2.2.2.2"

# end-to-end check: hostA pings hostB, which only works once BGP has installed the
# inter-AS routes on rA and rB (there are no static inter-AS routes)
*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "2001:db8:0:20::100"
*.hostA.app[0].startTime = 10s
*.hostA.app[0].sendInterval = 1s
*.hostB.numApps = 1
*.hostB.app[0].typename = "PingApp"
*.hostB.app[0].destAddr = ""
