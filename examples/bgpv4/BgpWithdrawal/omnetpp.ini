[General]
description = "Explicit BGP route withdrawal propagation over a linear A-B-C chain"
network = BgpWithdrawal
sim-time-limit = 100s

**.app[0].**.scalar-recording = true
*.hostC.app[0].**.vector-recording = true
**.bgp.**.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

**.eth[*].queue.packetCapacity = 100

**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

**.bgpConfig = xmldoc("BGPConfig.xml")
**.bgp.startDelay = 2s
**.bgp.connectRetryTime = 5s
**.bgp.holdTime = 6s
**.bgp.keepAliveTime = 2s

*.A.bgp.routerId = "1.1.1.1"
*.B.bgp.routerId = "2.2.2.2"
*.C.bgp.routerId = "3.3.3.3"

# hostC pings the network that A originates (10.0.1.0/24). The B-C session never
# fails, so C only learns that 10.0.1.0/24 is gone because B sends it an explicit
# BGP withdrawal after A is shut down.
*.hostC.numApps = 1
*.hostC.app[0].typename = "PingApp"
*.hostC.app[0].destAddr = "10.0.1.100"
*.hostC.app[0].startTime = 20s
*.hostC.app[0].sendInterval = 1s

*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = ""

*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true

# At 60s A is shut down. B loses its only path to 10.0.1.0/24, finds no alternative
# in its Adj-RIB-In, and sends an explicit BGP withdrawal of 10.0.1.0/24 to C over the
# B-C session (which never fails). C then removes the route, so hostC's pings to
# 10.0.1.100 stop being forwarded instead of being black-holed toward the dead router.
*.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='60s'><shutdown module='A'/></at>\n" + \
        "</script>")
