[General]
description = "Explicit MP-BGP route withdrawal (MP_UNREACH_NLRI) over a linear A-B-C chain"
network = BgpWithdrawal6
sim-time-limit = 100s

**.ipv6.configurator.networkConfiguratorModule = "configurator"

**.app[0].**.scalar-recording = true
*.hostC.app[0].**.vector-recording = true
**.bgp.**.scalar-recording = true
**.scalar-recording = false
**.vector-recording = false

**.eth[*].queue.packetCapacity = 100

**.tcp.typename = "Tcp"
**.tcp.mss = 1024
**.tcp.advertisedWindow = 14336
**.tcp.tcpAlgorithmClass = "TcpReno"

*.A.bgp.addressFamily = "ipv6"
*.B.bgp.addressFamily = "ipv6"
*.C.bgp.addressFamily = "ipv6"
*.A.bgp.routingTableModule = "^.ipv6.routingTable"
*.B.bgp.routingTableModule = "^.ipv6.routingTable"
*.C.bgp.routingTableModule = "^.ipv6.routingTable"
**.bgpConfig = xmldoc("BgpConfig6.xml")
**.bgp.startDelay = 2s
**.bgp.connectRetryTime = 5s
**.bgp.holdTime = 6s
**.bgp.keepAliveTime = 2s

*.A.bgp.routerId = "1.1.1.1"
*.B.bgp.routerId = "2.2.2.2"
*.C.bgp.routerId = "3.3.3.3"

# hostC pings the network that A originates (2001:db8:1::/64). The B-C session never
# fails, so C only learns that 2001:db8:1::/64 is gone because B sends it an explicit
# MP_UNREACH_NLRI withdrawal after A is shut down.
*.hostC.numApps = 1
*.hostC.app[0].typename = "PingApp"
*.hostC.app[0].destAddr = "2001:db8:1::100"
*.hostC.app[0].startTime = 20s
*.hostC.app[0].sendInterval = 1s

*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = ""

*.visualizer.interfaceTableVisualizer.displayInterfaceTables = true

# At 60s A is shut down. B loses its only path to 2001:db8:1::/64, finds no alternative
# in its Adj-RIB-In, and sends an explicit MP_UNREACH_NLRI withdrawal to C over the B-C
# session (which never fails). C then removes the route.
*.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='60s'><shutdown module='A'/></at>\n" + \
        "</script>")

# Also restart A at 100s. A re-establishes its BGP session to B (exercising the
# RFC 4271 6.8 connection-collision handling on reconnect), 2001:db8:1::/64 is
# re-advertised A->B->C, and the ping recovers.
[Config Restart]
description = "Shut A down at 60s, restart at 100s: MP_UNREACH withdrawal then reconnect and recovery"
sim-time-limit = 160s
*.scenarioManager.script = xml( \
        "<script>\n" + \
        "<at t='60s'><shutdown module='A'/></at>\n" + \
        "<at t='100s'><startup module='A'/></at>\n" + \
        "</script>")
