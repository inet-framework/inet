[General]
network = VrrpNetwork
sim-time-limit = 30s

# ----- addressing (no routes needed: everything is on 192.168.1.0/24) -----
*.configurator.config = xml("<config> \
        <interface hosts='gw1' names='eth0' address='192.168.1.1' netmask='255.255.255.0'/> \
        <interface hosts='gw2' names='eth0' address='192.168.1.2' netmask='255.255.255.0'/> \
        <interface hosts='host' names='eth0' address='192.168.1.10' netmask='255.255.255.0'/> \
    </config>")
*.configurator.addStaticRoutes = false

# ----- VRRP configuration -----
*.gw1.vrrp.configData = xmldoc("vrrp.xml", "VrrpConfig/Router[@id='gw1']/VRRP")
*.gw2.vrrp.configData = xmldoc("vrrp.xml", "VrrpConfig/Router[@id='gw2']/VRRP")

# ----- host pings the virtual gateway address -----
*.host.numApps = 1
*.host.app[0].typename = "PingApp"
*.host.app[0].destAddr = "192.168.1.254"
*.host.app[0].startTime = 6s
*.host.app[0].sendInterval = 1s

# Failover: shut down the master (gw1) mid-run; gw2 must take over the VIP.
[Config Failover]
sim-time-limit = 40s
*.scenarioManager.script = xmldoc("scenario.xml")
