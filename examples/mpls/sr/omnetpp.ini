[General]
network = SrMplsRing
sim-time-limit = 10s
total-stack = 64MiB
record-vector-results = false
cmdenv-express-mode = false
**.cmdenv-log-level = "info"

# plain node-SID flow: hostA -> hostPlain, policy "node:4" -- takes the R1-R3
# chord shortcut (2 hops), the route SegmentRouting's own shortest-path
# computation picks unconstrained.
**.hostA.numApps = 3
**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].localPort = 100
**.hostA.app[0].destPort = 100
**.hostA.app[0].messageLength = 128 bytes
**.hostA.app[0].startTime = 0.2s
**.hostA.app[0].sendInterval = 0.01s
**.hostA.app[0].destAddresses = "hostPlain"

# explicit-path flow: hostA -> hostExplicit, policy "node:2 node:4" -- forces
# the longer 3-hop route via R2 and R3, avoiding the chord entirely.
**.hostA.app[1].typename = "UdpBasicApp"
**.hostA.app[1].localPort = 101
**.hostA.app[1].destPort = 100
**.hostA.app[1].messageLength = 128 bytes
**.hostA.app[1].startTime = 0.3s
**.hostA.app[1].sendInterval = 0.01s
**.hostA.app[1].destAddresses = "hostExplicit"

# adjacency-SID pin: hostA -> hostAdj, policy "adj:ppp4 node:4" -- pins the
# first hop onto R1's own non-IGP-preferred (metric 10) secondary link to R2,
# then continues via ordinary node-SID forwarding.
**.hostA.app[2].typename = "UdpBasicApp"
**.hostA.app[2].localPort = 102
**.hostA.app[2].destPort = 100
**.hostA.app[2].messageLength = 128 bytes
**.hostA.app[2].startTime = 0.4s
**.hostA.app[2].sendInterval = 0.01s
**.hostA.app[2].destAddresses = "hostAdj"

**.hostPlain.numApps = 1
**.hostPlain.app[0].typename = "UdpSink"
**.hostPlain.app[0].localPort = 100

**.hostExplicit.numApps = 1
**.hostExplicit.app[0].typename = "UdpSink"
**.hostExplicit.app[0].localPort = 100

**.hostAdj.numApps = 1
**.hostAdj.app[0].typename = "UdpSink"
**.hostAdj.app[0].localPort = 100

# ip config
**.hostA.ipv4.routingTable.routingFile = "hostA.rt"
**.hostPlain.ipv4.routingTable.routingFile = "hostPlain.rt"
**.hostExplicit.ipv4.routingTable.routingFile = "hostExplicit.rt"
**.hostAdj.ipv4.routingTable.routingFile = "hostAdj.rt"

**.R1.ipv4.routingTable.routingFile = "R1.rt"
**.R2.ipv4.routingTable.routingFile = "R2.rt"
**.R3.ipv4.routingTable.routingFile = "R3.rt"
**.R4.ipv4.routingTable.routingFile = "R4.rt"
**.R5.ipv4.routingTable.routingFile = "R5.rt"
**.R6.ipv4.routingTable.routingFile = "R6.rt"

# NIC configuration
**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 10
