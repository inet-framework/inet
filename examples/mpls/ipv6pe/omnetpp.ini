[General]
network = SrMplsIpv6Pe
sim-time-limit = 10s
total-stack = 64MiB
record-vector-results = false
cmdenv-express-mode = false
**.cmdenv-log-level = "info"

# unconstrained flow: hostA -> hostB, policy "node:4" -- takes the R1-R3
# chord shortcut (2 hops), the route SegmentRouting's own shortest-path
# computation picks unconstrained. No transit SWAP: R3 does PHP straight
# after R1's PUSH.
**.hostA.numApps = 2
**.hostA.app[0].typename = "UdpBasicApp"
**.hostA.app[0].localPort = 100
**.hostA.app[0].destPort = 100
**.hostA.app[0].messageLength = 128 bytes
**.hostA.app[0].startTime = 0.2s
**.hostA.app[0].sendInterval = 0.01s
# A literal IPv6 address (not the symbolic hostname "hostB"): hostB also carries a
# (dormant, Ted-only) IPv4 address, so resolving a bare hostname could pick either
# family -- the literal removes any ambiguity about which family this flow uses
# (mirrors tests/module/mpls_ipv6_static_lsp.test's same idiom).
**.hostA.app[0].destAddresses = "2001:db8:20::2"

# explicit-path flow: hostA -> hostC, policy "node:2 node:4" -- forces the
# longer 3-hop chain route via R2, avoiding the chord entirely. R2 (a
# pure-IPv4 router with hasIpv6=false) genuinely transits: SWAP, then R3
# does PHP -- exactly as it did for the unconstrained flow above, since both
# flows share the same egress node SID (node:4) and the same PHP router (R3).
**.hostA.app[1].typename = "UdpBasicApp"
**.hostA.app[1].localPort = 101
**.hostA.app[1].destPort = 100
**.hostA.app[1].messageLength = 128 bytes
**.hostA.app[1].startTime = 0.3s
**.hostA.app[1].sendInterval = 0.01s
**.hostA.app[1].destAddresses = "2001:db8:30::2" # literal IPv6 address, same rationale as app[0] above

**.hostB.numApps = 1
**.hostB.app[0].typename = "UdpSink"
**.hostB.app[0].localPort = 100

**.hostC.numApps = 1
**.hostC.app[0].typename = "UdpSink"
**.hostC.app[0].localPort = 100

# IPv6 addressing is static (~Ipv6NetworkConfigurator with explicit
# per-interface addresses, mirroring tests/module/mpls_ipv6_static_lsp.test
# and IPv6_explicit_address.test) -- deterministic, no SLAAC/DAD timing.
# R1/R4 need NO IPv6 route to the far prefixes at all: ~SrPolicy (R1's
# ingress classifier) intercepts the raw packet arriving from L2 before it
# would ever reach the local IPv6 routing table (see
# Mpls::processPacketFromL2 / tryLabelAndForwardDatagram).
*.configurator.config = xml("<config>\
    <interface hosts='hostA' address='2001:db8:10::2'/>\
    <interface hosts='R1' names='ppp0' address='2001:db8:10::1'/>\
    <interface hosts='R4' names='ppp1' address='2001:db8:20::1'/>\
    <interface hosts='hostB' address='2001:db8:20::2'/>\
    <interface hosts='R4' names='ppp2' address='2001:db8:30::1'/>\
    <interface hosts='hostC' address='2001:db8:30::2'/>\
    <route hosts='hostA' destination='::/0' gateway='2001:db8:10::1' interface='ppp0'/>\
    <route hosts='hostB' destination='::/0' gateway='2001:db8:20::1' interface='ppp0'/>\
    <route hosts='hostC' destination='::/0' gateway='2001:db8:30::1' interface='ppp0'/>\
    </config>")
**.ipv6.configurator.networkConfiguratorModule = "configurator"
**.neighbourDiscovery.dupAddrDetectTransmits = 0

# IPv4 addressing/routing is entirely static (.rt files below), matching
# examples/mpls/sr/'s own style exactly: SR-MPLS needs no dynamic IPv4
# routing protocol (LinkStateRouting/Ted floods link state directly over
# each interface; label-switched forwarding never consults the Ipv4 routing
# table at all), so the "configurator" module in this network is the
# Ipv6NetworkConfigurator above, not an Ipv4NetworkConfigurator -- each
# node's Ipv4NodeConfigurator must be told not to look for one under that
# name (see the NED file's own networkConfiguratorModule = "" override).
**.hostA.ipv4.routingTable.routingFile = "hostA.rt"
**.hostB.ipv4.routingTable.routingFile = "hostB.rt"
**.hostC.ipv4.routingTable.routingFile = "hostC.rt"
**.R1.ipv4.routingTable.routingFile = "R1.rt"
**.R2.ipv4.routingTable.routingFile = "R2.rt"
**.R3.ipv4.routingTable.routingFile = "R3.rt"
**.R4.ipv4.routingTable.routingFile = "R4.rt"

**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 10
