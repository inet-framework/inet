[General]
network = PcepMplsTe
sim-time-limit = 14s
total-stack = 64MiB
record-vector-results = false
cmdenv-express-mode = false

# LSR1's rsvp module at "detail" (to also capture the "PCE computed ERO"/"CSPF
# computed ERO" EV_DETAIL lines); everything else at the default "info" --
# per-module cmdenv-log-level overrides are matched in FILE ORDER (first
# matching pattern wins), so the specific override must be declared before
# the general one below.
**.LSR1.rsvp.cmdenv-log-level = "detail"
**.cmdenv-log-level = "info"

# host1 -> host2 over tunnel 1 (lspid 100, the delegated LSP this example
# reroutes)
**.host1.numApps = 1
**.host1.app[0].typename = "UdpBasicApp"
**.host1.app[0].localPort = 100
**.host1.app[0].destPort = 100
**.host1.app[0].messageLength = 128 bytes
**.host1.app[0].sendInterval = 0.02s
**.host1.app[0].destAddresses = "10.0.8.2"

**.host2.numApps = 1
**.host2.app[0].typename = "UdpSink"
**.host2.app[0].localPort = 100

**.host1.ipv4.routingTable.routingFile = "host1.rt"
**.host2.ipv4.routingTable.routingFile = "host2.rt"
**.LSR1.ipv4.routingTable.routingFile = "LSR1.rt"
**.LSR2.ipv4.routingTable.routingFile = "LSR2.rt"
**.LSR3.ipv4.routingTable.routingFile = "LSR3.rt"
**.LSR4.ipv4.routingTable.routingFile = "LSR4.rt"
**.LSR5.ipv4.routingTable.routingFile = "LSR5.rt"
**.LSR6.ipv4.routingTable.routingFile = "LSR6.rt"
**.PceRouter.ipv4.routingTable.routingFile = "PceRouter.rt"

**.LSR1.classifier.config = xmldoc("LSR1_fec.xml")
**.LSR1.rsvp.traffic = xmldoc("LSR1_rsvp.xml")

# tunnel 1 (lspid 100, 50 kbps, permanent) is CSPF-computed via the remote
# PCE, and delegated to it (PCRpt/PCUpd) once established.
**.LSR1.rsvp.computeEro = true
**.LSR1.rsvp.computationMode = "pce"
**.LSR1.rsvp.pccModule = "^.app[0]"
**.LSR1.rsvp.delegate = true

**.LSR*.rsvp.helloInterval = 0.2s
**.LSR*.rsvp.helloTimeout = 0.5s
**.PceRouter.rsvp.helloInterval = 0.2s
**.PceRouter.rsvp.helloTimeout = 0.5s

# PCEP: LSR1 (ingress) runs the Pcc, PceRouter (a separate node, hanging off
# LSR6, off tunnel 1's own data-plane branches entirely) runs the Pce, wired
# to its own (fully converged) Ted.
**.LSR1.hasTcp = true
**.LSR1.numApps = 1
**.LSR1.app[0].typename = "Pcc"
**.LSR1.app[0].pceAddress = "10.0.7.2"
# localAddress = LSR1's own routerId (10.0.4.1): ~Ted/~LinkStateRouting (like
# a real IGP) only guarantees network-wide reachability to each router's own
# routerId, not to its individual per-link interface addresses -- see
# ~Pcc's "localAddress" doc comment.
**.LSR1.app[0].localAddress = "10.0.4.1"
**.LSR1.app[0].rsvpteModule = "^.rsvp"
**.LSR1.app[0].keepaliveTime = 2s
**.LSR1.app[0].deadTimer = 10s
**.LSR1.app[0].reconnectInterval = 1s

**.PceRouter.hasTcp = true
**.PceRouter.numApps = 1
**.PceRouter.app[0].typename = "Pce"
**.PceRouter.app[0].tedModule = "^.ted"
**.PceRouter.app[0].keepaliveTime = 2s
**.PceRouter.app[0].deadTimer = 10s

**.ppp[*].queue.typename = "DropTailQueue"
**.ppp[*].queue.packetCapacity = 10

*.*.hasStatus = true
**.scenarioManager.script = xmldoc("scenario.xml")
